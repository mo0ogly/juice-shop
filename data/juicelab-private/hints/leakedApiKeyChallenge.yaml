challenge_key: "leakedApiKeyChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #1 : "The API call is part of a
      scheduled process behind the scenes, completely
      unrelated to the web application". Donc l'API key
      n'est PAS dans la webapp Juice Shop. Elle est ailleurs,
      hors webapp. Hint #2 : "Check the Juice Shop's social
      media channels for regularly scheduled content being
      posted". Donc cherche les social media channels.
    text_en: |
      Official OWASP hint #1: "The API call is part of a
      scheduled process behind the scenes, completely
      unrelated to the web application". So API key is NOT
      in the Juice Shop webapp. It's elsewhere, off-webapp.
      Hint #2: "Check the Juice Shop's social media channels
      for regularly scheduled content being posted". So look
      for social media channels.
    pedagogical_intent: |
      Direct off-webapp + signal social media.

  N2:
    cost_pct: 10
    text_fr: |
      Le footer ou About Us de Juice Shop linkent typiquement
      Twitter/X, GitHub, Slack du projet. Identifie ces
      channels. Hint OWASP officiel #2 mentionne
      "regularly scheduled content" — donc des posts
      automatiques (un tweet par jour, par exemple). Repere
      ce pattern de posts.
    text_en: |
      Juice Shop footer or About Us typically link Twitter/X,
      GitHub, Slack of the project. Identify these channels.
      Official OWASP hint #2 mentions "regularly scheduled
      content" — so automatic posts (a tweet per day, for
      example). Spot this post pattern.
    pedagogical_intent: |
      Spell social media surface.

  N3:
    cost_pct: 20
    text_fr: |
      Hint OWASP officiel #3 : "Find out which part of the
      content might come from the response of an API call".
      Quelles parts d'un tweet pourraient etre auto-generees
      par une API ? Une blague (jokes API), une citation
      (quotes API), une image meme. Identifie le pattern :
      typiquement les Juice Shop tweets contiennent une dad
      joke quotidienne, qui vient probablement d'icanhazdadjoke
      .com ou similar.
    text_en: |
      Official OWASP hint #3: "Find out which part of the
      content might come from the response of an API call".
      Which parts of a tweet could be auto-generated by an
      API? A joke (jokes API), a quote (quotes API), a meme
      image. Identify the pattern: typically Juice Shop
      tweets contain a daily dad joke, likely from
      icanhazdadjoke.com or similar.
    pedagogical_intent: |
      Connect content to API source.

  N4:
    cost_pct: 35
    text_fr: |
      Hint OWASP officiel #4 : "Find the place where the API
      call happens — not in the web application — and then
      look for the API key itself". Donc le SCRIPT
      d'automation est ailleurs — souvent dans le repo Juice
      Shop GitHub officiel mais dans un folder
      automation/scripts/, ou dans un repo separe juice-shop-
      automation. Cherche sur GitHub.
    text_en: |
      Official OWASP hint #4: "Find the place where the API
      call happens — not in the web application — and then
      look for the API key itself". So the automation SCRIPT
      is elsewhere — often in the official Juice Shop GitHub
      repo but in an automation/scripts/ folder, or in a
      separate juice-shop-automation repo. Search on GitHub.
    pedagogical_intent: |
      Spell GitHub OSINT strategy.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_PROBABLE] Workflow general (cle exacte a
      trouver via OSINT actuel) :
      1. Footer Juice Shop -> link vers Twitter / GitHub.
      2. Twitter Juice Shop -> regarde les tweets reguliers
         (typiquement dad jokes via icanhazdadjoke).
      3. GitHub : repo bkimminich/juice-shop ou
         juice-shop/juice-shop, cherche le folder
         data/static/ ou un script bot.
      4. Code source du bot : grep "API_KEY" ou "X-API-KEY".
         La cle est typiquement hardcodee en clair.
      5. Submit la cle dans /#/contact :
         "I found a leaked API key in your social media bot:
         <cle exacte>".
      6. Le challenge se valide automatiquement.
      Cle OWASP officielle change avec le temps — fais OSINT
      actuel sur le repo public.
      Defense : (1) ne jamais hardcoder les cles API dans le code source — utiliser des variables d'environnement ou un secret manager (HashiCorp Vault, AWS Secrets Manager). (2) Activer les alertes GitHub secret scanning sur le repo. (3) Rotater immediatement toute cle trouvee dans des commits publics, puis auditer l'historique pour d'autres leaks.
    text_en: |
      [KILL_CHAIN_PROBABLE] General workflow (exact key to
      find via current OSINT):
      1. Juice Shop footer -> link to Twitter / GitHub.
      2. Twitter Juice Shop -> look at regular tweets
         (typically dad jokes via icanhazdadjoke).
      3. GitHub: bkimminich/juice-shop or juice-shop/
         juice-shop repo, look in data/static/ folder or a
         bot script.
      4. Bot source code: grep "API_KEY" or "X-API-KEY".
         Key is typically hardcoded in cleartext.
      5. Submit key in /#/contact:
         "I found a leaked API key in your social media bot:
         <exact key>".
      6. Challenge auto-solves.
      Official OWASP key changes over time — do current
      OSINT on the public repo.
      Defense: (1) never hardcode API keys in source code — use environment variables or a secret manager (HashiCorp Vault, AWS Secrets Manager). (2) Enable GitHub secret scanning alerts on the repo. (3) Rotate any key found in public commits immediately, then audit commit history for other leaks.
    pedagogical_intent: |
      Quasi-solution : workflow + acknowledge OSINT decay.
