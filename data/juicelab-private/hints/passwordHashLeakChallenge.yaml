challenge_key: "passwordHashLeakChallenge"
schema_version: "juicelab.hints.v1"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Une application moderne separe le frontend du backend par une API
      REST. Le frontend ne montre qu'une partie des donnees recues, mais
      le backend en envoie souvent plus. Si tu pouvais regarder ce qui
      passe vraiment dans les reponses de l'API, tu trouverais peut-etre
      des choses qui ne sont pas affichees a l'ecran.
    text_en: |
      A modern app separates the frontend and backend through a REST API.
      The frontend only shows part of the received data, but the backend
      often sends more. If you could see what actually flows in the API
      responses, you might find things that are not displayed on screen.
    pedagogical_intent: |
      Activate the reflex: API responses can leak more than the UI displays.

  N2:
    cost_pct: 10
    text_fr: |
      L'onglet Network des DevTools enregistre toutes les requetes HTTP de
      la page. Une fois connecte sur Juice Shop, regarde quelles requetes
      partent quand tu navigues vers ton profil ou la page d'accueil.
      Concentre-toi sur les endpoints qui contiennent /user, /me, /whoami,
      /profile.
    text_en: |
      The Network tab in DevTools records every HTTP request from the
      page. Once logged in to Juice Shop, watch which requests fire when
      you navigate to your profile or the home page. Focus on endpoints
      containing /user, /me, /whoami, /profile.
    pedagogical_intent: |
      Localize the API surface using DevTools Network and naming conventions.

  N3:
    cost_pct: 20
    text_fr: |
      L'endpoint qui renvoie l'utilisateur courant a Juice Shop est
      /rest/user/whoami. Par defaut il filtre la reponse pour retourner
      seulement id, email, lastLoginIp, profileImage. Mais le code backend
      accepte un parametre de requete fields qui permet de demander des
      colonnes specifiques. Si le filtrage cote serveur est mal pense, ce
      parametre pourrait te laisser demander explicitement ce qui devrait
      etre cache.
    text_en: |
      The endpoint that returns the current user on Juice Shop is
      /rest/user/whoami. By default it filters the response to return only
      id, email, lastLoginIp, profileImage. But the backend code accepts a
      query parameter fields that lets you request specific columns. If
      server-side filtering is poorly designed, that parameter might let
      you explicitly ask for what should be hidden.
    pedagogical_intent: |
      Localize the surface and the parameter: fields= on /rest/user/whoami.

  N4:
    cost_pct: 35
    text_fr: |
      La parade attendue serait une liste blanche cote serveur : si on
      demande un champ qui n'est pas autorise, le serveur le retire. Ici
      Juice Shop fait le contraire : si tu demandes un champ via fields=,
      il te le donne, sans verifier qu'il est sensible. Le champ qui te
      donne le hash de ton mot de passe s'appelle simplement password en
      base de donnees.
    text_en: |
      The expected guard would be a server-side allowlist: if you ask for
      a field that is not allowed, the server strips it. Here Juice Shop
      does the opposite: if you ask for a field via fields=, it returns
      it, without checking sensitivity. The field that gives you your
      password hash is simply called password in the database.
    pedagogical_intent: |
      Give the syntactic shape: ?fields=password on the whoami endpoint.

  N5:
    cost_pct: 50
    text_fr: |
      Une fois connecte sur Juice Shop, ouvre un nouvel onglet et tape
      dans la barre d'adresse :
      http://127.0.0.1:3000/rest/user/whoami?fields=password
      Le navigateur affiche un JSON contenant ton hash. Le challenge
      Password Hash Leak est marque solved par Juice Shop des que la
      reponse de cet endpoint contient le champ password. Tu peux aussi
      utiliser DevTools Console : fetch('/rest/user/whoami?fields=password').then(r=>r.json()).then(console.log).
    text_en: |
      Once logged in to Juice Shop, open a new tab and type in the
      address bar:
      http://127.0.0.1:3000/rest/user/whoami?fields=password
      The browser shows JSON containing your hash. The Password Hash Leak
      challenge is flagged solved by Juice Shop as soon as the response
      contains the password field. You can also use DevTools Console:
      fetch('/rest/user/whoami?fields=password').then(r=>r.json()).then(console.log).
    pedagogical_intent: |
      Quasi-solution: full URL with the fields parameter, scoring trigger explained.
