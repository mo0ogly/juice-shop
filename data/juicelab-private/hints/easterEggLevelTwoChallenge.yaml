challenge_key: "easterEggLevelTwoChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #2 : "Make sure you
      solve Find the hidden easter egg first".
      Donc pre-requis : easterEggLevelOneChallenge
      resolu (acces a /ftp/eastere.gg via null
      byte bypass). Le contenu de eastere.gg
      donne l'indice pour ce challenge.
    text_en: |
      Official OWASP hint #2: "Make sure you
      solve Find the hidden easter egg first".
      So prerequisite:
      easterEggLevelOneChallenge solved (
      /ftp/eastere.gg access via null byte
      bypass). eastere.gg content gives clue
      for this challenge.
    pedagogical_intent: |
      Activate composition reflex.

  N2:
    cost_pct: 10
    text_fr: |
      Lire /ftp/eastere.gg (apres null byte
      bypass : `GET /ftp/eastere.gg%00.md`). Le
      content typique inclut un message
      decoratif + une URL string que tu DOIS
      DECODER. La string utilise une simple
      cipher (Caesar/ROT family). Hint OWASP
      #1 : "tough-as-nails encryption" est
      ironique.
    text_en: |
      Read /ftp/eastere.gg (after null byte
      bypass: `GET /ftp/eastere.gg%00.md`).
      Typical content includes decorative
      message + URL string YOU MUST DECODE.
      String uses simple cipher (Caesar/ROT
      family). OWASP hint #1: "tough-as-
      nails encryption" is ironic.
    pedagogical_intent: |
      Spell investigation method.

  N3:
    cost_pct: 20
    text_fr: |
      Le cipher est ROT13 (Caesar avec
      rotation 13). Tools : tr (Unix), CyberChef
      (web), Python `codecs.decode("...","
      rot13")`. Source verifiee (lib/antiCheat.
      ts:34) : la URL ROT13-encoded est `/gur/
      qrif/ner/fb/shaal/gurl/uvq/na/rnfgre/
      rtt/jvguva/gur/rnfgre/rtt`. Decode en
      `/the/devs/are/so/funny/they/hid/an/
      easter/egg/within/the/easter/egg`.
    text_en: |
      Cipher is ROT13 (Caesar with rotation
      13). Tools: tr (Unix), CyberChef (web),
      Python `codecs.decode("...","rot13")`.
      Verified source (lib/antiCheat.ts:34):
      ROT13-encoded URL is `/gur/qrif/ner/
      fb/shaal/gurl/uvq/na/rnfgre/rtt/jvguva
      /gur/rnfgre/rtt`. Decodes to `/the/
      devs/are/so/funny/they/hid/an/easter/
      egg/within/the/easter/egg`.
    pedagogical_intent: |
      Reveal cipher + decoded URL.

  N4:
    cost_pct: 35
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Source serveur
      verifiee (routes/easterEgg.ts:13) : le
      serve route est mappe en server.ts pour
      GET `/the/devs/are/so/funny/they/hid/an/
      easter/egg/within/the/easter/egg`. Quand
      tu access cette URL, le solveIf trigger
      (return true) + sendFile sur le 3D
      threejs demo (frontend/dist/frontend/
      assets/private/threejs-demo.html). Le
      client voit le 3D easter egg.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Verified server
      source (routes/easterEgg.ts:13): serve
      route mapped in server.ts for GET
      `/the/devs/are/so/funny/they/hid/an/
      easter/egg/within/the/easter/egg`. When
      you access this URL, solveIf triggers
      (return true) + sendFile on 3D threejs
      demo (frontend/dist/frontend/assets/
      private/threejs-demo.html). Client sees
      3D easter egg.
    pedagogical_intent: |
      Reveal exact server route.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Workflow complet :
      1. Pre-requis : easterEggLevelOne
         Challenge resolu (Lot 2). Le content
         de /ftp/eastere.gg te donne le
         message ROT13.
      2. ROT13 decode du URL :
         - Original : `/gur/qrif/ner/fb/
           shaal/gurl/uvq/na/rnfgre/rtt/
           jvguva/gur/rnfgre/rtt`
         - Tools : `echo "<original>" | tr
           'A-Za-z' 'N-ZA-Mn-za-m'` (Unix)
         - OR Python : `codecs.decode("...",
           "rot13")`
         - Resultat : `/the/devs/are/so/funny
           /they/hid/an/easter/egg/within/the/
           easter/egg`
      3. GET cette URL via le browser :
         `http://localhost:3000/the/devs/are/
         so/funny/they/hid/an/easter/egg/
         within/the/easter/egg`.
      4. Le serveur :
         (a) route serveEasterEgg() execute
         (b) solveIf return true ->
             challenge solve auto
         (c) sendFile threejs-demo.html ->
             3D easter egg s'affiche
      5. Felicitations - tu vois le real
         easter egg.
      Source canonique : routes/easterEgg.ts:
      13 + lib/antiCheat.ts:34 + ROT13 cipher.
      Defense canonique : pour les easter eggs
      legitimes, documenter explicitement et
      utiliser des paths bien named (pas des
      ROT13-obscured paths qui font penser a
      hidden malicious functionality).
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Full workflow:
      1. Prerequisite: easterEggLevelOne
         Challenge solved (Lot 2). /ftp/
         eastere.gg content gives ROT13
         message.
      2. ROT13 decode URL:
         - Original: `/gur/qrif/ner/fb/
           shaal/gurl/uvq/na/rnfgre/rtt/
           jvguva/gur/rnfgre/rtt`
         - Tools: `echo "<original>" | tr
           'A-Za-z' 'N-ZA-Mn-za-m'` (Unix)
         - OR Python: `codecs.decode("...",
           "rot13")`
         - Result: `/the/devs/are/so/funny/
           they/hid/an/easter/egg/within/
           the/easter/egg`
      3. GET this URL via browser:
         `http://localhost:3000/the/devs/are/
         so/funny/they/hid/an/easter/egg/
         within/the/easter/egg`.
      4. Server:
         (a) serveEasterEgg() route executes
         (b) solveIf return true -> challenge
             auto solves
         (c) sendFile threejs-demo.html ->
             3D easter egg displays
      5. Congratulations - you see real
         easter egg.
      Canonical source: routes/easterEgg.ts:
      13 + lib/antiCheat.ts:34 + ROT13
      cipher.
      Canonical defense: for legitimate
      easter eggs, document explicitly and
      use well-named paths (not ROT13-
      obscured paths suggesting hidden
      malicious functionality).
    pedagogical_intent: |
      Solution complete + decoding tools +
      defense.
