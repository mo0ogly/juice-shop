challenge_key: "resetPasswordBjoernChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #1 : "Nothing a little bit of
      Facebook stalking couldn't reveal. Might involve a
      historical twist". Donc OSINT social Bjoern Kimminich +
      twist historique sur la reponse. Le compte est
      bjoern@juice-sh.op (INTERNAL, pas l'OWASP).
    text_en: |
      Official OWASP hint #1: "Nothing a little bit of
      Facebook stalking couldn't reveal. Might involve a
      historical twist". So Facebook OSINT on Bjoern Kimminich
      + historical twist on answer. Account is
      bjoern@juice-sh.op (INTERNAL, not OWASP one).
    pedagogical_intent: |
      Activate Facebook OSINT + historical twist reflex.

  N2:
    cost_pct: 10
    text_fr: |
      Hint OWASP #2 : "Bjoern was a bit less careless with his
      choice of security and answer to his internal account".
      C'est l'INVERSE de resetPasswordBjoernOwaspChallenge :
      ici la reponse n'est pas dans une video. Elle est
      OSINTable mais demande recherche historique. Va sur
      /#/forgot-password, entre bjoern@juice-sh.op et regarde
      la security question.
    text_en: |
      OWASP hint #2: "Bjoern was a bit less careless with his
      choice of security and answer to his internal account".
      It's the INVERSE of resetPasswordBjoernOwaspChallenge:
      here answer is not in a video. It's OSINTable but
      requires historical research. Go to /#/forgot-password,
      enter bjoern@juice-sh.op and look at security question.
    pedagogical_intent: |
      Spell account distinction + research method.

  N3:
    cost_pct: 20
    text_fr: |
      La security question est typiquement "Place of birth?" ou
      "First place of residence?". Hint OWASP #3 : "Bjoern
      chose to answer his chosen question truthfully but tried
      to make it harder for attackers by applying sort of a
      historical twist". Donc reponse = lieu reel de Bjoern,
      mais avec une variante historique (ex. nom ancien,
      ancienne division administrative, langue regionale).
    text_en: |
      Security question is typically "Place of birth?" or
      "First place of residence?". OWASP hint #3: "Bjoern
      chose to answer his chosen question truthfully but tried
      to make it harder for attackers by applying sort of a
      historical twist". So answer = Bjoern's real place, but
      with historical variant (e.g., old name, old
      administrative division, regional language).
    pedagogical_intent: |
      Spell historical-twist mechanic.

  N4:
    cost_pct: 35
    text_fr: |
      Bjoern Kimminich vit en Allemagne du Nord region Hambourg
      (info publique LinkedIn / GitHub bio / OWASP profile).
      Recherche : Wikipedia "Bjoern Kimminich" + Hambourg
      district history. Sa ville/quartier a probablement un
      nom historique (medieval, prussien, hanseatique).
      Codefixes explanation #2 : "researching a past place of
      residence still is the only (low) hurdle for the
      attacker". Source : codefixes/
      resetPasswordBjoernChallenge.info.yml.
    text_en: |
      Bjoern Kimminich lives in Northern Germany Hamburg area
      (public info LinkedIn / GitHub bio / OWASP profile).
      Research: Wikipedia "Bjoern Kimminich" + Hamburg
      district history. His city/district likely has
      historical name (medieval, Prussian, Hanseatic).
      Codefixes explanation #2: "researching a past place of
      residence still is the only (low) hurdle for the
      attacker". Source: codefixes/
      resetPasswordBjoernChallenge.info.yml.
    pedagogical_intent: |
      Reveal location + historical research direction.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Workflow general (la reponse
      exacte change selon l'historical twist applique) :
      1. /#/forgot-password
      2. Email : bjoern@juice-sh.op
      3. Note la security question (ex. "Name of your
         elementary school?")
      4. OSINT : LinkedIn Bjoern Kimminich + Hamburg district
         history sur Wikipedia
      5. Liste les variantes historiques du lieu/ecole
         (ex. ancien nom prussien, hanseatique, medieval).
      6. Test chaque variante. Hint #5 : "Brute forcing the
         answer should be next to impossible" — pas
         d'automation, OSINT cible necessaire.
      7. Set new password.
      8. Login bjoern@juice-sh.op + new password = solve.
      Source codefixes : confirme l'OSINT-ability + critique
      l'historical twist comme defense insuffisante.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] General workflow (exact answer
      varies with historical twist applied):
      1. /#/forgot-password
      2. Email: bjoern@juice-sh.op
      3. Note security question (e.g., "Name of your
         elementary school?")
      4. OSINT: LinkedIn Bjoern Kimminich + Hamburg district
         history on Wikipedia
      5. List historical variants of place/school (e.g., old
         Prussian, Hanseatic, medieval name).
      6. Test each variant. Hint #5: "Brute forcing the
         answer should be next to impossible" — no automation,
         targeted OSINT required.
      7. Set new password.
      8. Login bjoern@juice-sh.op + new password = solve.
      Codefixes source: confirms OSINT-ability + criticizes
      historical twist as insufficient defense.
    pedagogical_intent: |
      Quasi-solution : workflow + historical twist deduction.
