challenge_key: "resetPasswordUvoginChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #1 : "OSINT on his social media
      personas to find his honest answer". Donc OSINT
      cross-platform sur l'alias "Uvogin". Hint #2 : "People
      often reuse aliases online". Methode pentester
      classique : tester l'alias sur 400+ sites en quelques
      secondes via un outil dedie.
    text_en: |
      Official OWASP hint #1: "OSINT on his social media
      personas to find his honest answer". So
      cross-platform OSINT on alias "Uvogin". Hint #2:
      "People often reuse aliases online". Classic pentester
      method: test alias on 400+ sites in seconds via a
      dedicated tool.
    pedagogical_intent: |
      Activate cross-platform OSINT reflex.

  N2:
    cost_pct: 10
    text_fr: |
      Hint OWASP officiel #3 : "find some existing OSINT
      tools to help". Sherlock (github.com/sjherbert/
      sherlock) ou WhatsMyName (whatsmyname.app) sont les
      tools standards. Lance : `python sherlock uvogin` ou
      `whatsmyname uvogin` (web). Resultat : liste des
      profils existants pour cet alias.
    text_en: |
      Official OWASP hint #3: "find some existing OSINT
      tools to help". Sherlock (github.com/sjherbert/
      sherlock) or WhatsMyName (whatsmyname.app) are
      standard tools. Run: `python sherlock uvogin` or
      `whatsmyname uvogin` (web). Result: list of existing
      profiles for this alias.
    pedagogical_intent: |
      Spell OSINT tooling.

  N3:
    cost_pct: 20
    text_fr: |
      Une fois les profils trouves (typiquement Twitter,
      Instagram, anime forums), repere la security question
      d'Uvogin sur Juice Shop. Va sur /#/forgot-password,
      entre uvogin@juice-sh.op (ou similar). La question
      apparait : typiquement "What is your favorite anime
      character?" ou similar. Cherche sur les profils
      OSINT pour la reponse.
    text_en: |
      Once profiles found (typically Twitter, Instagram,
      anime forums), spot Uvogin's security question on
      Juice Shop. Go to /#/forgot-password, enter
      uvogin@juice-sh.op (or similar). Question appears:
      typically "What is your favorite anime character?" or
      similar. Search on OSINT profiles for the answer.
    pedagogical_intent: |
      Spell forgot-password discovery + answer search.

  N4:
    cost_pct: 35
    text_fr: |
      [KILL_CHAIN_PROBABLE] La reponse exacte depend de la
      version Juice Shop et des profils Uvogin actuellement
      en ligne. Pattern : (1) la security question concerne
      typiquement les preferences anime d'Uvogin. (2) La
      reponse est un nom de personnage anime mentioned
      regulierement dans ses posts (Twitter, anime forums).
      (3) Inspecte les Bio/Pinned posts/profile pour le
      personnage favori.
    text_en: |
      [KILL_CHAIN_PROBABLE] Exact answer depends on Juice
      Shop version and currently online Uvogin profiles.
      Pattern: (1) security question typically about
      Uvogin's anime preferences. (2) Answer is an anime
      character name mentioned regularly in his posts
      (Twitter, anime forums). (3) Inspect Bio/Pinned
      posts/profile for the favorite character.
    pedagogical_intent: |
      Spell pattern + version-dependency.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_PROBABLE] Workflow general (reponse a
      OSINTer dans ton instance) :
      1. Lance Sherlock : python sherlock uvogin
         -> liste les profils existants.
      2. Visite les profils (Twitter, Instagram, anime
         forums) trouves.
      3. Sur /#/forgot-password : email uvogin@juice-sh.op,
         la question apparait (anime favori typique).
      4. Cross-reference la question avec les info des
         profils OSINT (anime characters mentionnes le plus
         souvent).
      5. Tape la reponse en /#/forgot-password, set un
         nouveau password.
      6. Login avec uvogin + nouveau password. Challenge
         se valide automatiquement.
      Source : OWASP Choosing Security Questions Cheat
      Sheet + codefixes/resetPasswordUvoginChallenge.info.
      yml fix #3 confirmant l'OSINT-ability des security
      questions.
    text_en: |
      [KILL_CHAIN_PROBABLE] General workflow (answer to
      OSINT in your instance):
      1. Run Sherlock: python sherlock uvogin
         -> lists existing profiles.
      2. Visit found profiles (Twitter, Instagram, anime
         forums).
      3. On /#/forgot-password: email
         uvogin@juice-sh.op, question appears (typical
         anime favorite).
      4. Cross-reference question with OSINT profile info
         (anime characters mentioned most often).
      5. Type answer on /#/forgot-password, set new
         password.
      6. Login with uvogin + new password. Challenge
         auto-solves.
      Source: OWASP Choosing Security Questions Cheat
      Sheet + codefixes/resetPasswordUvoginChallenge.info.
      yml fix #3 confirming security questions
      OSINT-ability.
      Defense: (1) replace character-preference security questions with TOTP/FIDO2 MFA — anime character answers are searchable on social media. (2) Rate-limit /forgot-password with CAPTCHA. (3) Notify the user by email on any reset attempt.
    pedagogical_intent: |
      Quasi-solution : workflow + version note.
