challenge_key: "forgottenDevBackupChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Pre-requis pedagogique : as-tu deja resolu Confidential
      Document (directoryListingChallenge) et/ou Easter Egg
      (easterEggLevelOne) ? Ces deux challenges utilisent le
      meme folder /ftp/ que celui-ci. Si oui, tu connais le
      pattern. Hint OWASP officiel #5 : "there is only one
      approach to pull this trick" — donc une seule technique
      marche, et c'est celle des challenges precedents.
    text_en: |
      Pedagogical prerequisite: have you solved Confidential
      Document (directoryListingChallenge) and/or Easter Egg
      (easterEggLevelOne)? These two challenges use the same
      /ftp/ folder as this one. If yes, you know the pattern.
      Official OWASP hint #5: "there is only one approach to
      pull this trick" — so only one technique works, and it
      is the one from previous challenges.
    pedagogical_intent: |
      Connect to prerequisite knowledge.

  N2:
    cost_pct: 10
    text_fr: |
      Hints OWASP officiels #1, #3, #4 convergent : le serveur
      filtre les extensions de fichiers, le fichier vise est
      bloque par ce filtre. Tu dois "trick a security mechanism
      into thinking that the file you want has a valid file
      type". Quel mecanisme bypass un filtre regex sur les
      extensions tout en laissant le filesystem ouvrir le vrai
      fichier ?
    text_en: |
      Official OWASP hints #1, #3, #4 converge: server filters
      file extensions, target file is blocked. You must "trick
      a security mechanism into thinking that the file you want
      has a valid file type". Which mechanism bypasses a regex
      extension filter while letting the filesystem open the
      real file?
    pedagogical_intent: |
      Reframe via the filter-vs-filesystem distinction.

  N3:
    cost_pct: 20
    text_fr: |
      Poison null byte. URL-encoded en %00 ou double-encoded
      en %2500. Le filtre regex voit la chaine complete avec
      l'extension whitelistee a la fin (.md), accepte. Le
      filesystem en C truncate sur le first null byte et ouvre
      le fichier reel (.bak). C'est exactement la technique
      d'easterEggLevelOne. Quel fichier viser dans /ftp/ ? Le
      DEV backup d'un developpeur typique = package.json (deps
      + versions). Donc /ftp/package.json.bak est la cible.
    text_en: |
      Poison null byte. URL-encoded as %00 or double-encoded
      as %2500. Regex filter sees the full string with
      allowlisted extension at the end (.md), accepts.
      Filesystem in C truncates on the first null byte and
      opens the real file (.bak). Exactly the
      easterEggLevelOne technique. Which file to target in
      /ftp/? A typical developer's DEV backup = package.json
      (deps + versions). So /ftp/package.json.bak is the
      target.
    pedagogical_intent: |
      Spell the technique + identify the exact target file.

  N4:
    cost_pct: 35
    text_fr: |
      URL exacte a tester :
      http://127.0.0.1:3000/ftp/package.json.bak%2500.md
      Le %2500 est le double-URL-encoding du null byte (le
      navigateur decode une fois %25 -> %, donnant %00, qui est
      le null byte). Le serveur (1) regex check : "package.json
      .bak%00.md" finit par .md, accepte. (2) filesystem :
      truncate sur \0, ouvre package.json.bak. Le contenu
      JSON apparait dans le navigateur.
    text_en: |
      Exact URL to try:
      http://127.0.0.1:3000/ftp/package.json.bak%2500.md
      The %2500 is double-URL-encoding of the null byte
      (browser decodes %25 -> %, yielding %00, which is the
      null byte). Server (1) regex check: "package.json.bak
      %00.md" ends in .md, accepts. (2) filesystem: truncate
      on \0, opens package.json.bak. JSON content shows in the
      browser.
    pedagogical_intent: |
      Spell exact URL with double-encoding explanation.

  N5:
    cost_pct: 50
    text_fr: |
      Workflow complet :
      1. Tape dans la barre d'adresse :
         http://127.0.0.1:3000/ftp/package.json.bak%2500.md
      2. Le serveur sert le contenu de package.json.bak.
      3. Sauvegarde le contenu localement (Right-click -> Save
         As, ou curl directement). Tu obtiens la liste des deps
         avec leurs versions. C'est la "mine d'or" pour les
         challenges suivants (persistedXssFeedback notamment
         exploite cette information pour identifier la version
         vulnerable de sanitize-html).
      4. Le challenge se valide automatiquement quand le serveur
         detecte le pattern d'acces avec null byte sur ce fichier
         specifique.
      Source : structure /ftp/ + null-byte technique documentee
      par easterEggLevelOne et Confidential Document codefixes.
      Defense : (1) allowlist d'extensions validee au niveau filesystem (pas regex sur la chaine de chemin). (2) CI gate empeche les fichiers .bak/.swp/~ dans les dossiers publics de l'image Docker. (3) Tous les secrets de package.json.bak doivent etre rotates via un secret manager — jamais hardcodes dans le repo (OWASP A05 + A06).
    text_en: |
      Complete workflow:
      1. Type in the address bar:
         http://127.0.0.1:3000/ftp/package.json.bak%2500.md
      2. Server serves package.json.bak content.
      3. Save content locally (Right-click -> Save As, or curl
         directly). You get the deps list with versions. The
         "goldmine" for upcoming challenges (notably
         persistedXssFeedback uses this info to identify the
         vulnerable sanitize-html version).
      4. Challenge auto-solves when server detects the
         null-byte access pattern on this specific file.
      Source: /ftp/ structure + null-byte technique documented
      by easterEggLevelOne and Confidential Document codefixes.
      Defense: (1) extension allowlist validated at filesystem level (not regex on path string). (2) CI gate preventing .bak/.swp/~ files in public Docker image folders. (3) All secrets in package.json.bak must be rotated via a secret manager — never hardcoded in repo (OWASP A05 + A06).
    pedagogical_intent: |
      Quasi-solution : full URL + downstream usage explanation.
