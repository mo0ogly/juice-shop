challenge_key: "dlpPasswordSprayingChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP #1 : "find some leaked access
      logs which happen to have a fairly common
      format". Donc cherche des access logs en
      OSINT externe. Hint #4 : "Password
      Spraying" (1 password testee sur many
      accounts).
    text_en: |
      OWASP hint #1: "find some leaked access
      logs which happen to have a fairly common
      format". So search access logs in
      external OSINT. Hint #4: "Password
      Spraying" (1 password tested on many
      accounts).
    pedagogical_intent: |
      Activate external OSINT reflex.

  N2:
    cost_pct: 10
    text_fr: |
      Hints OWASP #2 + #3 : "popular help
      platform for developers" (Stack
      Overflow) + "platform to share data
      quickly" (Pastebin). Recherche Google :
      "juice shop access log site:pastebin.
      com" ou "juice shop logs
      stackoverflow".
    text_en: |
      OWASP hints #2 + #3: "popular help
      platform for developers" (Stack
      Overflow) + "platform to share data
      quickly" (Pastebin). Google search:
      "juice shop access log site:pastebin.
      com" or "juice shop logs stackoverflow".
    pedagogical_intent: |
      Spell OSINT search method.

  N3:
    cost_pct: 20
    text_fr: |
      Le leaked log contient des entries type
      `GET /rest/user/login?email=J12934@juice-
      sh.op&password=<password>`. Le password
      est en URL clair (anti-pattern). Note
      l'email J12934 (ressemble a un employee
      ID) et le password.
    text_en: |
      Leaked log contains entries like `GET
      /rest/user/login?email=J12934@juice-
      sh.op&password=<password>`. Password
      in cleartext URL (anti-pattern). Note
      email J12934 (looks like employee ID)
      and password.
    pedagogical_intent: |
      Reveal log format.

  N4:
    cost_pct: 35
    text_fr: |
      Source verifiee (routes/login.ts:64) :
      `solveIf(() => req.body.email ===
      'J12934@juice-sh.op' && req.body.password
      === '0Y8rMnww$*9VFYE§59-!Fg1L6t&6lB')`.
      Donc l'email cible = J12934@juice-sh.op,
      password = `0Y8rMnww$*9VFYE§59-!Fg1L6t&
      6lB`. Login normal via /#/login.
    text_en: |
      Verified source (routes/login.ts:64):
      `solveIf(() => req.body.email ===
      'J12934@juice-sh.op' && req.body.
      password === '0Y8rMnww$*9VFYE§59-!Fg1L6t
      &6lB')`. So target email = J12934@juice-
      sh.op, password = `0Y8rMnww$*9VFYE§59-
      !Fg1L6t&6lB`. Normal login via /#/login.
    pedagogical_intent: |
      Reveal exact credentials.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Workflow :
      1. OSINT external Pastebin/Stack
         Overflow pour Juice Shop access logs.
      2. Find leak du log access avec entries
         GET /rest/user/login?email=...&
         password=... (passwords logged en
         URL).
      3. Extract email J12934@juice-sh.op +
         password 0Y8rMnww$*9VFYE§59-!Fg1L6
         t&6lB.
      4. /#/login avec ces credentials.
      5. Solve auto via login.ts:64.
      Pattern : alternative chain - resoudre
      accessLogDisclosure local d'abord,
      acceder /support/logs/access.log,
      extract password directement.
      Source : routes/login.ts:64 + OWASP
      Credential Stuffing Cheat Sheet.
      Defense : (a) passwords NEVER in URL
      (POST body only), (b) HaveIBeenPwned
      API check au login, (c) MFA mandatory,
      (d) anomaly detection.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Workflow:
      1. External OSINT Pastebin/Stack
         Overflow for Juice Shop access
         logs.
      2. Find log leak with entries GET
         /rest/user/login?email=...&password=
         ... (passwords logged in URL).
      3. Extract email J12934@juice-sh.op +
         password 0Y8rMnww$*9VFYE§59-!Fg1L
         6t&6lB.
      4. /#/login with these credentials.
      5. Auto solves via login.ts:64.
      Pattern: alternative chain - solve
      accessLogDisclosure local first, access
      /support/logs/access.log, extract
      password directly.
      Source: routes/login.ts:64 + OWASP
      Credential Stuffing Cheat Sheet.
      Defense: (a) passwords NEVER in URL
      (POST body only), (b) HaveIBeenPwned
      API check at login, (c) MFA mandatory,
      (d) anomaly detection.
    pedagogical_intent: |
      Solution + alternative chain + defense.
