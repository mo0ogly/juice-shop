challenge_key: "freeDeluxeChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hints OWASP #1, #2 : "what happens when you
      attempt to upgrade" + "try paying through
      different methods". Donc l'objectif est sur
      le upgrade flow. Naviguer /#/deluxe-
      membership et observer les options de
      payment.
    text_en: |
      OWASP hints #1, #2: "what happens when you
      attempt to upgrade" + "try paying through
      different methods". So objective on upgrade
      flow. Navigate /#/deluxe-membership and
      observe payment options.
    pedagogical_intent: |
      Activate upgrade flow exploration.

  N2:
    cost_pct: 10
    text_fr: |
      Hint OWASP #3 : "try inspecting the
      requests that go out using browser's
      developer tools". Ouvre DevTools Network
      tab, fais un upgrade attempt avec wallet
      OU card. Observe la requete : POST /rest/
      deluxe-membership avec body contenant
      `paymentMode` et `UserId`. C'est cette
      requete qu'il faut manipuler.
    text_en: |
      OWASP hint #3: "try inspecting the
      requests that go out using browser's
      developer tools". Open DevTools Network
      tab, do upgrade attempt with wallet OR
      card. Observe request: POST /rest/deluxe-
      membership with body containing
      `paymentMode` and `UserId`. This request
      to manipulate.
    pedagogical_intent: |
      Spell investigation method.

  N3:
    cost_pct: 20
    text_fr: |
      Hint OWASP #4 : "playing around with the
      parameters in these requests". Test :
      modifier `paymentMode` en autre string que
      'wallet' ou 'card' (par exemple 'free',
      'test', 'foo'). Submit la requete
      modifiee. Observer la response.
    text_en: |
      OWASP hint #4: "playing around with the
      parameters in these requests". Test:
      modify `paymentMode` to other string than
      'wallet' or 'card' (e.g., 'free', 'test',
      'foo'). Submit modified request. Observe
      response.
    pedagogical_intent: |
      Spell parameter manipulation.

  N4:
    cost_pct: 35
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Source serveur
      verifiee (routes/deluxe.ts:24-46) :
      ```js
      if (paymentMode === 'wallet') {
        // check balance, decrement
      }
      if (paymentMode === 'card') {
        // check card validity
      }
      const updatedUser = await user.update({
        role: deluxe });  // TOUJOURS execute
      solveIf(() => paymentMode !== 'wallet' &&
        paymentMode !== 'card');
      ```
      Donc si paymentMode='free', les ifs sont
      skip (no payment validation), update
      execute (user devient deluxe), solveIf
      match -> challenge solve auto.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Verified server
      source (routes/deluxe.ts:24-46):
      ```js
      if (paymentMode === 'wallet') {
        // check balance, decrement
      }
      if (paymentMode === 'card') {
        // check card validity
      }
      const updatedUser = await user.update({
        role: deluxe });  // ALWAYS executes
      solveIf(() => paymentMode !== 'wallet' &&
        paymentMode !== 'card');
      ```
      So if paymentMode='free', ifs skip (no
      payment validation), update executes
      (user becomes deluxe), solveIf matches
      -> challenge auto solves.
    pedagogical_intent: |
      Reveal exact code logic.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Workflow complet :
      1. Login Juice Shop comme customer (besoin
         authenticated user pour upgrade).
      2. Naviguer /#/deluxe-membership.
      3. Open DevTools Network tab.
      4. Cliquer "Pay using your wallet" ou
         "Pay using your card" pour capture la
         requete. Annuler avant submit si
         necessaire (pour voir la requete).
      5. Le request body capture est : `{
         paymentMode: "wallet" || "card",
         UserId: <ton id>, paymentId: ...}`.
      6. Construire un curl manuel ou Burp
         Repeater :
         ```bash
         curl -X POST
           http://localhost:3000/rest/deluxe-
           membership
           -H "Authorization: Bearer <token>"
           -H "Content-Type: application/json"
           -d '{"paymentMode":"free","UserId":1}'
         ```
      7. Le serveur :
         (a) skip wallet check (paymentMode !==
             'wallet')
         (b) skip card check (paymentMode !==
             'card')
         (c) user.update({role: deluxe}) -> user
             devient deluxe
         (d) solveIf check `paymentMode !==
             'wallet' && paymentMode !== 'card'`
             = true -> challenge solve auto
      8. Le user est UPGRADED a deluxe sans
         payment + challenge solve.
      Source canonique : routes/deluxe.ts:24-46
      + analyse order of operations.
      Defense canonique : (a) Sequelize validate
      `isIn: [['wallet', 'card']]` sur
      paymentMode. (b) reject AVANT user.update
      si autre paymentMode. (c) atomic
      transaction. (d) audit log + monitoring.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Full workflow:
      1. Login Juice Shop as customer (need
         authenticated user for upgrade).
      2. Navigate /#/deluxe-membership.
      3. Open DevTools Network tab.
      4. Click "Pay using your wallet" or "Pay
         using your card" to capture request.
         Cancel before submit if necessary (to
         see request).
      5. Captured request body: `{paymentMode:
         "wallet" || "card", UserId: <your id>,
         paymentId: ...}`.
      6. Build manual curl or Burp Repeater:
         ```bash
         curl -X POST
           http://localhost:3000/rest/deluxe-
           membership
           -H "Authorization: Bearer <token>"
           -H "Content-Type: application/json"
           -d '{"paymentMode":"free","UserId":1}'
         ```
      7. Server:
         (a) skip wallet check (paymentMode !==
             'wallet')
         (b) skip card check (paymentMode !==
             'card')
         (c) user.update({role: deluxe}) ->
             user becomes deluxe
         (d) solveIf check `paymentMode !==
             'wallet' && paymentMode !==
             'card'` = true -> challenge auto
             solves
      8. User UPGRADED to deluxe without
         payment + challenge solves.
      Canonical source: routes/deluxe.ts:24-46
      + order of operations analysis.
      Canonical defense: (a) Sequelize
      validate `isIn: [['wallet', 'card']]` on
      paymentMode. (b) reject BEFORE user.update
      if other paymentMode. (c) atomic
      transaction. (d) audit log + monitoring.
    pedagogical_intent: |
      Solution complete + atomic transaction
      defense.
