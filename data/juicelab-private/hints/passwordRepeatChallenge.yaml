challenge_key: "passwordRepeatChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #2 : "The obvious repetition
      in the User Registration form is the Repeat
      Password field". Donc l'objectif est de NE PAS
      repeat le password (DRY principle). Hint #1 +
      #4 : "cleverly interacting with the UI or
      bypassing it altogether".
    text_en: |
      Official OWASP hint #2: "The obvious repetition
      in the User Registration form is the Repeat
      Password field". So objective is NOT to repeat
      password (DRY principle). Hints #1 + #4:
      "cleverly interacting with the UI or bypassing
      it altogether".
    pedagogical_intent: |
      Activate frontend bypass on cross-field validation.

  N2:
    cost_pct: 10
    text_fr: |
      2 approches : (a) UI cleverness : ouvre DevTools,
      remove le `disabled` attribute du submit button
      via Elements panel, OU desactive le custom
      validator `passwordMatchValidator` dans le form.
      (b) Bypass complet : utiliser curl/Burp pour
      construire la requete POST /api/Users
      directement.
    text_en: |
      2 approaches: (a) UI cleverness: open DevTools,
      remove `disabled` attribute from submit button
      via Elements panel, OR disable custom
      validator `passwordMatchValidator` in form.
      (b) Full bypass: use curl/Burp to build POST
      /api/Users request directly.
    pedagogical_intent: |
      Spell 2 attack approaches.

  N3:
    cost_pct: 20
    text_fr: |
      Source serveur verifiee (routes/verify.ts:
      57-60) : `challengeUtils.solveIf(challenges.
      passwordRepeatChallenge, () => { return
      req.body && req.body.passwordRepeat !==
      req.body.password })`. Donc le check est
      strict-inequality. Submit avec password="A"
      et passwordRepeat="B" (ou empty/missing) ->
      match.
    text_en: |
      Verified server source (routes/verify.ts:
      57-60): `challengeUtils.solveIf(challenges.
      passwordRepeatChallenge, () => { return
      req.body && req.body.passwordRepeat !==
      req.body.password })`. So check is
      strict-inequality. Submit with password="A"
      and passwordRepeat="B" (or empty/missing) ->
      match.
    pedagogical_intent: |
      Reveal exact server check.

  N4:
    cost_pct: 35
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Construction du payload :
      ```bash
      curl -X POST http://localhost:3000/api/Users
        -H "Content-Type: application/json"
        -d '{
          "email":"dry@juice-sh.op",
          "password":"abc123",
          "passwordRepeat":"different",
          "securityQuestion":{"id":1},
          "securityAnswer":"x"
        }'
      ```
      Note critique : email NON-vide pour eviter de
      declencher emptyUserRegistration en meme
      temps. Password NON-empty pour le meme
      raison.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Payload construction:
      ```bash
      curl -X POST http://localhost:3000/api/Users
        -H "Content-Type: application/json"
        -d '{
          "email":"dry@juice-sh.op",
          "password":"abc123",
          "passwordRepeat":"different",
          "securityQuestion":{"id":1},
          "securityAnswer":"x"
        }'
      ```
      Critical note: NON-empty email to avoid
      triggering emptyUserRegistration
      simultaneously. NON-empty password for same
      reason.
    pedagogical_intent: |
      Spell exact payload + isolation.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Workflow complet :
      1. Approche A (UI bypass) : sur /#/register,
         remplir les fields normalement avec
         password="A" et repeat="B". Le submit
         button est disabled. Open DevTools,
         Elements tab, find the submit button,
         remove `disabled` attribute. Click submit.
      2. Approche B (full bypass via curl) :
         ```bash
         curl -X POST http://localhost:3000/api/Users
           -H "Content-Type: application/json"
           -d '{"email":"dry@juice-sh.op","password"
           :"abc","passwordRepeat":"xyz",
           "securityQuestion":{"id":1},
           "securityAnswer":"x"}'
         ```
      3. Le serveur :
         (a) Sequelize User.create reussit (pas de
             cross-field validation).
         (b) verify.passwordRepeatChallenge
             middleware (server.ts:421) check
             req.body.passwordRepeat !== req.body.
             password -> match -> challenge solve
             auto.
      4. Note : le user cree ne peut pas login
         (passwordRepeat n'est pas stocke ; seul le
         password est dans la DB). Le user existe
         avec le password de la requete.
      Source canonique : routes/verify.ts:57-60 +
      OWASP Input Validation Cheat Sheet.
      Defense canonique : schema joi/zod avec
      `.refine((data) => data.password === data.
      passwordRepeat)` + middleware retournant 400
      AVANT Sequelize User.create.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Full workflow:
      1. Approach A (UI bypass): on /#/register,
         fill fields normally with password="A"
         and repeat="B". Submit button disabled.
         Open DevTools, Elements tab, find submit
         button, remove `disabled` attribute.
         Click submit.
      2. Approach B (full curl bypass):
         ```bash
         curl -X POST http://localhost:3000/api/Users
           -H "Content-Type: application/json"
           -d '{"email":"dry@juice-sh.op","password"
           :"abc","passwordRepeat":"xyz",
           "securityQuestion":{"id":1},
           "securityAnswer":"x"}'
         ```
      3. Server:
         (a) Sequelize User.create succeeds (no
             cross-field validation).
         (b) verify.passwordRepeatChallenge
             middleware (server.ts:421) checks
             req.body.passwordRepeat !== req.body.
             password -> match -> challenge auto
             solves.
      4. Note: created user can't login
         (passwordRepeat not stored; only
         password is in DB). User exists with
         request password.
      Canonical source: routes/verify.ts:57-60 +
      OWASP Input Validation Cheat Sheet.
      Canonical defense: joi/zod schema with
      `.refine((data) => data.password === data.
      passwordRepeat)` + middleware returning 400
      BEFORE Sequelize User.create.
    pedagogical_intent: |
      Solution complete + 2 approches + defense.
