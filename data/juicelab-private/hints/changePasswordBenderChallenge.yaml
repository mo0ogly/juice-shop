challenge_key: "changePasswordBenderChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #2 : "It might also have been put
      into the Improper Input Validation category". Donc le
      bug est sur l'INPUT VALIDATION du password change
      endpoint. Hint #3 : "Bender's current password is so
      strong that brute force will probably not work". Donc
      la solution NE consiste PAS a deviner le password
      courant. Quoi d'autre alors ?
    text_en: |
      Official OWASP hint #2: "It might also have been put
      into the Improper Input Validation category". So bug
      is on INPUT VALIDATION of password change endpoint.
      Hint #3: "Bender's current password is so strong that
      brute force will probably not work". So solution is
      NOT to guess current password. What else then?
    pedagogical_intent: |
      Activate input validation reflex.

  N2:
    cost_pct: 10
    text_fr: |
      Inspecte la requete normale du formulaire change-
      password (DevTools Network). Tu verras GET ou PUT
      /rest/user/change-password?current=...&new=...&repeat=
      ... avec un Authorization: Bearer ... header. La
      question pedagogique : que se passe-t-il si tu OMETS
      le parametre `current` ? Le serveur valide-t-il son
      absence ?
    text_en: |
      Inspect the normal change-password form request
      (DevTools Network). You'll see GET or PUT /rest/user/
      change-password?current=...&new=...&repeat=... with
      Authorization: Bearer ... header. Pedagogical
      question: what happens if you OMIT `current`
      parameter? Does server validate its absence?
    pedagogical_intent: |
      Spell parameter omission attack.

  N3:
    cost_pct: 20
    text_fr: |
      Le code source Juice Shop (routes/changePassword.ts:
      39) verifie : `if (currentPassword &&
      security.hash(currentPassword) !==
      loggedInUser.data.password)`. AND short-circuit : si
      currentPassword est undefined, le if entier est
      faux, donc verification skippee. C'est un bug
      classique : verification conditionnelle au lieu
      d'obligatoire.
    text_en: |
      Juice Shop source (routes/changePassword.ts:39)
      checks: `if (currentPassword &&
      security.hash(currentPassword) !==
      loggedInUser.data.password)`. AND short-circuit: if
      currentPassword is undefined, whole if is false, so
      verification skipped. Classic bug: conditional
      verification instead of mandatory.
    pedagogical_intent: |
      Reveal the AND short-circuit bug.

  N4:
    cost_pct: 35
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Pre-requis (description OWASP
      interdit SQLi et Forgot Password) : posseder un
      Authorization token Bender. Vecteurs autorises pour
      l'obtenir : (a) intercepter le traffic d'un user
      Bender connecte (XSS reflechi via header XSS,
      HttpOnly bypass), (b) un autre challenge qui leak un
      JWT Bender (par ex. exfiltration of tokens via SSRF
      ou via path traversal), (c) si tu as deja resolu
      loginBender (qui utilise SQLi - exclu) tu as deja le
      token. Solution PROPRE = utiliser le token obtenu
      via une autre voie. Solve condition serveur :
      user.id === 3 && !currentPassword && password ===
      hash('slurmCl4ssic') (verifie ligne 54).
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Prerequisite (OWASP
      description bans SQLi and Forgot Password): possess
      Bender Authorization token. Allowed vectors to
      obtain it: (a) intercept Bender-logged-in user
      traffic (reflected XSS via header XSS, HttpOnly
      bypass), (b) another challenge leaking Bender JWT
      (e.g., token exfiltration via SSRF or path
      traversal), (c) if you already solved loginBender
      (which uses SQLi - excluded) you already have token.
      CLEAN solution = use token obtained via another
      route. Server solve condition: user.id === 3 &&
      !currentPassword && password ===
      hash('slurmCl4ssic') (verified line 54).
    pedagogical_intent: |
      Spell prerequisite + token sourcing.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Workflow complet :
      1. Obtiens un token Bender (vecteur de ton choix
         excluant SQLi/Forgot ; voir hint #4).
      2. Construis la requete : `curl -X GET
         "http://localhost:3000/rest/user/change-password?
         new=slurmCl4ssic&repeat=slurmCl4ssic"
         -H "Authorization: Bearer <bender_token>"`.
         IMPORTANT : OMETS le parametre `current` (l'omission
         declenche le AND short-circuit).
      3. Le serveur valide la requete (no current check)
         et update Bender's password.
      4. Le challenge solve auto via la condition ligne 54.
      Source canonique : routes/changePassword.ts:39
      (le bug) + ligne 54 (la solve condition).
      Defense canonique : verification OBLIGATOIRE du
      current password (cf. concept #3 dans le briefing).
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Full workflow:
      1. Obtain Bender token (vector of your choice
         excluding SQLi/Forgot; see hint #4).
      2. Build request: `curl -X GET
         "http://localhost:3000/rest/user/change-password?
         new=slurmCl4ssic&repeat=slurmCl4ssic"
         -H "Authorization: Bearer <bender_token>"`.
         IMPORTANT: OMIT `current` parameter (omission
         triggers AND short-circuit).
      3. Server validates request (no current check) and
         updates Bender's password.
      4. Challenge auto-solves via line 54 condition.
      Canonical source: routes/changePassword.ts:39 (bug)
      + line 54 (solve condition).
      Canonical defense: MANDATORY current password
      verification (cf. concept #3 in briefing).
    pedagogical_intent: |
      Quasi-solution : workflow + curl command + source
      reference.
