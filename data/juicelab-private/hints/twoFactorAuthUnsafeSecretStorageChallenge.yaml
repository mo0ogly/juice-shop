challenge_key: "twoFactorAuthUnsafeSecretStorageChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #1 : "The 2FA implementation
      requires to store a secret for every user. You will
      need to find a way to access this secret". Donc le
      bug est sur le STOCKAGE du shared secret TOTP. Hint
      #3 : la composante "critically sensitive" du TOTP
      est le shared secret (RFC 6238). Cible : wurstbrot@
      juice-sh.op (verifie via routes/2fa.ts ligne 44).
    text_en: |
      Official OWASP hint #1: "The 2FA implementation
      requires to store a secret for every user. You will
      need to find a way to access this secret". So bug
      is on TOTP shared secret STORAGE. Hint #3: TOTP's
      "critically sensitive" component is shared secret
      (RFC 6238). Target: wurstbrot@juice-sh.op (verified
      via routes/2fa.ts line 44).
    pedagogical_intent: |
      Activate TOTP shared-secret reflex.

  N2:
    cost_pct: 10
    text_fr: |
      Hint OWASP #4 : "Solving the challenge Retrieve a
      list of all user credentials via SQL Injection
      before tackling this one will definitely help".
      Donc pre-requis : unionSqlInjectionChallenge. Mais
      "it will not carry you all the way" — la SQLi est
      necessaire mais insuffisante. Que faut-il en plus ?
      Reflechis a comment generer un code TOTP a partir
      du secret stocke.
    text_en: |
      OWASP hint #4: "Solving the challenge Retrieve a
      list of all user credentials via SQL Injection
      before tackling this one will definitely help". So
      prerequisite: unionSqlInjectionChallenge. But "it
      will not carry you all the way" — SQLi is
      necessary but insufficient. What else? Think about
      how to generate TOTP code from stored secret.
    pedagogical_intent: |
      Spell prerequisite + reveal multi-step kill chain.

  N3:
    cost_pct: 20
    text_fr: |
      Workflow tooling : (a) SQLi UNION SELECT id, email,
      password, totpSecret FROM Users WHERE email = '
      wurstbrot@juice-sh.op'. Tu obtiens le hash bcrypt +
      le totpSecret en clair (en base32, ex.
      "JBSWY3DPEHPK3PXP"). (b) Crack le hash avec hashcat
      -m 3200 + rockyou.txt -> password en clair. (c)
      Importe le totpSecret dans Google Authenticator
      (manual entry, type Time-based) OU genere le code
      avec : `node -e "const otplib =
      require('otplib'); console.log(otplib.authenticator.
      generate('JBSWY3DPEHPK3PXP'))"`.
    text_en: |
      Tooling workflow: (a) SQLi UNION SELECT id, email,
      password, totpSecret FROM Users WHERE email = '
      wurstbrot@juice-sh.op'. You get bcrypt hash +
      cleartext totpSecret (in base32, e.g.,
      "JBSWY3DPEHPK3PXP"). (b) Crack hash with hashcat
      -m 3200 + rockyou.txt -> cleartext password. (c)
      Import totpSecret in Google Authenticator (manual
      entry, type Time-based) OR generate code with:
      `node -e "const otplib =
      require('otplib'); console.log(otplib.authenticator.
      generate('JBSWY3DPEHPK3PXP'))"`.
    pedagogical_intent: |
      Spell tooling for each step.

  N4:
    cost_pct: 35
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Source verifiee :
      - routes/2fa.ts:135 : `userModel.totpSecret =
        secret` (stockage plaintext, pas de chiffrement)
      - routes/2fa.ts:37 : `otplib.authenticator.check(
        totpToken, user.totpSecret)` (verifie en
        plaintext)
      - routes/2fa.ts:44 : `solveIf(...) => user.email
        === 'wurstbrot@' + config.get('application.
        domain')` (= wurstbrot@juice-sh.op)
      Login flow Juice Shop : (1) POST /rest/user/login
      avec email+password -> response 200 avec
      `status: 'totp_token_required'` + `tmpToken`. (2)
      POST /rest/2fa/verify avec {tmpToken, totpToken} ->
      success si TOTP correct. Le challenge solve auto
      sur la verif ligne 44 quand wurstbrot login + TOTP
      correct.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Verified source:
      - routes/2fa.ts:135: `userModel.totpSecret =
        secret` (plaintext storage, no encryption)
      - routes/2fa.ts:37: `otplib.authenticator.check(
        totpToken, user.totpSecret)` (verifies in
        plaintext)
      - routes/2fa.ts:44: `solveIf(...) => user.email
        === 'wurstbrot@' + config.get('application.
        domain')` (= wurstbrot@juice-sh.op)
      Juice Shop login flow: (1) POST /rest/user/login
      with email+password -> response 200 with
      `status: 'totp_token_required'` + `tmpToken`. (2)
      POST /rest/2fa/verify with {tmpToken, totpToken}
      -> success if TOTP correct. Challenge auto-solves
      on line 44 check when wurstbrot logs in + correct
      TOTP.
    pedagogical_intent: |
      Reveal exact code paths + login flow.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Workflow complet :
      1. Resoudre unionSqlInjectionChallenge en
         pre-requis.
      2. SQLi : `' UNION SELECT id,email,password,
         totpSecret,role,deluxeToken,lastLoginIp FROM
         Users--` (adapter colonnes selon dbSchema).
      3. Recuperer ligne wurstbrot : email +
         password_hash + totpSecret.
      4. hashcat -m 3200 wurstbrot.hash rockyou.txt ->
         password en clair.
      5. Generer TOTP code courant via :
         `node -e "console.log(require('otplib').
         authenticator.generate('<totpSecret>'))"`.
         (totpSecret est en base32, otplib accepte ce
         format directement).
      6. /#/login avec wurstbrot@juice-sh.op + password.
      7. 2FA prompt apparait. Soumettre le TOTP code
         (genere a step 5).
      8. Si le code rate (TOTP rotates every 30s),
         regenere a step 5 et resoumis. otplib.
         authenticator.options.window = 1 (cf. ligne
         16-20 de 2fa.ts) donc le code est valide aussi
         30s avant/apres = OK.
      9. Le challenge solve auto via la verif ligne 44.
      Source canonique : routes/2fa.ts (3 lignes
      verifees) + RFC 6238 (TOTP) + otplib docs.
      Defense canonique : (a) chiffrer totpSecret avec
      AES-GCM + master key dans HSM/KMS. (b) si SQLi
      exfiltre la DB, les secrets restent inutilisables.
      (c) MFA recovery via codes one-time pre-genres
      (jamais via security questions).
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Full workflow:
      1. Solve unionSqlInjectionChallenge as
         prerequisite.
      2. SQLi: `' UNION SELECT id,email,password,
         totpSecret,role,deluxeToken,lastLoginIp FROM
         Users--` (adapt columns per dbSchema).
      3. Retrieve wurstbrot row: email +
         password_hash + totpSecret.
      4. hashcat -m 3200 wurstbrot.hash rockyou.txt ->
         cleartext password.
      5. Generate current TOTP code via:
         `node -e "console.log(require('otplib').
         authenticator.generate('<totpSecret>'))"`.
         (totpSecret is in base32, otplib accepts this
         format directly).
      6. /#/login with wurstbrot@juice-sh.op +
         password.
      7. 2FA prompt appears. Submit TOTP code
         (generated at step 5).
      8. If code fails (TOTP rotates every 30s),
         regenerate at step 5 and resubmit. otplib.
         authenticator.options.window = 1 (cf. line
         16-20 of 2fa.ts) so code is valid 30s
         before/after = OK.
      9. Challenge auto-solves via line 44 check.
      Canonical source: routes/2fa.ts (3 verified
      lines) + RFC 6238 (TOTP) + otplib docs.
      Canonical defense: (a) encrypt totpSecret with
      AES-GCM + master key in HSM/KMS. (b) if SQLi
      exfiltrates DB, secrets remain unusable. (c) MFA
      recovery via pre-generated one-time codes (never
      via security questions).
    pedagogical_intent: |
      Solution complete + defense canonique multi-couche.
