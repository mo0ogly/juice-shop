challenge_key: "oauthUserPasswordChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #1 : "The security flaw behind
      this challenge is 100% OWASP Juice Shop's fault and
      0% Google's". Donc le bug est dans le code de Juice
      Shop, pas dans Google OAuth. Hint #3 : "take detailed
      look into how the OAuth login with Google is
      implemented". Tag du challenge : "Code Analysis".
    text_en: |
      Official OWASP hint #1: "The security flaw behind
      this challenge is 100% OWASP Juice Shop's fault and
      0% Google's". So bug is in Juice Shop code, not in
      Google OAuth. Hint #3: "take detailed look into how
      the OAuth login with Google is implemented".
      Challenge tag: "Code Analysis".
    pedagogical_intent: |
      Activate code analysis reflex on frontend.

  N2:
    cost_pct: 10
    text_fr: |
      Hint OWASP #4 : "It could bring you some insight to
      register with your own Google account and analyze
      closely what happens behind the scenes". Donc :
      (1) inscris-toi via Google OAuth avec ton propre
      compte. (2) Inspecte les requetes Network / Sources
      Angular bundle. Cherche comment Juice Shop genere
      ou stocke le password OAuth. Indice : ouvre
      DevTools sur la page de login juste apres consent
      Google.
    text_en: |
      OWASP hint #4: "It could bring you some insight to
      register with your own Google account and analyze
      closely what happens behind the scenes". So: (1)
      register via Google OAuth with your own account.
      (2) Inspect Network requests / Angular Sources
      bundle. Look at how Juice Shop generates or stores
      OAuth password. Hint: open DevTools on login page
      right after Google consent.
    pedagogical_intent: |
      Spell empirical investigation method.

  N3:
    cost_pct: 20
    text_fr: |
      Dans le bundle Angular (DevTools Sources, search
      `btoa` ou `reverse`), tu trouveras un pattern :
      `password = btoa(email.split('').reverse().
      join(''))`. C'est l'algorithme Juice Shop pour
      generer un password OAuth. Test : (1) prends ton
      email, (2) reverse les chars, (3) base64 encode.
      Tu obtiens ton password OAuth visible dans Network
      tab POST /rest/user/login.
    text_en: |
      In Angular bundle (DevTools Sources, search `btoa`
      or `reverse`), you'll find pattern: `password =
      btoa(email.split('').reverse().join(''))`. That's
      Juice Shop algorithm for OAuth password generation.
      Test: (1) take your email, (2) reverse chars, (3)
      base64 encode. You get your OAuth password visible
      in Network tab POST /rest/user/login.
    pedagogical_intent: |
      Reveal generation algorithm.

  N4:
    cost_pct: 35
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Source verifiee
      (routes/login.ts:65) : `challengeUtils.solveIf(
      challenges.oauthUserPasswordChallenge, () => {
      return req.body.email === 'bjoern.kimminich@gmail.
      com' && req.body.password ===
      'bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI=' })`. Donc le
      password attendu est exactement
      `bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI=`. Verifie :
      `echo bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI= | base64
      -d` -> `moc.liamg@hcinimmik.nreojb` -> reverse ->
      `bjoern.kimminich@gmail.com`. CQFD.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Verified source
      (routes/login.ts:65): `challengeUtils.solveIf(
      challenges.oauthUserPasswordChallenge, () => {
      return req.body.email === 'bjoern.kimminich@gmail.
      com' && req.body.password ===
      'bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI=' })`. So
      expected password is exactly
      `bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI=`. Verify:
      `echo bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI= | base64
      -d` -> `moc.liamg@hcinimmik.nreojb` -> reverse ->
      `bjoern.kimminich@gmail.com`. QED.
    pedagogical_intent: |
      Reveal exact server check.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Solution canonique :
      1. Email : bjoern.kimminich@gmail.com
      2. Password : bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI=
         (= base64(reverse('bjoern.kimminich@gmail.com')))
      3. Login normal sur /#/login.
      Le serveur verifie strict-equality (login.ts:65).
      Pas de hash intermediaire dans la verif solve mais
      le password est aussi stocke en hash dans la DB
      (regular login flow). La verif solve est sur le
      raw password en req.body. Pour reproduire pour un
      autre email cible (post-challenge) :
      `node -e "console.log(Buffer.from('email_target'.
      split('').reverse().join('')).toString('base64'))"`.
      Source canonique : routes/login.ts:65 (solve check) +
      Angular bundle (generation algo).
      Defense canonique : (1) Pas de password local pour
      OAuth-only users, (2) Si flow mixed, generer crypto
      random 128+ bits + storage hash, (3) Identifier
      via OIDC sub claim verifie cote serveur.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Canonical solution:
      1. Email: bjoern.kimminich@gmail.com
      2. Password: bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI=
         (= base64(reverse('bjoern.kimminich@gmail.com')))
      3. Normal login on /#/login.
      Server checks strict-equality (login.ts:65). No
      intermediate hash in solve check but password is
      also stored hashed in DB (regular login flow).
      Solve check is on raw password in req.body. To
      reproduce for another target email
      (post-challenge): `node -e "console.log(Buffer.
      from('target_email'.split('').reverse().join('')).
      toString('base64'))"`.
      Canonical source: routes/login.ts:65 (solve check)
      + Angular bundle (generation algo).
      Canonical defense: (1) No local password for
      OAuth-only users, (2) If mixed flow, generate
      crypto random 128+ bits + hash storage, (3)
      Identify via server-verified OIDC sub claim.
    pedagogical_intent: |
      Solution complete + reproductibilite + defense.
