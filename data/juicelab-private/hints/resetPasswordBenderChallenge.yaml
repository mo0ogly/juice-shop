challenge_key: "resetPasswordBenderChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #1 : "If you have no idea who Bender
      is, please put down this book right now and watch the
      first episodes of Futurama before you come back". Donc
      Bender = personnage de Futurama. La security question
      concerne probablement une appartenance ou affiliation du
      personnage Bender.
    text_en: |
      Official OWASP hint #1: "If you have no idea who Bender
      is, please put down this book right now and watch the
      first episodes of Futurama before you come back". So
      Bender = Futurama character. Security question likely
      concerns a membership/affiliation of the Bender character.
    pedagogical_intent: |
      Activate pop-culture OSINT reflex on Futurama.

  N2:
    cost_pct: 10
    text_fr: |
      Sur /#/forgot-password, entre bender@juice-sh.op. La
      security question s'affiche. C'est typiquement quelque
      chose comme "Company you first work for as an adult?" ou
      similar. Va sur Wikipedia "Bender (Futurama)" + Futurama
      Fandom Wiki pour trouver la reponse canonique.
    text_en: |
      On /#/forgot-password, enter bender@juice-sh.op. Security
      question appears. Typically something like "Company you
      first work for as an adult?" or similar. Go to Wikipedia
      "Bender (Futurama)" + Futurama Fandom Wiki to find
      canonical answer.
    pedagogical_intent: |
      Spell forgot-password discovery + OSINT sources.

  N3:
    cost_pct: 20
    text_fr: |
      Bender (Futurama) travaille typiquement chez "Planet
      Express" (la societe de delivery dans la serie). Mais hint
      OWASP #2 dit "Bender chose to answer his chosen question
      truthfully" : reponse litterale au sens du personnage.
      Hint OWASP #4 critique : "If a seemingly correct answer
      is not accepted, you might just need to try some
      alternative spelling".
    text_en: |
      Bender (Futurama) typically works at "Planet Express"
      (the delivery company in the show). But OWASP hint #2
      says "Bender chose to answer his chosen question
      truthfully": literal answer in character sense. OWASP
      hint #4 is critical: "If a seemingly correct answer is
      not accepted, you might just need to try some alternative
      spelling".
    pedagogical_intent: |
      Reveal canonical answer + spelling trap.

  N4:
    cost_pct: 35
    text_fr: |
      Si "Stop'n'Drop" est rejete (ou la reponse Wikipedia
      directe), essaie : alternative spellings (Stop'N'Drop /
      StopNDrop / Stop and Drop / Stop-and-Drop). Le pattern
      apostrophe non-uniforme entre l'API et la string source
      cassee Juice Shop est la racine du codefix #1 : "While
      not necessarily as trivial to research via a user's
      LinkedIn profile, the question is still easy to research
      or brute force when answered truthfully". Source :
      codefixes/resetPasswordBenderChallenge.info.yml.
    text_en: |
      If "Stop'n'Drop" is rejected (or direct Wikipedia answer),
      try: alternative spellings (Stop'N'Drop / StopNDrop /
      Stop and Drop / Stop-and-Drop). Apostrophe non-uniform
      between API and Juice Shop source string is root of
      codefix #1: "While not necessarily as trivial to research
      via a user's LinkedIn profile, the question is still easy
      to research or brute force when answered truthfully".
      Source: codefixes/
      resetPasswordBenderChallenge.info.yml.
    pedagogical_intent: |
      Spell alternative spelling pattern.

  N5:
    cost_pct: 50
    text_fr: |
      Workflow complet :
      1. /#/forgot-password
      2. Email : bender@juice-sh.op
      3. Security question : "Company you first work for as an
         adult?" (ou similar)
      4. Reponse : "Stop'n'Drop" (la societe que Bender voulait
         rejoindre comme suicide booth en S1E1 "Space Pilot
         3000"). Si reject, essaie : "Stop'N'Drop", "StopNDrop",
         "Stop and Drop".
      5. Set new password.
      6. Login bender@juice-sh.op + new password = solve.
      Source canonique : Wikipedia "Bender (Futurama)" + episode
      pilot transcript. Codefixes confirme l'OSINT-ability.
      Defense : (1) remplacer les questions de securite par MFA TOTP/FIDO2 — les reponses KBQ sont OSINT-ables depuis des profils publics. (2) Rate-limiter /forgot-password avec backoff exponentiel + CAPTCHA apres N tentatives. (3) Alerter l'utilisateur par email lors de toute tentative de reset password.
    text_en: |
      Full workflow:
      1. /#/forgot-password
      2. Email: bender@juice-sh.op
      3. Security question: "Company you first work for as an
         adult?" (or similar)
      4. Answer: "Stop'n'Drop" (the company Bender wanted to
         join as suicide booth in S1E1 "Space Pilot 3000"). If
         rejected, try: "Stop'N'Drop", "StopNDrop", "Stop and
         Drop".
      5. Set new password.
      6. Login bender@juice-sh.op + new password = solve.
      Canonical source: Wikipedia "Bender (Futurama)" + pilot
      episode transcript. Codefixes confirms OSINT-ability.
      Defense: (1) replace knowledge-based security questions with TOTP/FIDO2 MFA — KBQ answers are OSINT-able from public profiles. (2) Rate-limit /forgot-password endpoint with exponential backoff + CAPTCHA after N attempts. (3) Alert user by email on any password reset attempt.
    pedagogical_intent: |
      Quasi-solution : workflow + alternative spelling map.
