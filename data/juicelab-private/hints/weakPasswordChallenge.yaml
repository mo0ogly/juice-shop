challenge_key: "weakPasswordChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #1 : "This challenge can be solved
      with three different approaches". 3 vecteurs : guessing,
      hash cracking, online brute force. Hint #2 : "Guessing
      might work just fine" — donc le password est commun.
      Cible : admin@juice-sh.op (visible via product reviews
      / About Us / SQLi optionnel).
    text_en: |
      Official OWASP hint #1: "This challenge can be solved
      with three different approaches". 3 vectors: guessing,
      hash cracking, online brute force. Hint #2: "Guessing
      might work just fine" — so password is common. Target:
      admin@juice-sh.op (visible via product reviews / About
      Us / optional SQLi).
    pedagogical_intent: |
      Activate weak-password reflex.

  N2:
    cost_pct: 10
    text_fr: |
      Methode 1 (guess) : essaye les classics : admin,
      admin1, admin12, admin123, password, P@ssw0rd,
      Admin123!. Le tutorial Juice Shop natif
      (passwordStrength.ts) montre la sequence pedagogique
      en direct. Si tu ne veux pas brute force, lance le
      tutorial via le score-board.
    text_en: |
      Method 1 (guess): try classics: admin, admin1,
      admin12, admin123, password, P@ssw0rd, Admin123!.
      Juice Shop native tutorial (passwordStrength.ts) shows
      pedagogical sequence live. If you don't want to brute
      force, launch tutorial via score-board.
    pedagogical_intent: |
      Spell guess vector + tutorial reference.

  N3:
    cost_pct: 20
    text_fr: |
      Methode 2 (hash crack) : si tu as deja resolu
      exposedCredentialsChallenge (hash bcrypt visible dans
      le bundle) ou unionSqlInjectionChallenge (Users dump
      via SQLi), tu as l'admin hash en bcrypt
      ($2a$08$IpvOPb...). Lance hashcat -m 3200 hash.txt
      rockyou.txt. admin123 craque en quelques secondes
      (sub-1ms par hash, rockyou contient admin123 ligne
      ~50). Source : NIST 800-63B + codefixes/
      weakPasswordChallenge.info.yml fix #1.
    text_en: |
      Method 2 (hash crack): if you already solved
      exposedCredentialsChallenge (bcrypt hash visible in
      bundle) or unionSqlInjectionChallenge (Users dump via
      SQLi), you have admin hash in bcrypt ($2a$08$IpvOPb...).
      Run hashcat -m 3200 hash.txt rockyou.txt. admin123
      cracks in seconds (sub-1ms per hash, rockyou contains
      admin123 ~line 50). Source: NIST 800-63B + codefixes/
      weakPasswordChallenge.info.yml fix #1.
    pedagogical_intent: |
      Spell hash crack vector + tools.

  N4:
    cost_pct: 35
    text_fr: |
      Methode 3 (online brute force) : Burp Intruder ou
      ZAP, POST /rest/user/login avec body
      {email:"admin@juice-sh.op", password:"§FUZZ§"}. Charge
      la wordlist rockyou top-1000.txt. ~10 secondes pour
      tester tous les candidats. Note : si Juice Shop a un
      account lockout, tu seras bloque ; ce challenge n'a
      PAS le tag "Brute Force" dans challenges.yml donc
      lockout = leger.
    text_en: |
      Method 3 (online brute force): Burp Intruder or ZAP,
      POST /rest/user/login with body
      {email:"admin@juice-sh.op", password:"§FUZZ§"}. Load
      rockyou top-1000.txt wordlist. ~10 seconds to test
      all candidates. Note: if Juice Shop has account
      lockout, you'll be blocked; this challenge does NOT
      have "Brute Force" tag in challenges.yml so lockout =
      light.
    pedagogical_intent: |
      Spell online brute force tooling.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Solution canonique :
      1. Email : admin@juice-sh.op
      2. Password : admin123
      3. Login normal sur /#/login.
      Le tutorial Juice Shop natif (frontend/src/hacking-
      instructor/challenges/passwordStrength.ts) revele
      la sequence pedagogique : admin -> admin1 -> admin12
      -> admin123. Source code verbatim : "Just one more
      digit..." -> "🎉 Congratulations! You have been
      logged in as the administrator". Le challenge est
      tutorial-marked (tag "Tutorial" dans challenges.yml),
      donc difficulte 2/6 OWASP-officiel.
      Defense canonique (codefixes/
      weakPasswordChallenge.info.yml) :
      - NIST 800-63B 8+ chars (fix #1)
      - Dictionary check obligatoire (fix #1)
      - Pas de complexity filter "special chars" (fix #2,#3
        critiques sur ce point - users contournent)
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Canonical solution:
      1. Email: admin@juice-sh.op
      2. Password: admin123
      3. Normal login on /#/login.
      Juice Shop native tutorial (frontend/src/hacking-
      instructor/challenges/passwordStrength.ts) reveals
      pedagogical sequence: admin -> admin1 -> admin12 ->
      admin123. Verbatim source code: "Just one more
      digit..." -> "🎉 Congratulations! You have been
      logged in as the administrator". Challenge is
      tutorial-marked (tag "Tutorial" in challenges.yml),
      so difficulty 2/6 OWASP-official.
      Canonical defense (codefixes/
      weakPasswordChallenge.info.yml):
      - NIST 800-63B 8+ chars (fix #1)
      - Mandatory dictionary check (fix #1)
      - No "special chars" complexity filter (fix #2,#3
        critical on this point - users bypass)
    pedagogical_intent: |
      Solution complete + reference tutorial native +
      defense citee verbatim.
