challenge_key: "resetPasswordJimChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #1 : "The hardest part of this
      challenge is actually to find out who Jim actually is".
      Avant d'attaquer la security question, identifie qui
      est Jim. Indices Juice Shop : product reviews ecrites
      "Jim S." ou similaire, About Us page, ou SQLi sur Users.
    text_en: |
      Official OWASP hint #1: "The hardest part of this
      challenge is actually to find out who Jim actually is".
      Before attacking security question, identify who Jim
      is. Juice Shop hints: product reviews written by "Jim
      S." or similar, About Us page, or SQLi on Users.
    pedagogical_intent: |
      Activate identity recon (N0 OSINT phase).

  N2:
    cost_pct: 10
    text_fr: |
      Sur Juice Shop, regarde la About Us page ou les product
      reviews. Tu y verras des references aux user accounts
      avec personnages de pop-culture. Jim = "James T. Kirk"
      (capitaine de l'USS Enterprise, Star Trek). Email :
      jim@juice-sh.op. Hint OWASP #3 confirme : "As Jim is a
      celebrity, the answer to his question is quite easy to
      find".
    text_en: |
      On Juice Shop, look at About Us page or product
      reviews. You'll see references to user accounts with
      pop-culture characters. Jim = "James T. Kirk" (captain
      of USS Enterprise, Star Trek). Email: jim@juice-sh.op.
      OWASP hint #3 confirms: "As Jim is a celebrity, the
      answer to his question is quite easy to find".
    pedagogical_intent: |
      Reveal Jim identity + email.

  N3:
    cost_pct: 20
    text_fr: |
      Sur /#/forgot-password, entre jim@juice-sh.op. La
      security question s'affiche : typiquement "Name of your
      eldest sibling?" (verifie codefixes : fix #1 mentionne
      "eldest sibling" / fix #2 mentionne "eldest brother").
      Hint OWASP #2 : "Jim picked one of the worst security
      questions". Source : codefixes/
      resetPasswordJimChallenge.info.yml.
    text_en: |
      On /#/forgot-password, enter jim@juice-sh.op. Security
      question appears: typically "Name of your eldest
      sibling?" (verify codefixes: fix #1 mentions "eldest
      sibling" / fix #2 mentions "eldest brother"). OWASP
      hint #2: "Jim picked one of the worst security
      questions". Source: codefixes/
      resetPasswordJimChallenge.info.yml.
    pedagogical_intent: |
      Spell forgot-password discovery + question type.

  N4:
    cost_pct: 35
    text_fr: |
      Star Trek OSINT : sur Memory Alpha (memory-alpha.
      fandom.com) ou Wikipedia "James T. Kirk", cherche la
      famille Kirk. Frere aine de James = George Samuel
      Kirk. Le middle name commun "Samuel" est la reponse
      probable. Si "George" est rejete, essaie "Samuel". Hint
      OWASP #4 confirme brute force feasibility : "Even brute
      forcing the answer should be possible with the right
      kind of word list".
    text_en: |
      Star Trek OSINT: on Memory Alpha (memory-alpha.fandom.
      com) or Wikipedia "James T. Kirk", search Kirk family.
      James's elder brother = George Samuel Kirk. Common
      middle name "Samuel" is likely answer. If "George"
      rejected, try "Samuel". OWASP hint #4 confirms brute
      force feasibility: "Even brute forcing the answer
      should be possible with the right kind of word list".
    pedagogical_intent: |
      Reveal canonical answer + alt + brute fallback.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Workflow complet :
      1. /#/forgot-password
      2. Email : jim@juice-sh.op
      3. Security question : "Name of your eldest sibling?"
      4. Methode A (OSINT direct) : Memory Alpha "James T.
         Kirk" -> Family section -> elder brother George
         Samuel Kirk. Reponses a tester en ordre :
         (a) "Samuel" (middle name souvent la reponse "true"
             dans le canon Star Trek pour distinguer du
             pere George Kirk Sr.)
         (b) "George"
         (c) "George Samuel"
      5. Methode B (Brute force) : ZAP/Burp Intruder POST
         /rest/user/reset-password avec wordlist
         male-first-names.txt (~3000 entries, SecLists/
         Names/male-first-names-*.txt). Quelques minutes.
      6. Set new password.
      7. Login jim@juice-sh.op + new password = solve.
      Source canonique : Memory Alpha + Wikipedia + episode
      S1E22 "Operation: Annihilate!" (1967, premiere
      apparition de George Samuel Kirk).
      Defense : (1) remplacer les questions sur les noms de fratrie par MFA TOTP/FIDO2 — les reponses sont OSINT-ables depuis les wikis fans. (2) Rate-limiter /rest/user/reset-password avec CAPTCHA + backoff exponentiel. (3) Notification email pour toute tentative de reset.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] Full workflow:
      1. /#/forgot-password
      2. Email: jim@juice-sh.op
      3. Security question: "Name of your eldest sibling?"
      4. Method A (Direct OSINT): Memory Alpha "James T.
         Kirk" -> Family section -> elder brother George
         Samuel Kirk. Try answers in order:
         (a) "Samuel" (middle name often "true" answer in
             Star Trek canon to distinguish from father George
             Kirk Sr.)
         (b) "George"
         (c) "George Samuel"
      5. Method B (Brute force): ZAP/Burp Intruder POST
         /rest/user/reset-password with wordlist
         male-first-names.txt (~3000 entries, SecLists/
         Names/male-first-names-*.txt). Few minutes.
      6. Set new password.
      7. Login jim@juice-sh.op + new password = solve.
      Canonical source: Memory Alpha + Wikipedia + episode
      S1E22 "Operation: Annihilate!" (1967, first
      appearance of George Samuel Kirk).
      Defense: (1) replace sibling-name security questions with TOTP/FIDO2 MFA — answers are OSINT-able from fan wikis. (2) Rate-limit /rest/user/reset-password with CAPTCHA + exponential backoff. (3) Email notification on any reset attempt.
    pedagogical_intent: |
      Quasi-solution : workflow + 2 methods + canonical
      answer ordering.
