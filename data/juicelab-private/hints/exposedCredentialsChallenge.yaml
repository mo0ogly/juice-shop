challenge_key: "exposedCredentialsChallenge"
schema_version: "juicelab.hints.v1"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Le code JavaScript livre par l'application au navigateur est par
      definition lisible par n'importe qui. Pourtant, il arrive que des
      developpeurs y laissent par inattention des informations sensibles :
      cles d'API, identifiants techniques, mots de passe de comptes de test.
      Ou regarder pour voir tout ce code ?
    text_en: |
      The JavaScript code shipped by the application to the browser is, by
      definition, readable by anyone. Yet developers sometimes carelessly
      leave sensitive information in there: API keys, technical
      identifiers, test account passwords. Where can you read all that
      code?
    pedagogical_intent: |
      Activate the reflex: client-side code = public code.

  N2:
    cost_pct: 10
    text_fr: |
      Les DevTools de ton navigateur ont un onglet Sources qui te donne
      acces a tous les fichiers JS charges par la page, y compris le bundle
      principal de l'application. Une fois dedans, la fonctionnalite de
      recherche en plein texte (Ctrl-Maj-F sur Chrome) parcourt tous les
      fichiers en parallele.
    text_en: |
      Your browser DevTools have a Sources tab that gives access to every
      JS file loaded by the page, including the main app bundle. Once in
      there, full-text search (Ctrl-Shift-F in Chrome) scans every file in
      parallel.
    pedagogical_intent: |
      Introduce DevTools Sources + global text search.

  N3:
    cost_pct: 20
    text_fr: |
      Dans la recherche globale des Sources, tape des mots evocateurs :
      password, pw, username, email. Des chaines de caracteres
      hardcodees apparaitront. Filtre les resultats : tu cherches un
      couple email + password qui ressemble a un compte de test (souvent
      "testing", "demo", "dev", "qa").
    text_en: |
      In the Sources global search, type telling keywords: password, pw,
      username, email. Hardcoded strings will appear. Filter the results:
      you are looking for an email + password pair that looks like a test
      account (often "testing", "demo", "dev", "qa").
    pedagogical_intent: |
      Localize the search: combine sensitive keywords with the test-account heuristic.

  N4:
    cost_pct: 35
    text_fr: |
      Le compte expose dans le bundle Juice Shop est un compte de test
      dont l'email se termine en @juice-sh.op et dont le mot de passe est
      explicite (il contient le mot Used et le mot Testing concatenes).
      Une fois trouve, va sur la page de login et utilise ces credentials.
      Le challenge se valide quand un login reussit avec ces identifiants.
    text_en: |
      The exposed account in the Juice Shop bundle is a test account whose
      email ends in @juice-sh.op and whose password is explicit (it
      contains the words Used and Testing concatenated). Once found, go to
      the login page and use those credentials. The challenge is validated
      when a login succeeds with those credentials.
    pedagogical_intent: |
      Reveal the shape of the credentials without giving the literal value.

  N5:
    cost_pct: 50
    text_fr: |
      Identifiants exposes : email = testing@juice-sh.op, password =
      IamUsedForTesting. Dans les DevTools Sources, fais une recherche
      Ctrl-Maj-F sur "IamUsedForTesting" pour voir le contexte exact.
      Va sur /#/login, saisis ces deux valeurs, clique Log in. Le
      challenge Exposed Credentials est valide automatiquement par Juice
      Shop des que la combinaison correspond.
    text_en: |
      Exposed credentials: email = testing@juice-sh.op, password =
      IamUsedForTesting. In DevTools Sources, run Ctrl-Shift-F on
      "IamUsedForTesting" to see the exact context. Go to /#/login, enter
      those two values, click Log in. The Exposed Credentials challenge is
      auto-validated by Juice Shop as soon as the combination matches.
    pedagogical_intent: |
      Quasi-solution: full credentials with the way to verify in DevTools.
