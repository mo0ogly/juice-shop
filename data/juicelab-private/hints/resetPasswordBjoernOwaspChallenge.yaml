challenge_key: "resetPasswordBjoernOwaspChallenge"
schema_version: "juicelab.hints.v2"

hints:
  N1:
    cost_pct: 5
    text_fr: |
      Hint OWASP officiel #1 : "Hints to the answer to
      Bjoern's question can be found by looking him up on the
      Internet". OSINT classique. Compte cible :
      bjoern.kimminich@gmail.com (OWASP, different du
      bjoern@juice-sh.op interne).
    text_en: |
      Official OWASP hint #1: "Hints to the answer to
      Bjoern's question can be found by looking him up on the
      Internet". Classic OSINT. Target account:
      bjoern.kimminich@gmail.com (OWASP, different from
      bjoern@juice-sh.op internal).
    pedagogical_intent: |
      Activate OSINT reflex on conference speaker.

  N2:
    cost_pct: 10
    text_fr: |
      Hint OWASP #2 (specifique a ce challenge) : "Bjoern
      might have accidentally (?) doxxed himself by mentioning
      his security answer on at least one occasion where a
      camera was running". Donc cherche les VIDEOS de Bjoern,
      pas les profils Facebook/LinkedIn. Sources : YouTube +
      OWASP AppSec talks archives + conference recordings.
    text_en: |
      OWASP hint #2 (challenge-specific): "Bjoern might have
      accidentally (?) doxxed himself by mentioning his
      security answer on at least one occasion where a camera
      was running". So search Bjoern's VIDEOS, not Facebook/
      LinkedIn profiles. Sources: YouTube + OWASP AppSec talks
      archives + conference recordings.
    pedagogical_intent: |
      Spell video OSINT vector.

  N3:
    cost_pct: 20
    text_fr: |
      Sur /#/forgot-password, entre bjoern.kimminich@gmail.com.
      La security question s'affiche : typiquement "Name of
      your favorite pet?" (la question recurrente sur les
      OWASP/Bjoern leaks). Recherche YouTube : "Bjoern
      Kimminich OWASP" + "Bjoern Kimminich AppSec" + "Bjoern
      Kimminich Juice Shop". Bjoern a probablement mentionne
      le nom de son chat dans un talk.
    text_en: |
      On /#/forgot-password, enter
      bjoern.kimminich@gmail.com. Security question appears:
      typically "Name of your favorite pet?" (recurring
      question on OWASP/Bjoern leaks). YouTube search: "Bjoern
      Kimminich OWASP" + "Bjoern Kimminich AppSec" + "Bjoern
      Kimminich Juice Shop". Bjoern likely mentioned cat name
      in a talk.
    pedagogical_intent: |
      Spell forgot-password discovery + video search query.

  N4:
    cost_pct: 35
    text_fr: |
      Si tu ne trouves pas la video, hint #3 OWASP est ton
      plan B : "Brute forcing the answer might be very well
      possible with a sufficiently extensive list of common
      pet names". Wordlist : SecLists/Passwords/Common-
      Credentials/pet-names.txt OU dictionnaire generique
      English Animal Names + Top Pet Names 2010-2025. Le rate
      limiting Juice Shop sur forgot-password est leger pour
      ce challenge specifique (verifier dans
      challenges.yml — pas de tag Brute Force ici, donc pas
      de captcha enforcement).
    text_en: |
      If you can't find video, OWASP hint #3 is plan B:
      "Brute forcing the answer might be very well possible
      with a sufficiently extensive list of common pet names".
      Wordlist: SecLists/Passwords/Common-Credentials/
      pet-names.txt OR generic dictionary English Animal Names
      + Top Pet Names 2010-2025. Juice Shop rate limiting on
      forgot-password is light for this specific challenge
      (verify in challenges.yml — no Brute Force tag here, so
      no captcha enforcement).
    pedagogical_intent: |
      Spell brute force fallback + tools.

  N5:
    cost_pct: 50
    text_fr: |
      [KILL_CHAIN_DOCUMENTED] Workflow general :
      1. /#/forgot-password
      2. Email : bjoern.kimminich@gmail.com
      3. Security question : "Name of your favorite pet?" (ou
         similar)
      4. Methode A (OSINT video) : YouTube search "Bjoern
         Kimminich" -> regarder talks recents (OWASP AppSec
         EU 2018+, Juice Shop talks). Bjoern mentionne ses
         chats dans plusieurs talks ; "Zaya" est le pet name
         souvent reference (chat blanc/noir, mentionne dans le
         pwning OWASP Juice Shop ebook intro et plusieurs
         talks).
      5. Methode B (Brute force) : Burp Intruder ou script
         Python POST /rest/user/reset-password avec
         answer=<wordlist pet names>. ~5000 candidates ~
         quelques minutes.
      6. Set new password.
      7. Login bjoern.kimminich@gmail.com + new password =
         solve.
      Source canonique : codefixes/
      resetPasswordBjoernOwaspChallenge.info.yml + ebook
      Pwning Juice Shop reference Zaya.
      Defense : (1) remplacer les questions sur les animaux de compagnie par MFA TOTP/FIDO2 — les pet names sont devinables depuis les reseaux sociaux et les talks publics. (2) Rate-limiting strict sur /rest/user/reset-password avec CAPTCHA. (3) Notification email a l'utilisateur pour chaque tentative de reset.
    text_en: |
      [KILL_CHAIN_DOCUMENTED] General workflow:
      1. /#/forgot-password
      2. Email: bjoern.kimminich@gmail.com
      3. Security question: "Name of your favorite pet?" (or
         similar)
      4. Method A (Video OSINT): YouTube search "Bjoern
         Kimminich" -> watch recent talks (OWASP AppSec EU
         2018+, Juice Shop talks). Bjoern mentions cats in
         several talks; "Zaya" is the often-referenced pet
         name (white/black cat, mentioned in pwning OWASP
         Juice Shop ebook intro and several talks).
      5. Method B (Brute force): Burp Intruder or Python
         script POST /rest/user/reset-password with
         answer=<pet names wordlist>. ~5000 candidates ~few
         minutes.
      6. Set new password.
      7. Login bjoern.kimminich@gmail.com + new password =
         solve.
      Canonical source: codefixes/
      resetPasswordBjoernOwaspChallenge.info.yml + Pwning
      Juice Shop ebook Zaya reference.
      Defense: (1) replace pet-name security questions with TOTP/FIDO2 MFA — pet names are guessable from social media and talks. (2) Strict rate-limiting on /rest/user/reset-password with CAPTCHA. (3) Email notification to user on every reset attempt regardless of success.
    pedagogical_intent: |
      Quasi-solution : workflow + 2 attack methods.
