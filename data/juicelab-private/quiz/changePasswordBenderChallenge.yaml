challenge_key: "changePasswordBenderChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Le bug racine se trouve dans routes/changePassword.ts
      ligne 39 : `if (currentPassword && security.
      hash(currentPassword) !== loggedInUser.data.password)
      { ...401 }`. Pourquoi cette construction est-elle
      vulnerable ?
    question_en: |
      Root bug is in routes/changePassword.ts line 39: `if
      (currentPassword && security.hash(currentPassword)
      !== loggedInUser.data.password) { ...401 }`. Why is
      this construct vulnerable?
    options_fr:
      - "Parce que bcrypt est lent"
      - "Parce que le AND short-circuit JavaScript fait que tout le if est evalue a false quand currentPassword est undefined/null/empty. Donc l'attaquant omet simplement le parametre `current` dans la query et la verification de l'authentification est skippee. Pattern : verification conditionnelle au lieu d'obligatoire = trou de securite classique"
      - "Parce que !== compare les types"
      - "Parce que hash() est pas atomic"
    options_en:
      - "Because bcrypt is slow"
      - "Because JavaScript AND short-circuit makes whole if evaluate to false when currentPassword is undefined/null/empty. So attacker simply omits `current` parameter in query and authentication verification is skipped. Pattern: conditional verification instead of mandatory = classic security hole"
      - "Because !== compares types"
      - "Because hash() isn't atomic"
    correct: 1
    explanation_fr: |
      Pattern reusable : verification d'authenticite ne
      doit JAMAIS etre conditionnelle. Le code correct est :
      `if (!currentPassword || security.hash(currentPassword)
      !== ...) { return 401 }`. Verification de presence +
      verification de match en obligatoire. Source :
      routes/changePassword.ts:39 + OWASP Authentication
      Cheat Sheet.
    explanation_en: |
      Reusable pattern: authenticity verification must
      NEVER be conditional. Correct code: `if
      (!currentPassword || security.hash(currentPassword)
      !== ...) { return 401 }`. Presence check + match
      check both mandatory. Source: routes/changePassword.
      ts:39 + OWASP Authentication Cheat Sheet.

  Q2:
    type: multiple_choice
    question_fr: |
      Hint OWASP #1 : "In previous releases this challenge
      was wrongly accused of being based on CSRF".
      Pourquoi le re-classement ?
    question_en: |
      OWASP hint #1: "In previous releases this challenge
      was wrongly accused of being based on CSRF". Why
      re-classification?
    options_fr:
      - "CSRF n'est plus a la mode"
      - "Avec les browser defaults modernes (CORS strict, SameSite=Lax cookies par defaut Chrome 80+, Firefox 100+), CSRF traditionnel sur cross-origin POST n'est PLUS viable. La VRAIE vuln est l'AND short-circuit du code. OWASP re-classe sur la racine technique (Improper Input Validation) plutot que sur le delivery vector (CSRF) qui n'est plus exploitable"
      - "OWASP a fait une erreur"
      - "Bender l'a demande"
    options_en:
      - "CSRF is no longer trendy"
      - "With modern browser defaults (CORS strict, default SameSite=Lax cookies Chrome 80+, Firefox 100+), traditional CSRF on cross-origin POST is NO LONGER viable. TRUE vuln is code's AND short-circuit. OWASP re-classifies on technical root (Improper Input Validation) rather than delivery vector (CSRF) no longer exploitable"
      - "OWASP made a mistake"
      - "Bender asked for it"
    correct: 1
    explanation_fr: |
      Pattern reusable : les vulns sont caracterisees par
      LEUR RACINE TECHNIQUE (le bug code), pas par le
      DELIVERY VECTOR (comment l'exploiter dans le browser
      d'un user). La racine est stable, le vector evolue
      avec browser security. Lesson : threat modeling
      doit toujours descendre au code-level. Source :
      analyse cross-temporelle du challenge + OWASP CSRF
      Cheat Sheet (deprecation context).
    explanation_en: |
      Reusable pattern: vulns characterized by THEIR
      TECHNICAL ROOT (code bug), not DELIVERY VECTOR (how
      to exploit in user's browser). Root is stable,
      vector evolves with browser security. Lesson:
      threat modeling must always descend to code-level.
      Source: cross-temporal challenge analysis + OWASP
      CSRF Cheat Sheet (deprecation context).

  Q3:
    type: multiple_choice
    question_fr: |
      Quelle est la defense canonique recommandee par OWASP
      Authentication Cheat Sheet (la mitigationUrl du
      challenge) pour eviter ce bug ?
    question_en: |
      What canonical defense recommended by OWASP
      Authentication Cheat Sheet (challenge mitigationUrl)
      to avoid this bug?
    options_fr:
      - "Forcer HTTPS sur change-password"
      - "Re-authenticate before performing critical operations : (a) verifier OBLIGATOIREMENT (pas conditionnellement) le current password ; (b) demander 2FA/step-up auth pour password change ; (c) limiter le rate (account lockout sur 3 echecs) ; (d) loguer + alerter sur changes. Le code correct elimine le AND short-circuit avec `if (!currentPassword \\|\\| hash(...) !== ...)`"
      - "Hashe le new password 2 fois"
      - "Stocker le password en plaintext"
    options_en:
      - "Force HTTPS on change-password"
      - "Re-authenticate before performing critical operations: (a) MANDATORY (not conditional) verification of current password; (b) require 2FA/step-up auth for password change; (c) rate limit (account lockout on 3 failures); (d) log + alert on changes. Correct code eliminates AND short-circuit with `if (!currentPassword \\|\\| hash(...) !== ...)`"
      - "Hash new password twice"
      - "Store password in plaintext"
    correct: 1
    explanation_fr: |
      Pattern reusable : la defense en profondeur (DiD)
      combine plusieurs couches : code-level fix
      (verification obligatoire) + protocol-level
      (re-auth, 2FA) + monitoring (rate limit, audit
      logs). Source : OWASP Authentication Cheat Sheet +
      analyse code routes/changePassword.ts.
    explanation_en: |
      Reusable pattern: Defense in Depth (DiD) combines
      multiple layers: code-level fix (mandatory
      verification) + protocol-level (re-auth, 2FA) +
      monitoring (rate limit, audit logs). Source: OWASP
      Authentication Cheat Sheet + routes/changePassword.
      ts code analysis.
