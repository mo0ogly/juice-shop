challenge_key: "passwordRepeatChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      La description OWASP : "Follow the DRY principle
      while registering a user". Quelle est l'ironie
      pedagogique du wording ?
    question_en: |
      OWASP description: "Follow the DRY principle
      while registering a user". What's the
      pedagogical irony of wording?
    options_fr:
      - "DRY n'est pas important"
      - "DRY (Don't Repeat Yourself) est typiquement une bonne pratique INGENIERIE. Mais le formulaire register VIOLE DRY avec son Repeat Password field. Le challenge demande de 'follow DRY' = ne PAS repeat le password = exposer la VULNERABILITE serveur (cross-field validation manquante). C'est une wordplay : suivre une bonne pratique ingenierie REVELE un bug security. Pattern reusable : pedagogie via paradoxe"
      - "DRY est une vulnerabilite"
      - "Repeat Password est obligatoire"
    options_en:
      - "DRY isn't important"
      - "DRY (Don't Repeat Yourself) is typically GOOD ENGINEERING practice. But register form VIOLATES DRY with its Repeat Password field. Challenge asks 'follow DRY' = NOT repeat password = expose SERVER VULNERABILITY (missing cross-field validation). Wordplay: following engineering good practice REVEALS security bug. Reusable pattern: pedagogy via paradox"
      - "DRY is a vulnerability"
      - "Repeat Password is mandatory"
    correct: 1
    explanation_fr: |
      Pattern reusable : la pedagogie OWASP utilise
      souvent des wordplays pour rendre les
      challenges memorables. "Follow DRY" est un
      pun : DRY engineering principle = good ; DRY
      registration = bypass vuln. Le student qui
      lit ATTENTIVEMENT la description trouve la
      cle. Source : OWASP description +
      methodologie pedagogique.
    explanation_en: |
      Reusable pattern: OWASP pedagogy often uses
      wordplays to make challenges memorable.
      "Follow DRY" is a pun: DRY engineering
      principle = good; DRY registration = bypass
      vuln. Student reading description CAREFULLY
      finds the key. Source: OWASP description +
      pedagogical methodology.

  Q2:
    type: multiple_choice
    question_fr: |
      passwordRepeatChallenge cible une CROSS-FIELD
      validation (password vs passwordRepeat).
      Pourquoi ce type est-il PARTICULIEREMENT
      vulnerable ?
    question_en: |
      passwordRepeatChallenge targets CROSS-FIELD
      validation (password vs passwordRepeat). Why
      is this type PARTICULARLY vulnerable?
    options_fr:
      - "Parce que JavaScript est lent"
      - "Parce que les Sequelize validators model-level operent sur UN seul field a la fois (notEmpty, isEmail). Pour cross-field (password === passwordRepeat), il faut explicit middleware OU schema joi/zod avec `.refine()`. Beaucoup de developers oublient ce niveau ; le frontend Angular le fait avec un custom validator donc l'impression que c'est protege. Pattern : ORM validation level != cross-field validation"
      - "Parce que les passwords sont sensibles"
      - "Parce que repeat est un mot reserve"
    options_en:
      - "Because JavaScript is slow"
      - "Because Sequelize validators are model-level operating on ONE field at a time (notEmpty, isEmail). For cross-field (password === passwordRepeat), need explicit middleware OR joi/zod schema with `.refine()`. Many developers forget this level; Angular frontend does it with custom validator giving impression it's protected. Pattern: ORM validation level != cross-field validation"
      - "Because passwords are sensitive"
      - "Because repeat is reserved word"
    correct: 1
    explanation_fr: |
      Pattern reusable : connaitre les niveaux de
      validation et ne pas les confondre. Niveau 1
      (single-field) = Sequelize/Mongoose model
      validators. Niveau 2 (cross-field) =
      schema-level (joi/zod refine). Niveau 3
      (cross-row) = DB constraints (UNIQUE on email)
      ou business logic dans transaction. Niveau 4
      (cross-entity) = service-layer policies.
      Source : routes/verify.ts:57-60 + analyse
      Sequelize docs.
    explanation_en: |
      Reusable pattern: know validation levels and
      don't confuse them. Level 1 (single-field) =
      Sequelize/Mongoose model validators. Level 2
      (cross-field) = schema-level (joi/zod
      refine). Level 3 (cross-row) = DB constraints
      (UNIQUE on email) or business logic in
      transaction. Level 4 (cross-entity) =
      service-layer policies. Source: routes/
      verify.ts:57-60 + Sequelize docs analysis.

  Q3:
    type: multiple_choice
    question_fr: |
      Quelle est la defense canonique pour eviter
      ce challenge ET emptyUserRegistration ET
      registerAdminChallenge en meme temps ?
    question_en: |
      What's the canonical defense to avoid this
      challenge AND emptyUserRegistration AND
      registerAdminChallenge simultaneously?
    options_fr:
      - "3 middleware separes"
      - "UN SEUL schema validation joi/zod sur le request body : (a) Whitelist fields (email, password, passwordRepeat, securityQuestion, securityAnswer) - bloque registerAdmin. (b) Required + format validation sur chaque - bloque emptyUser. (c) Cross-field refine `password === passwordRepeat` - bloque passwordRepeat. (d) Strip tout autre field. Pattern : un middleware schema centralized vaut mieux que N checks isoles"
      - "Disabler /api/Users"
      - "Stocker tous les fields"
    options_en:
      - "3 separate middlewares"
      - "ONE joi/zod schema validation on request body: (a) Whitelist fields (email, password, passwordRepeat, securityQuestion, securityAnswer) - blocks registerAdmin. (b) Required + format validation on each - blocks emptyUser. (c) Cross-field refine `password === passwordRepeat` - blocks passwordRepeat. (d) Strip any other field. Pattern: one centralized schema middleware better than N isolated checks"
      - "Disable /api/Users"
      - "Store all fields"
    correct: 1
    explanation_fr: |
      Pattern reusable : centralizer la validation
      via schema declaratif (joi, zod, yup, ajv) =
      defense uniforme + maintainable + auditable.
      Production : utiliser `class-validator`
      (NestJS), `Pydantic` (FastAPI), `joi`
      (Express). Source : OWASP Input Validation
      Cheat Sheet + best practices schema-driven
      validation.
    explanation_en: |
      Reusable pattern: centralize validation via
      declarative schema (joi, zod, yup, ajv) =
      uniform + maintainable + auditable defense.
      Production: use `class-validator` (NestJS),
      `Pydantic` (FastAPI), `joi` (Express).
      Source: OWASP Input Validation Cheat Sheet +
      schema-driven validation best practices.
