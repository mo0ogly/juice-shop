challenge_key: "exposedCredentialsChallenge"
schema_version: "juicelab.quiz.v1"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Pourquoi tout secret hardcode dans le bundle JavaScript livre au
      navigateur est-il par definition compromis ?
    question_en: |
      Why is any secret hardcoded in the JavaScript bundle delivered to
      the browser definitively compromised?
    options_fr:
      - "Parce que la minification rend le code illisible aux developpeurs honnetes mais pas aux attaquants"
      - "Parce que le bundle est telecharge cote client, public, et reste lisible meme apres minification (just-beautify)"
      - "Parce que le HTTPS chiffre la transmission mais pas le code source"
      - "Parce que les navigateurs cachent agressivement les fichiers JS"
    options_en:
      - "Because minification makes code unreadable to honest devs but not to attackers"
      - "Because the bundle is downloaded client-side, public, and remains readable even after minification (just-beautify)"
      - "Because HTTPS encrypts transmission but not source code"
      - "Because browsers cache JS files aggressively"
    correct: 1
    explanation_fr: |
      Tout ce qui est livre au navigateur est par definition lisible par
      tout le monde. La minification est un brouillage cosmetique, pas une
      protection. just-beautify suffit a remettre le code en forme lisible.
    explanation_en: |
      Anything shipped to the browser is by definition readable by
      everyone. Minification is cosmetic obfuscation, not protection.
      just-beautify is enough to bring the code back to readable form.

  Q2:
    type: multiple_choice
    question_fr: |
      Quel outil est specifiquement concu pour scanner des secrets
      hardcodes dans un repository git avant un commit ?
    question_en: |
      Which tool is specifically designed to scan for hardcoded secrets
      in a git repository before a commit?
    options_fr:
      - "ESLint"
      - "Trufflehog ou Gitleaks"
      - "SonarQube"
      - "OWASP ZAP"
    options_en:
      - "ESLint"
      - "Trufflehog or Gitleaks"
      - "SonarQube"
      - "OWASP ZAP"
    correct: 1
    explanation_fr: |
      Trufflehog et Gitleaks sont des scanners specialises dans la
      detection de secrets (cles d'API, mots de passe, tokens) avec des
      regex et de l'entropie. ESLint et SonarQube font de la qualite,
      OWASP ZAP fait du test d'attaque dynamique.
    explanation_en: |
      Trufflehog and Gitleaks are specialized scanners for secret
      detection (API keys, passwords, tokens) using regex and entropy.
      ESLint and SonarQube do quality, OWASP ZAP does dynamic attack
      testing.

  Q3:
    type: multiple_choice
    question_fr: |
      Quelle pratique est recommandee par OWASP pour stocker les secrets
      (cles d'API, mots de passe de base) en environnement de production ?
    question_en: |
      Which practice is OWASP-recommended to store secrets (API keys,
      database passwords) in production?
    options_fr:
      - "Variables d'environnement par environnement, OU secret manager dedie (Vault, AWS Secrets Manager, KMS)"
      - "Stocker les secrets dans un fichier .env commit dans le repo prive"
      - "Chiffrer les secrets avec AES-256 et hardcoder la cle dans le code"
      - "Hasher les secrets avec bcrypt cote client avant utilisation"
    options_en:
      - "Per-environment env variables, OR a dedicated secret manager (Vault, AWS Secrets Manager, KMS)"
      - "Store secrets in a .env file committed in the private repo"
      - "Encrypt secrets with AES-256 and hardcode the key in the code"
      - "Hash secrets with bcrypt client-side before use"
    correct: 0
    explanation_fr: |
      Variables d'env (12-factor) ou secret manager dedie. Un .env commit
      meme prive finit par fuiter (forks, leaks). Chiffrer avec une cle
      hardcodee deplace le probleme. Hasher rend le secret inutilisable.
    explanation_en: |
      Env variables (12-factor) or a dedicated secret manager. A
      committed .env even in a private repo eventually leaks (forks,
      leaks). Encrypting with a hardcoded key moves the problem.
      Hashing makes the secret unusable.
