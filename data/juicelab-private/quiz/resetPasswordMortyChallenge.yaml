challenge_key: "resetPasswordMortyChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Pourquoi `keyGenerator: headers['X-Forwarded-For']
      ?? ip` est dangereux ?
    question_en: |
      Why is `keyGenerator: headers['X-Forwarded-For']
      ?? ip` dangerous?
    options_fr:
      - "Trop performant"
      - "X-Forwarded-For est header HTTP user-controlled. Si le rate limiter le trust comme cle, l'attaquant peut spoof `X-Forwarded-For: $RANDOM.IP` a chaque req -> chaque req comptee separement -> rate limit ineffectif. Defense : `trust proxy N` strict + valider XFF chain"
      - "Pretty"
      - "Standard ISO"
    options_en:
      - "Too performant"
      - "X-Forwarded-For is user-controlled HTTP header. If rate limiter trusts it as key, attacker can spoof `X-Forwarded-For: $RANDOM.IP` per req -> each req counted separately -> rate limit ineffective. Defense: strict `trust proxy N` + validate XFF chain"
      - "Pretty"
      - "ISO standard"
    correct: 1
    explanation_fr: |
      Pattern reusable : trust proxy strict.
      Source : OWASP API4:2023 + Express docs.
    explanation_en: |
      Reusable pattern: strict trust proxy. Source:
      OWASP API4:2023 + Express docs.

  Q2:
    type: multiple_choice
    question_fr: |
      Pourquoi NIST 800-63B depriece les security
      questions ?
    question_en: |
      Why does NIST 800-63B deprecate security
      questions?
    options_fr:
      - "Trop court"
      - "NIST 800-63B 2017 : security questions style 'pet name', 'mother's maiden name' sont en realite OSINT publique (social media, public records, fan wikis). Combinees avec rate limit cassable = bruteforce trivial. Defense : remplacer par MFA (TOTP, hardware key, SMS fallback)"
      - "Standard"
      - "Trop secure"
    options_en:
      - "Too short"
      - "NIST 800-63B 2017: security questions style 'pet name', 'mother's maiden name' are actually public OSINT (social media, public records, fan wikis). Combined with breakable rate limit = trivial bruteforce. Defense: replace with MFA (TOTP, hardware key, SMS fallback)"
      - "Standard"
      - "Too secure"
    correct: 1
    explanation_fr: |
      Pattern reusable : security questions = mort.
      Source : NIST 800-63B Section 5.1.1.2.
    explanation_en: |
      Reusable pattern: security questions dead.
      Source: NIST 800-63B Section 5.1.1.2.

  Q3:
    type: multiple_choice
    question_fr: |
      Defense canonique multi-layer pour reset password
      endpoint ?
    question_en: |
      Canonical multi-layer defense for reset password
      endpoint?
    options_fr:
      - "Plus de reset"
      - "(1) `trust proxy N` ou N = nombre exact de proxies (pas `true` global). (2) `keyGenerator: req => req.ip` apres Express resolves XFF. (3) Composite key (email + IP). (4) Distributed rate limit Redis. (5) Captcha apres N attempts. (6) Account lock apres M attempts + recovery flow. (7) MFA au lieu de security question"
      - "Trust user"
      - "Plain text only"
    options_en:
      - "No more reset"
      - "(1) `trust proxy N` where N = exact proxy count (not global `true`). (2) `keyGenerator: req => req.ip` after Express resolves XFF. (3) Composite key (email + IP). (4) Distributed Redis rate limit. (5) Captcha after N attempts. (6) Account lock after M attempts + recovery flow. (7) MFA instead of security question"
      - "Trust user"
      - "Plain text only"
    correct: 1
    explanation_fr: |
      Pattern reusable : defense en profondeur.
      Source : OWASP Authentication Cheat Sheet.
    explanation_en: |
      Reusable pattern: defense in depth. Source:
      OWASP Authentication Cheat Sheet.
