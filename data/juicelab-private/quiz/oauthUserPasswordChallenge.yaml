challenge_key: "oauthUserPasswordChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Le password Juice Shop pour les comptes OAuth est
      `base64(reverse(email))`. Pourquoi cet algorithme
      est-il critique-vulnerable ?
    question_en: |
      Juice Shop password for OAuth accounts is
      `base64(reverse(email))`. Why is this algorithm
      critically vulnerable?
    options_fr:
      - "Parce que base64 n'est pas un hash"
      - "Parce qu'il est DETERMINISTE et publique : tout attaquant connaissant l'email cible peut RECONSTITUER le password en 1 ligne (`base64(reverse(email))`). Zero entropie aleatoire = zero security. Un password genere doit avoir 128+ bits d'entropie (crypto.randomBytes(32)) puis etre stocke en hash. Generation deterministique d'un secret = anti-pattern majeur"
      - "Parce que reverse() est lent"
      - "Parce que les emails sont longs"
    options_en:
      - "Because base64 isn't a hash"
      - "Because it's DETERMINISTIC and public: any attacker knowing target email can RECONSTITUTE password in 1 line (`base64(reverse(email))`). Zero random entropy = zero security. Generated password must have 128+ bits entropy (crypto.randomBytes(32)) then stored hashed. Deterministic secret generation = major anti-pattern"
      - "Because reverse() is slow"
      - "Because emails are long"
    correct: 1
    explanation_fr: |
      Pattern reusable : un secret cryptographique doit
      avoir suffisamment d'entropie (>=128 bits) pour
      etre infaisable a brute force. Un secret derive
      DETERMINISTIQUEMENT d'un input publique (email)
      n'a 0 entropie effective. Lecons: (a) crypto.
      randomBytes pour generation, (b) base64 != hash,
      (c) ne pas confondre encoding avec security.
      Source : routes/login.ts:65 + cryptographic
      design principles.
    explanation_en: |
      Reusable pattern: cryptographic secret must have
      enough entropy (>=128 bits) to be infeasible to
      brute force. Secret derived DETERMINISTICALLY from
      public input (email) has 0 effective entropy.
      Lessons: (a) crypto.randomBytes for generation,
      (b) base64 != hash, (c) don't confuse encoding
      with security. Source: routes/login.ts:65 +
      cryptographic design principles.

  Q2:
    type: multiple_choice
    question_fr: |
      Hint OWASP #1 : "The security flaw behind this
      challenge is 100% OWASP Juice Shop's fault and 0%
      Google's". Pourquoi c'est important pedagogiquement
      ?
    question_en: |
      OWASP hint #1: "The security flaw behind this
      challenge is 100% OWASP Juice Shop's fault and 0%
      Google's". Why is this pedagogically important?
    options_fr:
      - "Pour exonerer Google de toute responsabilite"
      - "Pour eviter le anti-pattern \"on blame le provider OAuth pour nos propres bugs\". OAuth/OIDC delivere un identity token signe verifiable cote serveur (Google JWKS). Si l'app fait quelque chose de stupide avec (genere un password local deterministe au lieu de mapper le sub claim), c'est l'app qui est en faute. Lecon : threat modeling doit identifier ou commence et finit la responsabilite de chaque component"
      - "Parce que Google n'aime pas les bugs"
      - "Pour ridiculiser Bjoern"
    options_en:
      - "To exonerate Google from responsibility"
      - "To avoid anti-pattern 'we blame OAuth provider for our own bugs'. OAuth/OIDC delivers signed identity token verifiable server-side (Google JWKS). If app does something stupid with it (generates local deterministic password instead of mapping sub claim), it's app's fault. Lesson: threat modeling must identify where each component's responsibility starts and ends"
      - "Because Google doesn't like bugs"
      - "To ridicule Bjoern"
    correct: 1
    explanation_fr: |
      Pattern reusable : threat modeling component-by-
      component. OAuth provider responsibilites = (a)
      authentifier l'user, (b) signer le token. App
      consumer responsabilites = (a) verifier la
      signature, (b) mapper sub claim a internal user,
      (c) NE PAS recreer un password local. Le bug
      Juice Shop viole (c) en re-introduisant une
      surface password. Source : OAuth 2.0 RFC 6749 +
      OIDC Core 1.0 + OWASP hint #1.
    explanation_en: |
      Reusable pattern: component-by-component threat
      modeling. OAuth provider responsibilities: (a)
      authenticate user, (b) sign token. Consumer app
      responsibilities: (a) verify signature, (b) map
      sub claim to internal user, (c) DO NOT recreate
      local password. Juice Shop bug violates (c) by
      re-introducing password surface. Source: OAuth
      2.0 RFC 6749 + OIDC Core 1.0 + OWASP hint #1.

  Q3:
    type: multiple_choice
    question_fr: |
      Quelle est la defense canonique recommandee par
      OWASP Authentication Cheat Sheet pour eviter ce
      type de bug dans une integration OAuth/OIDC ?
    question_en: |
      What canonical defense recommended by OWASP
      Authentication Cheat Sheet to avoid this type of
      bug in OAuth/OIDC integration?
    options_fr:
      - "Forcer 2FA sur tous les OAuth users"
      - "Pas de password local pour OAuth-only users : identifier via mapping (oauth_provider, oauth_sub) -> internal_user_id. Si flow mixed (OAuth + local password possible), generer crypto random 128+ bits SEULEMENT lors d'un setup explicite par le user, jamais auto-deterministically. Verifier signature JWT Google avec JWKS endpoint cote serveur"
      - "Stocker le password OAuth en plaintext"
      - "Utiliser SMS comme MFA secondaire"
    options_en:
      - "Force 2FA on all OAuth users"
      - "No local password for OAuth-only users: identify via mapping (oauth_provider, oauth_sub) -> internal_user_id. If mixed flow (OAuth + local password possible), generate crypto random 128+ bits ONLY during explicit user setup, never auto-deterministically. Verify Google JWT signature with JWKS endpoint server-side"
      - "Store OAuth password in plaintext"
      - "Use SMS as secondary MFA"
    correct: 1
    explanation_fr: |
      Pattern reusable : OAuth elimine la necessite de
      password local. Avoir un password local pour un
      OAuth user = re-introduire une surface d'attaque.
      Defense layered : (a) JWT signature
      verification cote serveur (RS256 + JWKS rotation),
      (b) sub claim mapping, (c) iss claim
      verification (anti substitution). Source : OAuth
      2.0 + OIDC + OWASP Authentication Cheat Sheet.
    explanation_en: |
      Reusable pattern: OAuth eliminates local password
      need. Having local password for OAuth user =
      re-introducing attack surface. Layered defense:
      (a) server-side JWT signature verification (RS256
      + JWKS rotation), (b) sub claim mapping, (c) iss
      claim verification (anti-substitution). Source:
      OAuth 2.0 + OIDC + OWASP Authentication Cheat
      Sheet.
