challenge_key: "twoFactorAuthUnsafeSecretStorageChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      TOTP RFC 6238 utilise un shared secret + time
      window pour generer des codes one-time. Selon hint
      OWASP #3, quel est l'element CRITICALLY SENSITIVE
      du TOTP ?
    question_en: |
      TOTP RFC 6238 uses shared secret + time window to
      generate one-time codes. Per OWASP hint #3, what
      is the CRITICALLY SENSITIVE element of TOTP?
    options_fr:
      - "Le code TOTP courant (6 digits)"
      - "Le SHARED SECRET (32-byte random base32). Si exfiltre, l'attaquant peut generer des codes TOTP valides a perpetuite jusqu'a rotation. Le code TOTP lui-meme n'a aucune valeur durable (30s). Pattern : la persistance du secret cree un secret TERMINAL (rotation difficile car necessite re-enrollment user). Cf. F-44 / F-46 dans glossaire AEGIS"
      - "Le hash bcrypt du password"
      - "L'horodatage Unix"
    options_en:
      - "The current TOTP code (6 digits)"
      - "The SHARED SECRET (32-byte random base32). If exfiltrated, attacker can generate valid TOTP codes in perpetuity until rotation. The TOTP code itself has no lasting value (30s). Pattern: secret persistence creates TERMINAL secret (rotation difficult as requires user re-enrollment). Cf. F-44 / F-46 in AEGIS glossary"
      - "Bcrypt hash of password"
      - "Unix timestamp"
    correct: 1
    explanation_fr: |
      Pattern reusable : pour tout protocole avec shared
      secret, ce secret est terminal (rotation couteuse)
      donc CRITICALLY sensitive. Defense : (a) ne JAMAIS
      le stocker en clair, (b) AES-GCM avec master key
      KMS/HSM, (c) recovery via one-time codes,
      (d) hardware-backed pour les comptes critiques (
      WebAuthn/FIDO2 elimine le shared secret entierement
      car cle privee reste cote user). Source : RFC 6238
      + WebAuthn spec.
    explanation_en: |
      Reusable pattern: for any shared-secret protocol,
      this secret is terminal (rotation expensive) so
      CRITICALLY sensitive. Defense: (a) NEVER store in
      plaintext, (b) AES-GCM with KMS/HSM master key,
      (c) recovery via one-time codes, (d)
      hardware-backed for critical accounts (
      WebAuthn/FIDO2 eliminates shared secret entirely
      as private key stays user-side). Source: RFC 6238
      + WebAuthn spec.

  Q2:
    type: multiple_choice
    question_fr: |
      routes/2fa.ts ligne 135 fait `userModel.totpSecret
      = secret` (stockage direct sans chiffrement).
      Pourquoi cela transforme une SQLi en compromise
      complete du 2FA ?
    question_en: |
      routes/2fa.ts line 135 does `userModel.totpSecret
      = secret` (direct storage without encryption). Why
      does this turn a SQLi into complete 2FA
      compromise?
    options_fr:
      - "Parce que SQLi est tres rapide"
      - "Parce qu'avec totpSecret en plaintext + SQLi exfiltrant la DB Users, l'attaquant a TOUS les composants pour bypass 2FA pour TOUT user : (a) password hash crackable + (b) totpSecret directement utilisable pour generer codes. Pas de defense en profondeur entre stockage chiffre et key management - une seule attaque (SQLi) compromet TOUT"
      - "Parce que TOTP est facile a brute force"
      - "Parce que 2FA est inutile"
    options_en:
      - "Because SQLi is very fast"
      - "Because with totpSecret in plaintext + SQLi exfiltrating Users DB, attacker has ALL components to bypass 2FA for ANY user: (a) crackable password hash + (b) totpSecret directly usable to generate codes. No defense in depth between encrypted storage and key management - single attack (SQLi) compromises EVERYTHING"
      - "Because TOTP is easy to brute force"
      - "Because 2FA is useless"
    correct: 1
    explanation_fr: |
      Pattern reusable : la 2FA n'est aussi forte que sa
      composante la plus faible. Si le shared secret est
      stockable a cote du password hash dans la meme
      table, la 2FA n'ajoute AUCUNE protection vs SQLi.
      Defense correcte = chiffrer totpSecret avec key
      stockee SEPAREMENT (HSM, KMS, ou colonne separee
      avec accs different). Pattern reusable :
      separation of duties dans le storage. Source :
      analyse routes/2fa.ts:135 + 37 + best practices
      cryptography NIST.
    explanation_en: |
      Reusable pattern: 2FA is only as strong as its
      weakest component. If shared secret is storable
      next to password hash in same table, 2FA adds NO
      protection vs SQLi. Correct defense = encrypt
      totpSecret with key stored SEPARATELY (HSM, KMS,
      or separate column with different access).
      Reusable pattern: separation of duties in storage.
      Source: routes/2fa.ts:135 + 37 analysis + NIST
      cryptography best practices.

  Q3:
    type: multiple_choice
    question_fr: |
      Quelle est la defense canonique recommandee pour
      eliminer ENTIEREMENT le risque de shared-secret
      exfiltration en 2FA ?
    question_en: |
      What canonical defense recommended to ENTIRELY
      eliminate shared-secret exfiltration risk in 2FA?
    options_fr:
      - "Plus long le shared secret, mieux c'est"
      - "WebAuthn / FIDO2 / passkeys : le user a une cle privee STOCKEE LOCALEMENT (TPM, Secure Enclave, FIDO2 token hardware). Le serveur stocke uniquement la cle publique. SQLi exfiltrant les cles publiques NE compromet RIEN. Plus de shared secret. Asymmetric crypto + hardware-backed = elimine la classe entiere d'attaques sur 2FA shared secret"
      - "Stocker le secret en double exemplaire"
      - "Utiliser HMAC-SHA512 au lieu de SHA1"
    options_en:
      - "Longer the shared secret, the better"
      - "WebAuthn / FIDO2 / passkeys: user has private key STORED LOCALLY (TPM, Secure Enclave, FIDO2 hardware token). Server stores only public key. SQLi exfiltrating public keys compromises NOTHING. No more shared secret. Asymmetric crypto + hardware-backed = eliminates entire class of attacks on 2FA shared secret"
      - "Store secret twice"
      - "Use HMAC-SHA512 instead of SHA1"
    correct: 1
    explanation_fr: |
      Pattern reusable : passer de shared secret a
      asymmetric crypto = elimine la classe d'attaque
      "shared secret leak". WebAuthn (W3C standard,
      2019) est l'evolution moderne du 2FA. Apple
      Passkeys, Microsoft Hello, Google Titan
      l'implementent. Pour les apps qui ne peuvent pas
      migrer, defense intermediaire : encrypt totpSecret
      au repos avec AES-GCM + master key dans HSM/KMS.
      Source : WebAuthn W3C spec + NIST 800-63B 2020
      revision (FIDO2 = AAL3).
    explanation_en: |
      Reusable pattern: moving from shared secret to
      asymmetric crypto = eliminates "shared secret
      leak" attack class. WebAuthn (W3C standard, 2019)
      is modern 2FA evolution. Apple Passkeys,
      Microsoft Hello, Google Titan implement it. For
      apps unable to migrate, intermediate defense:
      encrypt totpSecret at rest with AES-GCM + master
      key in HSM/KMS. Source: WebAuthn W3C spec + NIST
      800-63B 2020 revision (FIDO2 = AAL3).
