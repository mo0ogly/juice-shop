challenge_key: "weakPasswordChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Le password "admin123" passe les complexity filters
      traditionnels (8+ chars, contient digits). Pourtant
      NIST 800-63B (2017, source codefixes fix #1) le
      considere INVALIDE. Pourquoi ?
    question_en: |
      Password "admin123" passes traditional complexity
      filters (8+ chars, contains digits). Yet NIST 800-63B
      (2017, codefixes fix #1 source) considers it INVALID.
      Why?
    options_fr:
      - "Parce qu'il manque des special characters"
      - "Parce que NIST 2017 a ajoute une exigence DICTIONARY CHECK : 'passwords don't appear in common dictionaries'. admin123 est dans rockyou.txt (~ligne 50) et toutes les top-1000 password lists. Sans ce check, complexity rules ne sont qu'un theatre de securite. NIST 2017 deprioritise complexity et priorise dictionary"
      - "Parce que admin123 est trop court"
      - "Parce qu'il commence par 'admin'"
    options_en:
      - "Because it lacks special characters"
      - "Because NIST 2017 added DICTIONARY CHECK requirement: 'passwords don't appear in common dictionaries'. admin123 is in rockyou.txt (~line 50) and all top-1000 password lists. Without this check, complexity rules are just security theatre. NIST 2017 deprioritizes complexity and prioritizes dictionary"
      - "Because admin123 is too short"
      - "Because it starts with 'admin'"
    correct: 1
    explanation_fr: |
      Pattern : la regle de NIST 2017 est PARADIGM SHIFT :
      la "force" d'un password n'est pas dans sa
      complexite calculee mais dans son ABSENCE des
      attacker dictionaries. Cela justifie l'usage de
      passphrases longues + dictionary check. Source :
      codefixes/weakPasswordChallenge.info.yml fix #1
      verbatim citation NIST 800-63B.
    explanation_en: |
      Pattern: NIST 2017 rule is PARADIGM SHIFT: password
      "strength" is not its computed complexity but its
      ABSENCE from attacker dictionaries. Justifies long
      passphrases + dictionary check usage. Source:
      codefixes/weakPasswordChallenge.info.yml fix #1
      verbatim NIST 800-63B citation.

  Q2:
    type: multiple_choice
    question_fr: |
      Hint OWASP #1 dit "This challenge can be solved with
      three different approaches". Quelle est la
      consequence pedagogique de ce hint pour la defense ?
    question_en: |
      OWASP hint #1 says "This challenge can be solved with
      three different approaches". What's the pedagogical
      consequence of this hint for defense?
    options_fr:
      - "Il faut 3 defenses identiques"
      - "Toute defense unique sera bypassee : pour proteger contre 3 vecteurs (guess, hash crack, online brute), il faut une DEFENSE EN PROFONDEUR : (1) NIST dictionary check (vs guess), (2) bcrypt cost eleve + Argon2id (vs hash crack), (3) rate limiting + account lockout + MFA (vs online brute). Defense par 1 mecanisme = bypass garanti"
      - "Choisir le bon vecteur"
      - "L'attaquant gagne quoi qu'il arrive"
    options_en:
      - "Need 3 identical defenses"
      - "Any single defense will be bypassed: to protect against 3 vectors (guess, hash crack, online brute), need DEFENSE IN DEPTH: (1) NIST dictionary check (vs guess), (2) high bcrypt cost + Argon2id (vs hash crack), (3) rate limiting + lockout + MFA (vs online brute). Defense via 1 mechanism = guaranteed bypass"
      - "Choose right vector"
      - "Attacker wins regardless"
    correct: 1
    explanation_fr: |
      Pattern reusable : threat modeling exhaustif puis
      defense layer-par-layer. La defense en profondeur
      (DiD) est l'approche correcte. La RACINE = retirer
      les passwords entierement (passwordless auth :
      WebAuthn, FIDO2, SSO with MFA) la ou possible.
      Source : analyse des 3 hints OWASP + best practices
      Authentication Cheat Sheet.
    explanation_en: |
      Reusable pattern: exhaustive threat modeling then
      layer-by-layer defense. Defense in Depth (DiD) is
      correct approach. ROOT = remove passwords entirely
      (passwordless auth: WebAuthn, FIDO2, SSO with MFA)
      where possible. Source: analysis of 3 OWASP hints +
      Authentication Cheat Sheet best practices.

  Q3:
    type: multiple_choice
    question_fr: |
      Codefixes fix #2 (incorrect) ajoute le complexity
      check special-char. Verbatim explanation : "Usage of
      special character tests is not appropriate (anymore)
      because users tend to find known workarounds like
      notes with passwords or adding an exclamation mark
      at the end". Quelle LECON UX-securite generale ?
    question_en: |
      Codefixes fix #2 (incorrect) adds special-char
      complexity check. Verbatim explanation: "Usage of
      special character tests is not appropriate (anymore)
      because users tend to find known workarounds like
      notes with passwords or adding an exclamation mark
      at the end". What general UX-security LESSON?
    options_fr:
      - "Special chars sont toujours mauvais"
      - "Une regle de securite IRRITANTE pour les users les pousse vers des WORKAROUNDS observable et previsible : 'admin123' devient 'admin123!' (ajoute special char a la fin) ou 'Admin123' (capitalize first). L'attaquant integre ces patterns dans sa wordlist (rockyou-mutated) et casse en quelques secondes. Le 'security gain' est nul. Lecon : les regles UX-friendly sont aussi security-friendly"
      - "Forcer special chars + length"
      - "Les users sont irrationnels"
    options_en:
      - "Special chars are always bad"
      - "An IRRITATING security rule for users pushes them toward observable predictable WORKAROUNDS: 'admin123' becomes 'admin123!' (add special char at end) or 'Admin123' (capitalize first). Attacker integrates these patterns into wordlist (rockyou-mutated) and cracks in seconds. 'Security gain' is null. Lesson: UX-friendly rules are also security-friendly"
      - "Force special chars + length"
      - "Users are irrational"
    correct: 1
    explanation_fr: |
      Pattern reusable : security UX matters. Une regle
      qui force les users a contourner = pas une defense.
      Solutions modernes : (1) passphrase au lieu de
      password (entropie elevee + memorisable), (2)
      passwordless (WebAuthn, FIDO2), (3) password
      managers + dictionary blocking. Source : codefixes/
      weakPasswordChallenge.info.yml fix #2/#3 + NIST
      800-63B.
    explanation_en: |
      Reusable pattern: security UX matters. Rule forcing
      users to bypass = not a defense. Modern solutions:
      (1) passphrase instead of password (high entropy +
      memorable), (2) passwordless (WebAuthn, FIDO2), (3)
      password managers + dictionary blocking. Source:
      codefixes/weakPasswordChallenge.info.yml fix #2/#3 +
      NIST 800-63B.
