challenge_key: "resetPasswordBenderChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Pourquoi le hint OWASP #4 ("If a seemingly correct answer
      is not accepted, you might just need to try some
      alternative spelling") est-il un signal d'alerte sur la
      security question implementation de Juice Shop ?
    question_en: |
      Why is OWASP hint #4 ("If a seemingly correct answer is
      not accepted, you might just need to try some alternative
      spelling") a warning sign on Juice Shop's security
      question implementation?
    options_fr:
      - "Parce que le hint demande aux students d'essayer differentes langues"
      - "Parce qu'il revele que le serveur compare la reponse en strict-equality au lieu de canonicaliser (lower + trim + remove_accents + remove_punctuation). Cela rend le mecanisme fragile cote utilisateur legitime ET facilite la brute force cote attaquant qui peut tester variantes"
      - "Parce que le hint est specifique a Bender uniquement"
      - "Parce que le serveur fait du fuzzy matching mais avec un seuil trop strict"
    options_en:
      - "Because the hint asks students to try different languages"
      - "Because it reveals that the server compares the answer in strict-equality instead of canonicalizing (lower + trim + remove_accents + remove_punctuation). Makes mechanism fragile for legitimate user AND eases brute force for attacker who can test variants"
      - "Because the hint is specific to Bender only"
      - "Because server does fuzzy matching but with too strict threshold"
    correct: 1
    explanation_fr: |
      Le hint OWASP est explicite sur le bug de spelling. Mais
      au-dela : meme avec canonicalization, le mecanisme reste
      casse car la reponse est OSINT-able. Source : codefixes/
      resetPasswordBenderChallenge.info.yml explanation #2 (la
      defense reelle = retirer security questions).
    explanation_en: |
      OWASP hint is explicit on spelling bug. But beyond:
      even with canonicalization, mechanism stays broken
      because answer is OSINT-able. Source: codefixes/
      resetPasswordBenderChallenge.info.yml explanation #2 (real
      defense = remove security questions).

  Q2:
    type: multiple_choice
    question_fr: |
      Bender (Futurama) est un personnage fictif. Pourquoi
      OSINT est plus FACILE pour un personnage fictif que pour
      une vraie personne ?
    question_en: |
      Bender (Futurama) is a fictional character. Why is OSINT
      EASIER for a fictional character than for a real person?
    options_fr:
      - "Parce que les personnages fictifs n'ont pas de vie privee"
      - "Parce que pour un personnage fictif, la verite (ses preferences, hometown, ecole) est documentee de maniere centralisee sur fan wikis (Fandom, Wikipedia, MyAnimeList) avec aucun risque de privacy ou contre-mesure. Pour une vraie personne, l'OSINT est dispersee, partielle, et peut etre delete. Pour un perso fictif, c'est canonical et permanent"
      - "Parce que les wikis OWASP listent toutes les reponses"
      - "Parce que Bender n'existe que dans Juice Shop"
    options_en:
      - "Because fictional characters don't have private life"
      - "Because for a fictional character, the truth (preferences, hometown, school) is documented centrally on fan wikis (Fandom, Wikipedia, MyAnimeList) with NO privacy risk or countermeasure. For a real person, OSINT is dispersed, partial, can be deleted. For a fictional character, it's canonical and permanent"
      - "Because OWASP wikis list all answers"
      - "Because Bender exists only in Juice Shop"
    correct: 1
    explanation_fr: |
      Cette caracteristique rend les comptes basees sur des
      fictional characters (Bender, Bjoern, Jim, etc.) des
      cibles privilegiees pour les students car ils peuvent
      etre OSINTed en 2 minutes. Cela illustre la faiblesse
      generale des security questions, pas seulement la
      faiblesse pour ces comptes specifiques.
    explanation_en: |
      This feature makes accounts based on fictional
      characters (Bender, Bjoern, Jim, etc.) prime targets for
      students because they can be OSINTed in 2 minutes.
      Illustrates general weakness of security questions, not
      just weakness for these specific accounts.

  Q3:
    type: multiple_choice
    question_fr: |
      Quelle est la defense canonique recommandee par OWASP
      Choosing and Using Security Questions Cheat Sheet (la
      mitigationUrl du challenge) ?
    question_en: |
      What is canonical defense recommended by OWASP Choosing
      and Using Security Questions Cheat Sheet (challenge
      mitigationUrl)?
    options_fr:
      - "Forcer des reponses de plus de 12 caracteres"
      - "Hasher les reponses cote serveur avec bcrypt"
      - "Soit retirer le mecanisme entierement, soit l'utiliser uniquement comme facteur SECONDAIRE dans un flow multifactoriel (jamais comme seul facteur). Verbatim cheatsheet : 'If at all, they should not be used as the only factor for a security-relevant function'. Combiner avec : token email + 2FA + rate limiting"
      - "Pre-hasher la reponse avec PBKDF2"
    options_en:
      - "Force answers > 12 characters"
      - "Hash answers server-side with bcrypt"
      - "Either remove mechanism entirely, or use it ONLY as SECONDARY factor in multifactor flow (never as sole factor). Verbatim cheatsheet: 'If at all, they should not be used as the only factor for a security-relevant function'. Combine with: emailed token + 2FA + rate limiting"
      - "Pre-hash answer with PBKDF2"
    correct: 2
    explanation_fr: |
      Les autres options (hashing, length forcing) sont des
      band-aids qui ne corrigent pas le probleme racine : la
      reponse est devinable via OSINT meme si elle est hashee
      ou longue. Source : OWASP cheatsheet officiel +
      codefixes/resetPasswordBenderChallenge.info.yml fix #2.
    explanation_en: |
      Other options (hashing, length forcing) are band-aids
      that don't fix root issue: answer is guessable via OSINT
      even if hashed or long. Source: OWASP official
      cheatsheet + codefixes/
      resetPasswordBenderChallenge.info.yml fix #2.
