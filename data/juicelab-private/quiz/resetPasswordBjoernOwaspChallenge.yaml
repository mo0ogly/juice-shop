challenge_key: "resetPasswordBjoernOwaspChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Pourquoi le hint OWASP #2 ("Bjoern might have
      accidentally doxxed himself... where a camera was
      running") definit-il une nouvelle CATEGORIE d'OSINT a
      considerer dans threat modeling ?
    question_en: |
      Why does OWASP hint #2 ("Bjoern might have accidentally
      doxxed himself... where a camera was running") define a
      new OSINT CATEGORY to consider in threat modeling?
    options_fr:
      - "Parce que les videos sont chiffrees mais Bjoern a oublie le mot de passe"
      - "Parce qu'il introduit le concept d'OSINT VIDEO : les conf-talks publics (OWASP, BlackHat, AppSec, meetups) deviennent une surface OSINT permanente. Un orateur peut mentionner pet name, hometown, school sans realiser que la video reste indexee dans YouTube/archive.org pour des annees. Threat model implication : audit pre-publication des videos pour info sensible"
      - "Parce que Bjoern doit donner ses mots de passe sur scene"
      - "Parce que les meetups OWASP sont private"
    options_en:
      - "Because videos are encrypted but Bjoern forgot password"
      - "Because it introduces VIDEO OSINT concept: public conf-talks (OWASP, BlackHat, AppSec, meetups) become permanent OSINT surface. Speaker may mention pet name, hometown, school without realizing video stays indexed in YouTube/archive.org for years. Threat model implication: pre-publication video audit for sensitive info"
      - "Because Bjoern must give passwords on stage"
      - "Because OWASP meetups are private"
    correct: 1
    explanation_fr: |
      Pattern reusable : un user qui parle en public est une
      surface OSINT permanente. Cela s'etend aux Twitch
      streams, Twitter Spaces enregistres, podcasts, talks
      enregistres, AMA sessions. Les wedding videos privees
      partagees publiquement, les family vlogs YouTube, etc.
      sont aussi des sources. Source : OWASP hint #2 verbatim
      + OSINT methodology generale.
    explanation_en: |
      Reusable pattern: user who speaks in public is
      permanent OSINT surface. Extends to Twitch streams,
      recorded Twitter Spaces, podcasts, recorded talks, AMA
      sessions. Private wedding videos shared publicly,
      YouTube family vlogs, etc. are also sources. Source:
      OWASP hint #2 verbatim + general OSINT methodology.

  Q2:
    type: multiple_choice
    question_fr: |
      Codefixes #3 explique : "There are even less car brands
      in the world than potential pet names. Therefore,
      changing the security questions has even a negative
      effect on overall security as it makes guessing and
      brute forcing much easier". Quel principe defensif est
      ici illustre ?
    question_en: |
      Codefixes #3 explains: "There are even less car brands
      in the world than potential pet names. Therefore,
      changing the security questions has even a negative
      effect on overall security as it makes guessing and
      brute forcing much easier". What defensive principle is
      illustrated?
    options_fr:
      - "Plus court le secret, mieux c'est"
      - "Le 'narrowing scope' anti-pattern : reduire le solution space d'une security question (changer 'pet name' a 'car brand', ou 'pet name' a 'dog name') REDUIT la securite, pas l'augmente. C'est contre-intuitif : un secret avec answer space plus large est PLUS difficile a brute force. Defensive principle : maximiser l'entropie du secret"
      - "Toujours utiliser questions sur les voitures"
      - "Les pet names sont les plus securises"
    options_en:
      - "Shorter the secret, the better"
      - "'Narrowing scope' anti-pattern: reducing security question solution space (changing 'pet name' to 'car brand', or 'pet name' to 'dog name') REDUCES security, not increases. Counter-intuitive: secret with larger answer space is HARDER to brute force. Defensive principle: maximize secret entropy"
      - "Always use car questions"
      - "Pet names are most secure"
    correct: 1
    explanation_fr: |
      Pattern : la facilite mnemonique humaine (questions
      sur quelque chose de borne et concret) est l'OPPOSE de
      la robustesse cryptographique (entropie elevee, large
      answer space). Cela explique pourquoi les security
      questions sont fondamentalement broken : l'humain
      preferera toujours un secret memorable mais avec faible
      entropie. Solution = passwords managers + 2FA. Source :
      codefixes/
      resetPasswordBjoernOwaspChallenge.info.yml fix #3.
    explanation_en: |
      Pattern: human mnemonic ease (questions about bounded
      concrete things) is OPPOSITE of cryptographic
      robustness (high entropy, large answer space). Explains
      why security questions are fundamentally broken: humans
      always prefer memorable secret with low entropy.
      Solution = password managers + 2FA. Source: codefixes/
      resetPasswordBjoernOwaspChallenge.info.yml fix #3.

  Q3:
    type: multiple_choice
    question_fr: |
      Pourquoi resetPasswordBjoernOwaspChallenge (diff 3) est
      MOINS difficile que resetPasswordBjoernChallenge (diff
      5) bien que cibler la meme personne ?
    question_en: |
      Why is resetPasswordBjoernOwaspChallenge (diff 3) LESS
      difficult than resetPasswordBjoernChallenge (diff 5)
      despite targeting same person?
    options_fr:
      - "Parce que les comptes OWASP sont plus faibles"
      - "Parce que la security question OWASP a un answer space borne (pet names ~5000) ce qui permet brute force OU video OSINT direct (Zaya mentionne dans plusieurs talks). La security question internal a un historical twist sur le lieu (answer space tres large) infaisable a brute force et necessite OSINT historique cible"
      - "Parce que Bjoern oublie son OWASP password plus souvent"
      - "Parce que le compte OWASP n'a pas de password"
    options_en:
      - "Because OWASP accounts are weaker"
      - "Because OWASP security question has bounded answer space (pet names ~5000) allowing brute force OR direct video OSINT (Zaya mentioned in several talks). Internal security question has historical twist on location (very large answer space) infeasible to brute force and requires targeted historical OSINT"
      - "Because Bjoern forgets OWASP password more often"
      - "Because OWASP account has no password"
    correct: 1
    explanation_fr: |
      Pattern : la difficulte d'un challenge ne depend PAS du
      profil de la personne mais des choix specifiques de
      security question + answer (entropie + OSINT-ability).
      Bjoern a deux comptes avec deux choix differents : un
      bon (large + obfuscation = hard) et un mauvais
      (narrow + literal = easy). Cela illustre que la
      difficulte est une fonction du DESIGN, pas de
      l'utilisateur. Source : analyse cross-codefixes Bjoern x
      BjoernOwasp.
    explanation_en: |
      Pattern: challenge difficulty does NOT depend on
      person's profile but on specific security question +
      answer choices (entropy + OSINT-ability). Bjoern has
      two accounts with two different choices: a good one
      (large + obfuscation = hard) and a bad one (narrow +
      literal = easy). Illustrates difficulty is function of
      DESIGN, not user. Source: cross-codefixes analysis
      Bjoern x BjoernOwasp.
