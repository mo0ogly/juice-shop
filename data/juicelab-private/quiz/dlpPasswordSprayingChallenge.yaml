challenge_key: "dlpPasswordSprayingChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Quelle est la difference entre Password
      Spraying et Brute Force ?
    question_en: |
      Difference between Password Spraying and
      Brute Force?
    options_fr:
      - "Aucune difference"
      - "Brute Force = MANY passwords sur 1 account (declenche account lockout). Password Spraying = 1 password sur MANY accounts (evite lockout car chaque account ne voit que 1 attempt). Spraying est preferred par les attaquants modernes car bypass les classic defenses. Cas reels : OPM 2015 (4M federal employees), countless O365 spraying. Defense : MFA + anomaly detection + breached password check"
      - "Brute force est plus rapide"
      - "Spraying est legal"
    options_en:
      - "No difference"
      - "Brute Force = MANY passwords on 1 account (triggers lockout). Password Spraying = 1 password on MANY accounts (avoids lockout as each account sees only 1 attempt). Spraying is preferred by modern attackers as bypasses classic defenses. Real cases: OPM 2015 (4M federal employees), countless O365 spraying. Defense: MFA + anomaly detection + breached password check"
      - "Brute force is faster"
      - "Spraying is legal"
    correct: 1
    explanation_fr: |
      Pattern reusable : MFA est la meilleure
      defense contre password spraying. Source :
      OWASP Credential Stuffing Cheat Sheet.
    explanation_en: |
      Reusable pattern: MFA is best defense
      against password spraying. Source: OWASP
      Credential Stuffing Cheat Sheet.

  Q2:
    type: multiple_choice
    question_fr: |
      Le password J12934 est leaked via access
      logs en URL. Quel anti-pattern de
      transmission est viole ?
    question_en: |
      J12934 password leaked via access logs
      in URL. What transmission anti-pattern
      violated?
    options_fr:
      - "URL trop longue"
      - "Passwords TRANSMIS en URL query parameters (`?password=xxx`). Cela les expose dans : (a) server access logs, (b) browser history, (c) reverse proxy logs, (d) shared link snapshots, (e) Referer header. Defense : passwords TOUJOURS en POST body sur HTTPS, jamais en URL. RFC 3986 confirme que URLs sont non-confidential by design"
      - "URL devrait etre HTTPS"
      - "URLs sont obsoletes"
    options_en:
      - "URL too long"
      - "Passwords TRANSMITTED in URL query parameters (`?password=xxx`). Exposes them in: (a) server access logs, (b) browser history, (c) reverse proxy logs, (d) shared link snapshots, (e) Referer header. Defense: passwords ALWAYS in POST body over HTTPS, never in URL. RFC 3986 confirms URLs are non-confidential by design"
      - "URL should be HTTPS"
      - "URLs are obsolete"
    correct: 1
    explanation_fr: |
      Pattern reusable : URLs are not
      confidential. Tout secret SHOULD travel
      en HTTP body avec HTTPS. Source : RFC
      3986 + OWASP Authentication.
    explanation_en: |
      Reusable pattern: URLs are not
      confidential. All secrets SHOULD travel
      in HTTP body with HTTPS. Source: RFC
      3986 + OWASP Authentication.

  Q3:
    type: multiple_choice
    question_fr: |
      Quelle defense moderne est la plus
      EFFECTIVE contre data leaks via OSINT
      external (Pastebin, Stack Overflow) ?
    question_en: |
      Most EFFECTIVE modern defense against
      data leaks via external OSINT
      (Pastebin, Stack Overflow)?
    options_fr:
      - "Disabler Pastebin"
      - "(1) Automated DLP scanning (Data Loss Prevention) qui scan Pastebin/GitHub/Stack Overflow pour matches sur company secrets/domain names/employee emails. Tools : truffleHog, gitleaks, Pastebin Pro API, GitHub secrets scan. (2) Developer training (don't paste logs publicly). (3) Centralized log access (no local copy paste). (4) Honeytokens (fake credentials qui alert si used). Combine = defense en profondeur"
      - "Bloquer Stack Overflow"
      - "Disabler les logs"
    options_en:
      - "Disable Pastebin"
      - "(1) Automated DLP scanning (Data Loss Prevention) scanning Pastebin/GitHub/Stack Overflow for matches on company secrets/domain names/employee emails. Tools: truffleHog, gitleaks, Pastebin Pro API, GitHub secrets scan. (2) Developer training (don't paste logs publicly). (3) Centralized log access (no local copy paste). (4) Honeytokens (fake credentials alerting if used). Combine = defense in depth"
      - "Block Stack Overflow"
      - "Disable logs"
    correct: 1
    explanation_fr: |
      Pattern reusable : DLP scanning est un
      essential security service moderne.
      Source : OWASP Credential Stuffing
      Cheat Sheet + DLP best practices.
    explanation_en: |
      Reusable pattern: DLP scanning is
      essential modern security service.
      Source: OWASP Credential Stuffing
      Cheat Sheet + DLP best practices.
