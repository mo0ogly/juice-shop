challenge_key: "resetPasswordJimChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Hint OWASP #1 ("The hardest part... is to find out who
      Jim actually is") definit une phase OSINT N0
      (identification cible). Pourquoi cette phase est-elle
      souvent la PLUS difficile dans une attaque OSINT-driven
      ?
    question_en: |
      OWASP hint #1 ("The hardest part... is to find out who
      Jim actually is") defines OSINT phase N0 (target
      identification). Why is this phase often THE hardest in
      OSINT-driven attack?
    options_fr:
      - "Parce qu'OSINT cost cher"
      - "Parce qu'avant d'identifier le contexte du target (vrai nom, profil, sphere sociale, expertise), aucune query OSINT n'est efficace. Un username 'jim' sans contexte = bruit. Une fois 'jim = James T. Kirk Star Trek' connu, toutes les queries deviennent precises (Memory Alpha, Wikipedia genealogy). C'est la phase de pivot critique"
      - "Parce que OSINT est illegal sans phase N0"
      - "Parce que les outils OSINT exigent N0"
    options_en:
      - "Because OSINT is expensive"
      - "Because before identifying target context (real name, profile, social sphere, expertise), no OSINT query is effective. Username 'jim' without context = noise. Once 'jim = James T. Kirk Star Trek' known, all queries become precise (Memory Alpha, Wikipedia genealogy). It's the critical pivot phase"
      - "Because OSINT is illegal without N0"
      - "Because OSINT tools require N0"
    correct: 1
    explanation_fr: |
      Pattern reusable : phase N0 = identification du
      contexte (industrie, geographie, milieu social,
      langues parlees) avant le N1 (queries cibles).
      L'erreur classique pour students est de skip N0 et
      faire des queries broad. Pour Juice Shop, N0 = lire
      About Us, feedback, reviews avant SQLi/forgot-password.
      Source : OWASP hint #1 + methodology OSINT generale.
    explanation_en: |
      Reusable pattern: phase N0 = context identification
      (industry, geography, social environment, languages
      spoken) before N1 (targeted queries). Classic student
      error is skipping N0 and doing broad queries. For Juice
      Shop, N0 = read About Us, feedback, reviews before
      SQLi/forgot-password. Source: OWASP hint #1 + general
      OSINT methodology.

  Q2:
    type: multiple_choice
    question_fr: |
      Codefixes/resetPasswordJimChallenge.info.yml fix #2
      tighten le scope de "eldest sibling" a "eldest
      brother". Selon explanation : "Tightening the scope
      from an 'eldest sibling' to 'eldest brother' reduces
      any brute force effort to only male forenames". Quelle
      LECON principale en tirer ?
    question_en: |
      Codefixes/resetPasswordJimChallenge.info.yml fix #2
      tightens scope from "eldest sibling" to "eldest
      brother". Per explanation: "Tightening the scope from
      an 'eldest sibling' to 'eldest brother' reduces any
      brute force effort to only male forenames". What main
      LESSON?
    options_fr:
      - "Toujours utiliser questions sur le pere"
      - "Le 'narrowing scope' anti-pattern : reduire le solution space rend l'attaque PLUS facile, pas moins. Pour security questions, on veut un answer space MAXIMAL (large + ambigu). C'est contre-intuitif pour beginners qui pensent qu'une question 'plus precise' = 'plus securise'. Source : codefixes fix #2 + #3"
      - "Brother est plus secure que sibling"
      - "Tightening reduit toujours la security"
    options_en:
      - "Always use questions about father"
      - "'Narrowing scope' anti-pattern: reducing solution space makes attack EASIER, not harder. For security questions, want MAXIMAL answer space (large + ambiguous). Counter-intuitive for beginners who think 'more precise question' = 'more secure'. Source: codefixes fix #2 + #3"
      - "Brother more secure than sibling"
      - "Tightening always reduces security"
    correct: 1
    explanation_fr: |
      Pattern reusable : la mnemonique humaine (questions
      precises et concretes) est l'OPPOSE de la robustesse
      cryptographique (entropie elevee). C'est pourquoi les
      security questions sont fondamentalement broken : on
      ne peut pas les rendre a la fois memorisables ET
      securises. Source : codefixes/
      resetPasswordJimChallenge.info.yml + OWASP cheatsheet.
    explanation_en: |
      Reusable pattern: human mnemonics (precise concrete
      questions) is OPPOSITE of cryptographic robustness
      (high entropy). That's why security questions are
      fundamentally broken: cannot be both memorable AND
      secure. Source: codefixes/
      resetPasswordJimChallenge.info.yml + OWASP cheatsheet.

  Q3:
    type: multiple_choice
    question_fr: |
      Le challenge cible un user fictif "Jim" qui est James
      T. Kirk (Star Trek). Le frere aine canon = George
      Samuel Kirk. Pourquoi en pratique tester d'abord
      "Samuel" plutot que "George" ?
    question_en: |
      Challenge targets fictional user "Jim" who is James T.
      Kirk (Star Trek). Canon elder brother = George Samuel
      Kirk. Why practically test "Samuel" first rather than
      "George"?
    options_fr:
      - "Parce que Samuel est plus court a taper"
      - "Parce que dans le canon Star Trek, le frere aine est typiquement appele 'Samuel' ou 'Sam' (par James lui-meme et par narration) pour le DISTINGUER du pere George Kirk Sr. Cette distinction filiale est documentee episode par episode dans Memory Alpha. C'est un detail de canonical OSINT : ne pas se fier au nom officiel mais a l'usage filial"
      - "Parce que les middle names sont toujours les bons"
      - "Au hasard, n'importe lequel marche"
    options_en:
      - "Because Samuel is shorter to type"
      - "Because in Star Trek canon, elder brother typically called 'Samuel' or 'Sam' (by James himself and narration) to DISTINGUISH from father George Kirk Sr. This filial distinction is documented episode by episode in Memory Alpha. Detail of canonical OSINT: don't rely on official name but on filial usage"
      - "Because middle names are always right"
      - "Randomly, any works"
    correct: 1
    explanation_fr: |
      Pattern reusable : pour OSINT precis, l'usage prevaut
      souvent sur le nom officiel. Sources : Memory Alpha
      transcripts d'episodes + script TOS S1E22. Cette
      precision evite les false negatives qui ferait perdre
      du temps au student. Pattern applicable a vrais
      personnes : nicknames frequents > legal names dans les
      conversations. Source : Star Trek canon + OSINT
      methodology.
    explanation_en: |
      Reusable pattern: for precise OSINT, usage often
      prevails over official name. Sources: Memory Alpha
      episode transcripts + TOS S1E22 script. Precision
      avoids false negatives that would waste student time.
      Pattern applicable to real persons: frequent nicknames
      > legal names in conversations. Source: Star Trek
      canon + OSINT methodology.
