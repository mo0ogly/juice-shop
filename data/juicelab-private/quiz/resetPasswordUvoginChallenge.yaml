challenge_key: "resetPasswordUvoginChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Le pattern "reuse d'alias cross-platform" est exploitable
      via quels outils OSINT specialises ?
    question_en: |
      The "cross-platform alias reuse" pattern is exploitable
      via which specialized OSINT tools?
    options_fr:
      - "Wireshark + nmap"
      - "Sherlock (CLI, scan 400+ sites), WhatsMyName (web), Spiderfoot (auto multi-source), Maltego (graphique relations). Workflow : tape l'alias, recoit la liste des profils existants en quelques secondes"
      - "Burp + ZAP"
      - "John + hashcat"
    options_en:
      - "Wireshark + nmap"
      - "Sherlock (CLI, scans 400+ sites), WhatsMyName (web), Spiderfoot (auto multi-source), Maltego (relationship graph). Workflow: type alias, get existing profiles list in seconds"
      - "Burp + ZAP"
      - "John + hashcat"
    correct: 1
    explanation_fr: |
      Outils OSINT specifiquement designed pour cross-
      platform alias hunting. Wireshark/nmap = network
      monitoring. Burp/ZAP = web pentest. John/hashcat =
      password cracking. Chaque outil a son scope. Reference
      : github.com/sjherbert/sherlock + whatsmyname.app.
    explanation_en: |
      Tools specifically designed for cross-platform alias
      hunting. Wireshark/nmap = network monitoring. Burp/
      ZAP = web pentest. John/hashcat = password cracking.
      Each tool has its scope. Reference:
      github.com/sjherbert/sherlock + whatsmyname.app.

  Q2:
    type: multiple_choice
    question_fr: |
      Le codefixes officiel OWASP pour ce challenge dit que
      "all security questions are susceptible to online
      research (on Facebook, LinkedIn etc.) and often even
      brute force". Quelle est la recommendation NIST 2017+
      pour le knowledge-based authentication ?
    question_en: |
      Official OWASP codefixes for this challenge says "all
      security questions are susceptible to online research
      (on Facebook, LinkedIn etc.) and often even brute
      force". What's the NIST 2017+ recommendation for
      knowledge-based authentication?
    options_fr:
      - "Forcer des questions plus complexes"
      - "DEPRECATION du knowledge-based authentication. NIST SP 800-63B 5.1.1.2 recommande de remplacer par 2FA cryptographique (TOTP, WebAuthn) cryptographiquement lie au device, pas a une connaissance OSINT-able"
      - "Chiffrer les reponses avec SHA-256"
      - "Demander 5 security questions au lieu d'1"
    options_en:
      - "Force more complex questions"
      - "DEPRECATION of knowledge-based authentication. NIST SP 800-63B 5.1.1.2 recommends replacing with cryptographic 2FA (TOTP, WebAuthn) cryptographically tied to device, not OSINT-able knowledge"
      - "Encrypt answers with SHA-256"
      - "Ask 5 security questions instead of 1"
    correct: 1
    explanation_fr: |
      Pattern moderne : phase-out complete des security
      questions, replace par 2FA hardware-backed. Reference :
      NIST SP 800-63B (Digital Identity Guidelines, 2017
      revision) section 5.1.1.2 + OWASP Authentication
      Cheat Sheet.
    explanation_en: |
      Modern pattern: complete phase-out of security
      questions, replace with hardware-backed 2FA.
      Reference: NIST SP 800-63B (Digital Identity
      Guidelines, 2017 revision) section 5.1.1.2 + OWASP
      Authentication Cheat Sheet.

  Q3:
    type: multiple_choice
    question_fr: |
      Si on doit absolument GARDER des security questions
      (compatibility legacy), quel pattern est le moins
      OSINT-able ?
    question_en: |
      If we MUST keep security questions (legacy
      compatibility), which pattern is least OSINT-able?
    options_fr:
      - "Question sur le prenom de l'utilisateur"
      - "Question sur un evenement personnel SUBJECTIF non public (le sentiment du user a un evenement specifique, une preference qu'il n'a jamais publiee). Mais meme cela est devine via brute force ou reuse de breach. La defense canonique reste 2FA + remove security questions"
      - "Question sur le hometown"
      - "Question sur le nom du chien"
    options_en:
      - "Question about the user's first name"
      - "Question about a SUBJECTIVE personal event not public (user's feeling at a specific event, a preference they never published). But even this is guessable via brute force or breach reuse. Canonical defense remains 2FA + remove security questions"
      - "Question about hometown"
      - "Question about pet name"
    correct: 1
    explanation_fr: |
      Hometown, nom du chien, prenom = OSINT trivial.
      Sentiments subjectifs = mieux mais limit pratique
      (l'utilisateur lui-meme ne se rappelle pas exactement).
      La conclusion OWASP : meme la "meilleure" question
      reste fragile. La seule defense robuste est REMOVE
      security questions completely. Reference : codefixes
      fix #3 in extenso.
    explanation_en: |
      Hometown, pet name, first name = trivial OSINT.
      Subjective feelings = better but practical limit (user
      themselves doesn't remember exactly). OWASP
      conclusion: even the "best" question stays fragile.
      Only robust defense is REMOVING security questions
      completely. Reference: codefixes fix #3 in full.
