challenge_key: "passwordHashLeakChallenge"
schema_version: "juicelab.quiz.v1"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Quelle approche est la plus sure pour decider quels champs renvoyer
      dans la reponse d'une API ?
    question_en: |
      Which approach is safer to decide which fields an API response
      should return?
    options_fr:
      - "Une denylist qui retire les champs sensibles connus (password, salt, ssn)"
      - "Une allowlist qui liste explicitement les champs autorises (default deny), donc resiste a l'ajout de nouveaux champs sensibles"
      - "Un scan automatique qui retire tout champ contenant le mot 'password'"
      - "Un avertissement code review qui rappelle de ne pas exposer les hashes"
    options_en:
      - "A denylist that strips known-sensitive fields (password, salt, ssn)"
      - "An allowlist that explicitly lists allowed fields (default deny), resilient to new sensitive fields"
      - "An automatic scan that strips any field containing the word 'password'"
      - "A code review reminder not to expose hashes"
    correct: 1
    explanation_fr: |
      Allowlist = default deny : un champ inconnu n'est pas expose. La
      denylist a un trou structurel : tout nouveau champ sensible doit
      etre explicitement ajoute, et tot ou tard il est oublie.
    explanation_en: |
      Allowlist = default deny: an unknown field is not exposed. The
      denylist has a structural hole: every new sensitive field must
      be explicitly added, and sooner or later one is forgotten.

  Q2:
    type: multiple_choice
    question_fr: |
      Dans le challenge, l'endpoint /rest/user/whoami leak le hash via le
      parametre fields=password. Quel pattern de design aurait empeche
      cette vulnerabilite par construction ?
    question_en: |
      In the challenge, the endpoint /rest/user/whoami leaks the hash
      via the fields=password parameter. What design pattern would have
      prevented this vulnerability by construction?
    options_fr:
      - "Sanitizer la chaine fields= cote client avant envoi"
      - "Utiliser HTTPS au lieu de HTTP"
      - "Utiliser un DTO ou serializer qui materialise le decoupage entre champs DB et champs API"
      - "Rate-limiter l'endpoint a 10 requetes par minute"
    options_en:
      - "Sanitize the fields= string client-side before sending"
      - "Use HTTPS instead of HTTP"
      - "Use a DTO or serializer that materializes the split between DB fields and API fields"
      - "Rate-limit the endpoint to 10 requests per minute"
    correct: 2
    explanation_fr: |
      Un DTO/serializer separe explicitement le modele de donnees DB du
      modele expose par l'API. Le champ password n'existe alors pas dans
      le DTO, donc ne peut pas etre demande quelle que soit la requete.
    explanation_en: |
      A DTO/serializer explicitly separates the DB data model from the
      API-exposed model. The password field does not exist in the DTO,
      so it cannot be requested by any query whatsoever.

  Q3:
    type: multiple_choice
    question_fr: |
      Pourquoi un hash bcrypt qui leak reste-t-il dangereux malgre le
      fait que ce ne soit pas le mot de passe en clair ?
    question_en: |
      Why is a leaked bcrypt hash still dangerous even though it is not
      the cleartext password?
    options_fr:
      - "bcrypt est reversible avec la bonne cle"
      - "Le hash permet le brute force offline (hashcat, john) avec une wordlist, et tombe en quelques minutes si le mot de passe est faible"
      - "bcrypt utilise MD5 en interne donc il est casse"
      - "Le hash bcrypt contient le mot de passe en clair dans son sel"
    options_en:
      - "bcrypt is reversible with the right key"
      - "The hash enables offline brute force (hashcat, john) with a wordlist, falling in minutes if the password is weak"
      - "bcrypt uses MD5 internally so it is broken"
      - "The bcrypt hash contains the cleartext password in its salt"
    correct: 1
    explanation_fr: |
      Un hash en clair = brute force offline illimite (pas de rate limit
      reseau). Avec un GPU et une wordlist, un mot de passe faible tombe
      en quelques minutes. bcrypt n'est PAS reversible mais c'est sans
      importance ici.
    explanation_en: |
      A leaked hash = unlimited offline brute force (no network rate
      limit). With a GPU and a wordlist, a weak password falls in
      minutes. bcrypt is NOT reversible, but that is irrelevant here.
