challenge_key: "resetPasswordBjoernChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Pourquoi le "historical twist" applique par Bjoern n'est
      PAS une defense suffisante (selon codefixes
      explanation #2) ?
    question_en: |
      Why is the "historical twist" applied by Bjoern NOT a
      sufficient defense (per codefixes explanation #2)?
    options_fr:
      - "Parce que les twists historiques sont illegaux en RGPD"
      - "Parce que le twist est obfuscation par information cachee : un attaquant suffisamment motive consulte Wikipedia history sections, archives municipales, GeoNames toponymie historique, et trouve la variante. C'est une 'low hurdle' pas une defense. Verbatim codefixes : 'researching a past place of residence still is the only (low) hurdle for the attacker'"
      - "Parce que les twists historiques cassent l'UX"
      - "Parce qu'ils ne sont pas standardises"
    options_en:
      - "Because historical twists are GDPR-illegal"
      - "Because twist is obfuscation through hidden info: motivated attacker consults Wikipedia history, municipal archives, GeoNames historical toponymy, finds variant. It's 'low hurdle' not defense. Verbatim codefixes: 'researching a past place of residence still is the only (low) hurdle for the attacker'"
      - "Because historical twists break UX"
      - "Because they aren't standardized"
    correct: 1
    explanation_fr: |
      Pattern : security par obfuscation = security a court
      terme uniquement. Le secret se decouvre via OSINT, l'obfuscation
      ne fait que prolonger la duree d'attaque (pas la
      bloquer). Source : codefixes/
      resetPasswordBjoernChallenge.info.yml explanation #2.
    explanation_en: |
      Pattern: security through obscurity = short-term
      security only. Secret discoverable via OSINT,
      obfuscation only delays attack (doesn't block it).
      Source: codefixes/
      resetPasswordBjoernChallenge.info.yml explanation #2.

  Q2:
    type: multiple_choice
    question_fr: |
      Bjoern a DEUX comptes Juice Shop (OWASP + INTERNAL).
      Quelle lecon defensive en tirer ?
    question_en: |
      Bjoern has TWO Juice Shop accounts (OWASP + INTERNAL).
      What defensive lesson?
    options_fr:
      - "Toujours avoir deux comptes pour redondance"
      - "Le hint OWASP #2 dit 'Bjoern was a bit less careless avec son compte interne' : la SEPARATION des comptes par sensibilite est une bonne pratique. MAIS la racine du probleme reste la security question elle-meme : avoir deux questions OSINTable = etre vulnerable sur DEUX surfaces. La vraie defense = retirer security questions completement"
      - "Avoir deux comptes double les vulnerabilites"
      - "Aucune difference entre les deux"
    options_en:
      - "Always have two accounts for redundancy"
      - "OWASP hint #2 says 'Bjoern was a bit less careless with internal account': SEPARATION of accounts by sensitivity is good practice. BUT root issue stays security question itself: having two OSINTable questions = vulnerability on TWO surfaces. Real defense = remove security questions entirely"
      - "Two accounts double vulnerabilities"
      - "No difference between the two"
    correct: 1
    explanation_fr: |
      Cette nuance pedagogique distingue : (1) Bonne pratique
      defensive (separation comptes), (2) Inefficace defense
      (security question OSINTable). Bjoern a fait (1) bien
      mais (2) reste casse. Pattern reusable : la layered
      defense est bonne, mais une seule mauvaise couche
      compromet le tout. Source : analyse codefixes + hint
      OWASP #2.
    explanation_en: |
      This pedagogical nuance distinguishes: (1) Good
      defensive practice (account separation), (2) Ineffective
      defense (OSINTable security question). Bjoern did (1)
      well but (2) stays broken. Reusable pattern: layered
      defense is good, but one bad layer compromises whole.
      Source: codefixes analysis + OWASP hint #2.

  Q3:
    type: multiple_choice
    question_fr: |
      Hint OWASP #5 : "Brute forcing the answer should be next
      to impossible". Pourquoi est-ce le cas ICI mais PAS dans
      resetPasswordBjoernOwaspChallenge ?
    question_en: |
      OWASP hint #5: "Brute forcing the answer should be next
      to impossible". Why is it the case HERE but NOT in
      resetPasswordBjoernOwaspChallenge?
    options_fr:
      - "Parce que les noms d'animaux sont infinis"
      - "Parce que le solution space d'un historical twist sur lieu de residence est tres large (toutes les variantes nominales possibles d'une localite : ancien nom, dialecte, langue regionale, etc.) - infaisable a enumerer. En contraste, le solution space pour 'pet name' (resetPasswordBjoernOwaspChallenge) se limite aux noms d'animaux courants - enumeration brute possible avec un dictionnaire de 5000 noms"
      - "Parce que Bjoern utilise un VPN"
      - "Parce que rate limiting est present sur ce challenge mais pas l'autre"
    options_en:
      - "Because animal names are infinite"
      - "Because solution space of historical-twist on residence is very large (all nominal variants of a locality: old name, dialect, regional language, etc.) - infeasible to enumerate. By contrast, solution space for 'pet name' (resetPasswordBjoernOwaspChallenge) limited to common animal names - brute-force enumeration possible with 5000-name dictionary"
      - "Because Bjoern uses VPN"
      - "Because rate limiting on this challenge but not other"
    correct: 1
    explanation_fr: |
      Pattern : la security question canonique est INFINIE
      en answer space (mots, phrases, variations) ce qui rend
      brute force inefficace SI elle est bien choisie. Mais
      l'OSINT (cible) reste viable car la VRAIE reponse est
      publique. C'est pourquoi OSINT > brute force pour ce
      type de challenge. Pour Bjoern Internal, brute force =
      no, OSINT = oui. Source : hints OWASP officiels +
      hyperparameter analysis.
    explanation_en: |
      Pattern: canonical security question is INFINITE in
      answer space (words, phrases, variations) making brute
      force inefficient IF well-chosen. But OSINT (targeted)
      stays viable since REAL answer is public. That's why
      OSINT > brute force for this challenge type. For Bjoern
      Internal, brute force = no, OSINT = yes. Source:
      official OWASP hints + hyperparameter analysis.
