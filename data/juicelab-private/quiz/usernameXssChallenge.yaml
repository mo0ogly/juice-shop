challenge_key: "usernameXssChallenge"
schema_version: "juicelab.quiz.v2"

quiz:
  Q1:
    type: multiple_choice
    question_fr: |
      Pourquoi un homegrown regex sanitizer (developpeur ecrit
      lui-meme une regex /<script>/i) est-il quasi toujours
      bypass-able ?
    question_en: |
      Why is a homegrown regex sanitizer (developer writes their
      own /<script>/i regex) almost always bypassable?
    options_fr:
      - "Parce que les regex sont trop lentes en JavaScript"
      - "Parce que la surface d'attaque XSS est combinatoire : casing variants (<ScRiPt>), whitespace (<script\\n>), null bytes, encodings (&lt;), tags imbriques, HTML5 events (<svg onload>) — un developpeur ne peut pas anticiper tous les vecteurs"
      - "Parce que les regex ne supportent pas Unicode"
      - "Parce que les regex sont incompatibles avec HTTP/2"
    options_en:
      - "Because regexes are too slow in JavaScript"
      - "Because the XSS attack surface is combinatorial: casing variants (<ScRiPt>), whitespace (<script\\n>), null bytes, encodings (&lt;), nested tags, HTML5 events (<svg onload>) — a developer can't anticipate every vector"
      - "Because regexes don't support Unicode"
      - "Because regexes are incompatible with HTTP/2"
    correct: 1
    explanation_fr: |
      Reflexe a graver : ne JAMAIS DIY un sanitizer XSS. Les
      bibliotheques maintenues (DOMPurify, sanitize-html) ont
      une surface d'attaque audited par des centaines d'experts
      et des annees de fuzzing. Un regex personnel attrape le
      cas evident et rate les 50 variants.
    explanation_en: |
      Reflex to engrave: NEVER DIY an XSS sanitizer. Maintained
      libraries (DOMPurify, sanitize-html) have an attack
      surface audited by hundreds of experts over years of
      fuzzing. A personal regex catches the obvious case and
      misses the 50 variants.

  Q2:
    type: multiple_choice
    question_fr: |
      Le bug specifique de ce challenge est qu'une partie de la
      CSP (le nonce) est CONTROLLED par l'utilisateur (via le
      username). Pourquoi est-ce un anti-pattern critique ?
    question_en: |
      The specific bug of this challenge is that part of the
      CSP (the nonce) is USER-CONTROLLED (via username). Why is
      this a critical anti-pattern?
    options_fr:
      - "Parce que la CSP devient plus longue"
      - "Une CSP est une POLICY DECIDEE PAR LE SERVEUR pour controler ce que peut le navigateur. Si l'utilisateur peut INFLUENCER la policy, la defense devient une surface d'attaque : l'attaquant choisit son propre nonce et peut signer son script malveillant"
      - "Parce que la CSP n'est pas chiffree"
      - "Parce que le navigateur cache la CSP trop longtemps"
    options_en:
      - "Because the CSP becomes longer"
      - "A CSP is a SERVER-DECIDED POLICY controlling what the browser can do. If the user can INFLUENCE the policy, defense becomes attack surface: attacker picks their own nonce and signs their malicious script"
      - "Because CSP isn't encrypted"
      - "Because the browser caches CSP too long"
    correct: 1
    explanation_fr: |
      Distinction fondamentale entre policy (decidee server-side)
      et data (peut etre user-controlled). Confondre les deux
      est l'erreur architecturale qui cree ce challenge. Pattern
      similaire : interpoler de l'input user dans un header
      Set-Cookie, dans un Location de redirect, ou dans un X-
      Frame-Options.
    explanation_en: |
      Fundamental distinction between policy (server-decided)
      and data (can be user-controlled). Confusing the two is
      the architectural error creating this challenge. Similar
      pattern: interpolating user input into a Set-Cookie
      header, a redirect Location, or an X-Frame-Options.

  Q3:
    type: multiple_choice
    question_fr: |
      Defense canonique : la CSP doit etre statique ou
      parametree par des valeurs server-controlled (nonces
      aleatoires, hashes). Quel niveau d'entropie minimum
      doit avoir un nonce CSP pour etre considere securitaire ?
    question_en: |
      Canonical defense: CSP must be static or parameterized by
      server-controlled values (random nonces, hashes). What
      minimum entropy must a CSP nonce have to be considered
      secure?
    options_fr:
      - "32 bits (4 octets de hex)"
      - "128 bits (16 octets, base64-encoded ~22 chars), genere par un CSPRNG (crypto.randomBytes en Node.js, secrets en Python). Recommandation OWASP CSP Cheat Sheet : difficulte de devine = 2^128 essais"
      - "64 bits suffisent"
      - "8 bits si genere par Math.random()"
    options_en:
      - "32 bits (4 hex bytes)"
      - "128 bits (16 bytes, base64-encoded ~22 chars), generated by a CSPRNG (crypto.randomBytes in Node.js, secrets in Python). OWASP CSP Cheat Sheet recommendation: guessing difficulty = 2^128 attempts"
      - "64 bits are enough"
      - "8 bits if generated by Math.random()"
    correct: 1
    explanation_fr: |
      Source : OWASP CSP Cheat Sheet section nonces. 128 bits
      d'entropie cryptographique = brute force impossible
      pratiquement. Important : Math.random() N'EST PAS un
      CSPRNG (predictible), il faut crypto.randomBytes en
      Node.js. Le nonce doit etre regenere a CHAQUE response
      (pas reutilise entre sessions).
    explanation_en: |
      Source: OWASP CSP Cheat Sheet nonces section. 128 bits
      cryptographic entropy = practically impossible brute
      force. Important: Math.random() is NOT a CSPRNG
      (predictable), use crypto.randomBytes in Node.js. Nonce
      must be regenerated for EVERY response (not reused
      across sessions).
