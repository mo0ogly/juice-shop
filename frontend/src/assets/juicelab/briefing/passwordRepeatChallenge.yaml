challenge_key: "passwordRepeatChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Suivre le principe DRY (Don't Repeat Yourself) en
  registrant un user. Description OWASP. Hints
  officiels : (1) "You can solve this by cleverly
  interacting with the UI or bypassing it altogether".
  (2) "The obvious repetition in the User Registration
  form is the Repeat Password field". (3) "Try to
  register with either an empty or different value in
  Repeat Password". (4) "You can solve this challenge
  by cleverly interacting with the UI or bypassing it
  altogether". [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : Le solve check est dans
  routes/verify.ts:57-60 (verifie source). Code exact :
  `req.body && req.body.passwordRepeat !== req.body.
  password`. Donc le serveur verifie literalement que
  passwordRepeat est DIFFERENT de password. Si
  l'attaquant submit avec password="abc" et
  passwordRepeat="xyz" (ou vide), le serveur cree
  l'user mais aussi declenche le solveIf. Le frontend
  Angular a un validators custom qui bloque, donc
  bypass via curl/Burp. Workflow : POST /api/Users
  avec password != passwordRepeat -> challenge solve
  auto.

mission_en: |
  Follow DRY (Don't Repeat Yourself) principle while
  registering a user. OWASP description. Official
  hints: (1) "You can solve this by cleverly
  interacting with the UI or bypassing it altogether".
  (2) "The obvious repetition in the User Registration
  form is the Repeat Password field". (3) "Try to
  register with either an empty or different value in
  Repeat Password". (4) "You can solve this challenge
  by cleverly interacting with the UI or bypassing it
  altogether". [KILL_CHAIN_DOCUMENTED]

  Recommended method: Solve check in routes/verify.ts:
  57-60 (verified source). Exact code: `req.body &&
  req.body.passwordRepeat !== req.body.password`. So
  server literally checks passwordRepeat is DIFFERENT
  from password. If attacker submits with
  password="abc" and passwordRepeat="xyz" (or empty),
  server creates user but also triggers solveIf.
  Angular frontend has custom validator blocking, so
  bypass via curl/Burp. Workflow: POST /api/Users
  with password != passwordRepeat -> challenge auto
  solves.

concepts:
  - title_fr: "DRY ironie : le challenge inverse une bonne pratique"
    title_en: "DRY irony: challenge inverts a good practice"
    body_fr: |
      Description OWASP : "Follow the DRY principle
      while registering a user". Le DRY (Don't Repeat
      Yourself) est typiquement une BONNE PRATIQUE
      ingenierie : eviter de dupliquer du code/data.
      Ironie : le formulaire register a un Repeat
      Password field qui VIOLE le DRY (l'utilisateur
      tape le password 2 fois). Le challenge nous
      demande de "follow DRY" = ne PAS repeter =
      submit le formulaire SANS taper le repeat
      password 2 fois. Cela force a identifier le
      bug : (a) le frontend bloque la submit, (b) le
      serveur n'a pas de validation server-side =
      vulnerabilite. Pattern reusable pedagogique :
      le challenge fait penser au student a
      l'application des principes ingenierie au
      pentest.
    body_en: |
      OWASP description: "Follow the DRY principle
      while registering a user". DRY (Don't Repeat
      Yourself) is typically GOOD ENGINEERING
      PRACTICE: avoid duplicating code/data. Irony:
      register form has a Repeat Password field
      VIOLATING DRY (user types password twice).
      Challenge asks us to "follow DRY" = not repeat
      = submit form WITHOUT typing repeat password
      twice. Forces identifying bug: (a) frontend
      blocks submit, (b) server has no server-side
      validation = vulnerability. Reusable
      pedagogical pattern: challenge makes student
      think about applying engineering principles to
      pentest.

  - title_fr: "Validation cross-field : doit etre cote serveur"
    title_en: "Cross-field validation: must be server-side"
    body_fr: |
      Le check `password === passwordRepeat` est une
      cross-field validation (depend de DEUX champs).
      Le frontend Angular utilise un custom validator
      `passwordMatchValidator` qui s'execute sur
      change. Mais ce validator est CLIENT-SIDE only.
      Le serveur doit FAIRE LA MEME VALIDATION
      (server-side mirror). Defense canonique : (a)
      schema joi/zod avec `.refine((data) =>
      data.password === data.passwordRepeat,
      "passwords must match")`, (b) middleware
      Express qui retourne 400 si mismatch, (c) le
      faire AVANT Sequelize User.create. Pattern
      reusable : toute UI validation = server-side
      validation.
    body_en: |
      The `password === passwordRepeat` check is
      cross-field validation (depends on TWO
      fields). Angular frontend uses custom
      validator `passwordMatchValidator` running on
      change. But validator is CLIENT-SIDE only.
      Server must DO SAME VALIDATION (server-side
      mirror). Canonical defense: (a) joi/zod
      schema with `.refine((data) => data.password
      === data.passwordRepeat, "passwords must
      match")`, (b) Express middleware returning
      400 if mismatch, (c) do it BEFORE Sequelize
      User.create. Reusable pattern: any UI
      validation = server-side validation.

  - title_fr: "Difference avec emptyUserRegistration : meme racine, surface differente"
    title_en: "Difference with emptyUserRegistration: same root, different surface"
    body_fr: |
      passwordRepeatChallenge et emptyUserRegistration
      partagent la racine COMMUNE : POST /api/Users
      sans validation server-side suffisante. Mais
      surfaces differentes : (a) emptyUser cible la
      validation NON-NULL (email empty + password
      empty). (b) passwordRepeat cible la
      cross-field validation (password !=
      passwordRepeat). Defense canonique commune =
      schema validation server-side joi/zod. Pattern
      reusable : un endpoint sans validation
      server-side a typiquement N challenges
      (chaque condition rate). Pour Juice Shop
      /api/Users, on a : empty email/password
      (challenge 1), password mismatch (challenge
      2), role injection (challenge 3
      registerAdmin). Production : migrer vers une
      seule defense schema validation au lieu de N
      checks isoles.
    body_en: |
      passwordRepeatChallenge and
      emptyUserRegistration share COMMON root: POST
      /api/Users without sufficient server-side
      validation. But different surfaces: (a)
      emptyUser targets NON-NULL validation (empty
      email + empty password). (b) passwordRepeat
      targets cross-field validation (password !=
      passwordRepeat). Common canonical defense =
      server-side joi/zod schema validation.
      Reusable pattern: endpoint without
      server-side validation typically has N
      challenges (each missing condition). For
      Juice Shop /api/Users we have: empty email/
      password (challenge 1), password mismatch
      (challenge 2), role injection (challenge 3
      registerAdmin). Production: migrate to
      single schema validation defense instead of
      N isolated checks.
