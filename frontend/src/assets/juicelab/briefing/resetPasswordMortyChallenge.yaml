challenge_key: "resetPasswordMortyChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Reset le mot de passe de Morty en bypassing le rate limiter du
  /rest/user/reset-password endpoint. Tag : Broken Anti Automation. Hint
  OWASP : "rate limiter X-Forwarded-For". [KILL_CHAIN_DOCUMENTED]

  Methode : Solve check dans routes/resetPassword.ts:61 :
  `solveIf(resetPasswordMortyChallenge, () => user.id === users.morty.id
  && answer === '5N0wb41L')`. La security answer est le nom de Morty's
  pet (Snowball alias 5N0wb41L). Mais le rate limiter (server.ts:344-347)
  bloque 100 reqs / 5 min PAR IP. Bypass : `keyGenerator({ headers,
  ip }) { return headers['X-Forwarded-For'] ?? ip }` - changer X-Forwarded-
  For = changer la cle = bypass. Workflow : (1) Bruteforce security
  answer en rotating X-Forwarded-For. (2) "5N0wb41L" trouve.

mission_en: |
  Reset Morty's password by bypassing rate limiter on
  /rest/user/reset-password endpoint. Tag: Broken Anti Automation. OWASP
  hint: "rate limiter X-Forwarded-For". [KILL_CHAIN_DOCUMENTED]

  Method: Solve check in routes/resetPassword.ts:61:
  `solveIf(resetPasswordMortyChallenge, () => user.id === users.morty.id
  && answer === '5N0wb41L')`. Security answer is Morty's pet name
  (Snowball alias 5N0wb41L). But rate limiter (server.ts:344-347) blocks
  100 reqs / 5 min PER IP. Bypass: `keyGenerator({ headers, ip })
  { return headers['X-Forwarded-For'] ?? ip }` - changing X-Forwarded-For
  = changing key = bypass. Workflow: (1) Bruteforce security answer
  rotating X-Forwarded-For. (2) "5N0wb41L" found.

concepts:
  - title_fr: "Rate limiter par IP : faille X-Forwarded-For"
    title_en: "Rate limiter per IP: X-Forwarded-For flaw"
    body_fr: |
      Source canonique : OWASP API4:2023 Unrestricted Resource
      Consumption + CWE-307 Improper Restriction of Authentication
      Attempts. Les apps derriere reverse proxy (nginx, CloudFlare) ont
      besoin de l'header X-Forwarded-For pour le vrai client IP. Quand
      `app.enable('trust proxy')` + `keyGenerator: headers['X-Forwarded-
      For'] ?? ip`, l'attaquant peut spoof cet header en envoyant
      `X-Forwarded-For: 1.2.3.<random>` a chaque req -> chaque req est
      countee separement, rate limit ineffectif. Cas reels : Cloudflare
      2017 disclosure XFF (chained proxies).
    body_en: |
      Canonical source: OWASP API4:2023 Unrestricted Resource Consumption
      + CWE-307 Improper Restriction of Authentication Attempts. Apps
      behind reverse proxy (nginx, CloudFlare) need X-Forwarded-For header
      for real client IP. When `app.enable('trust proxy')` + `keyGenerator:
      headers['X-Forwarded-For'] ?? ip`, attacker can spoof this header
      by sending `X-Forwarded-For: 1.2.3.<random>` per req -> each req
      counted separately, rate limit ineffective. Real cases: Cloudflare
      2017 XFF disclosure (chained proxies).

  - title_fr: "Security questions : reconnaissance OSINT"
    title_en: "Security questions: OSINT reconnaissance"
    body_fr: |
      Pattern reusable : les security questions style "name of pet",
      "mother's maiden name" sont en realite des donnees publiques
      facilement OSINT. Pour Morty (personnage Rick & Morty), Snowball
      est son chien dans S01E02 "Lawnmower Dog" - public knowledge.
      Combine avec un rate limiter cassable, l'attaquant peut bruteforcer
      des candidats OSINT. Defense : remplacer security questions par
      MFA (TOTP, hardware key, SMS as fallback). NIST 800-63B 2017
      depriece les security questions formellement.
    body_en: |
      Reusable pattern: security questions style "pet name", "mother's
      maiden name" are actually public OSINT data. For Morty (Rick &
      Morty character), Snowball is his dog in S01E02 "Lawnmower Dog" -
      public knowledge. Combined with breakable rate limiter, attacker
      can bruteforce OSINT candidates. Defense: replace security
      questions with MFA (TOTP, hardware key, SMS as fallback). NIST
      800-63B 2017 formally deprecates security questions.

  - title_fr: "Defense canonique : trust proxy + IP validee"
    title_en: "Canonical defense: trust proxy + validated IP"
    body_fr: |
      (1) `app.enable('trust proxy', N)` ou N = nombre exact de proxies
      (pas `true`/`1` global). (2) `keyGenerator: req => req.ip` apres
      Express resolves le X-Forwarded-For via `trust proxy` config (qui
      valide la chaine de proxies). (3) Renforcer avec rate limit per
      `user_email + IP` (composite key). (4) Distributed rate limit (Redis)
      pour multi-node. (5) Captcha apres N attempts. (6) Lock account
      apres M attempts (avec recovery flow). Pattern reusable : trust
      proxy strict + composite keys.
    body_en: |
      (1) `app.enable('trust proxy', N)` where N = exact proxy count
      (not `true`/`1` global). (2) `keyGenerator: req => req.ip` after
      Express resolves X-Forwarded-For via `trust proxy` config (which
      validates proxy chain). (3) Reinforce with rate limit per
      `user_email + IP` (composite key). (4) Distributed rate limit
      (Redis) for multi-node. (5) Captcha after N attempts. (6) Account
      lock after M attempts (with recovery flow). Reusable pattern:
      strict trust proxy + composite keys.
