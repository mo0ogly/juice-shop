challenge_key: "resetPasswordUvoginChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Reset le password d'Uvogin via le mecanisme Forgot Password
  en repondant CORRECTEMENT a sa security question avec la
  reponse ORIGINALE. Description OWASP. Hints : (1) "OSINT on
  his social media personas to find his honest answer", (2)
  "People often reuse aliases online. You might be able to
  find something by looking online for Uvogin's name or slight
  variations", (3) "You might be able to find some existing
  OSINT tools to help you in this investigation".
  [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : Uvogin est un personnage fictif, mais
  le challenge demande un OSINT cross-platform sur son alias.
  (1) Sur la page de profil ou /#/forgot-password, identifier
  l'email d'Uvogin et la security question. (2) Recherche
  l'alias "Uvogin" (et variations Uvog1n, Uvogin_, etc.) sur
  Twitter, Instagram, GitHub, Reddit, OSINT outils (Sherlock,
  WhatsMyName). (3) Sur ses profils, deduit la reponse a sa
  security question (favoris, hometown, pet name, etc.). (4)
  Va sur /#/forgot-password, entre la reponse, set un nouveau
  password.

  Note la lecon : reuse d'aliases cross-platform = goldmine
  OSINT. Tu en parleras dans le journal "apres".

mission_en: |
  Reset Uvogin's password via Forgot Password by CORRECTLY
  answering his security question with the ORIGINAL answer.
  OWASP description. Hints: (1) "OSINT on his social media
  personas to find his honest answer", (2) "People often
  reuse aliases online. You might be able to find something
  by looking online for Uvogin's name or slight variations",
  (3) "You might be able to find some existing OSINT tools
  to help you in this investigation". [KILL_CHAIN_DOCUMENTED]

  Recommended method: Uvogin is a fictional character, but
  challenge demands cross-platform OSINT on his alias. (1)
  On profile page or /#/forgot-password, identify Uvogin's
  email and security question. (2) Search alias "Uvogin"
  (and variations Uvog1n, Uvogin_, etc.) on Twitter,
  Instagram, GitHub, Reddit, OSINT tools (Sherlock,
  WhatsMyName). (3) On his profiles, deduce his security
  question answer (favorites, hometown, pet name, etc.). (4)
  Go to /#/forgot-password, enter the answer, set a new
  password.

  Note the lesson: cross-platform alias reuse = OSINT
  goldmine. You will report it in the "after" logbook.

concepts:
  - title_fr: "Reuse d'alias cross-platform : la goldmine OSINT"
    title_en: "Cross-platform alias reuse: the OSINT goldmine"
    body_fr: |
      Hint OWASP officiel #2 : "People often reuse aliases
      online". Pattern humain typique : un username choisi
      sur Twitter est aussi utilise sur Instagram, GitHub,
      Reddit, gaming platforms, etc. Cela permet de tracer
      la PRESENCE digitale d'une personne a travers les
      plateformes. Outils : Sherlock (CLI, scan 400+ sites),
      WhatsMyName (web), Maltego (graphique), Spiderfoot
      (automated). Pour ce challenge, on tape "uvogin" dans
      Sherlock et on obtient les profils existants.
    body_en: |
      Official OWASP hint #2: "People often reuse aliases
      online". Typical human pattern: a username chosen on
      Twitter is also used on Instagram, GitHub, Reddit,
      gaming platforms, etc. This lets you trace a person's
      digital PRESENCE across platforms. Tools: Sherlock
      (CLI, scans 400+ sites), WhatsMyName (web), Maltego
      (graphical), Spiderfoot (automated). For this
      challenge, type "uvogin" in Sherlock and get existing
      profiles.

  - title_fr: "Security questions OSINT-able : OWASP cheatsheet recommandation"
    title_en: "OSINT-able security questions: OWASP cheatsheet recommendation"
    body_fr: |
      Source officielle : OWASP Choosing and Using Security
      Questions Cheat Sheet (mitigationUrl du challenge).
      Recommandation : "If at all, they should not be used
      as the only factor". Pour ce challenge specifique,
      Uvogin a typiquement une question type "What is your
      favorite anime?" ou "Who is your favorite character?"
      — donnees TYPIQUEMENT publiques sur les profils
      anime/gaming. Le codefixes (verifie : resetPassword
      UvoginChallenge.info.yml) confirme : "all security
      questions are susceptible to online research (on
      Facebook, LinkedIn etc.) and often even brute force".
    body_en: |
      Official source: OWASP Choosing and Using Security
      Questions Cheat Sheet (challenge mitigationUrl).
      Recommendation: "If at all, they should not be used
      as the only factor". For this specific challenge,
      Uvogin typically has a question like "What is your
      favorite anime?" or "Who is your favorite character?"
      — TYPICALLY public data on anime/gaming profiles. The
      codefixes (verified: resetPasswordUvoginChallenge.
      info.yml) confirms: "all security questions are
      susceptible to online research (on Facebook, LinkedIn
      etc.) and often even brute force".

  - title_fr: "Outils OSINT moderns pour cross-platform alias"
    title_en: "Modern OSINT tools for cross-platform alias"
    body_fr: |
      Workflow standard pentest. (1) Sherlock (github.com/
      sjherbert/sherlock) : python sherlock uvogin -> liste
      les profils detectes. (2) WhatsMyName (whatsmyname.
      app) : version web, plus convivial. (3) Spiderfoot
      (github.com/smicallef/spiderfoot) : auto multi-source
      OSINT (alias + email + IP). (4) Maltego (commercial
      mais free version) : graphique de relations. Pour ce
      challenge, Sherlock seul suffit. Combine avec une
      recherche manuelle des profils trouves pour la
      security answer.
    body_en: |
      Standard pentest workflow. (1) Sherlock (github.com/
      sjherbert/sherlock): python sherlock uvogin -> lists
      detected profiles. (2) WhatsMyName (whatsmyname.app):
      web version, more user-friendly. (3) Spiderfoot
      (github.com/smicallef/spiderfoot): auto multi-source
      OSINT (alias + email + IP). (4) Maltego (commercial
      but has free version): relationship graph. For this
      challenge, Sherlock alone suffices. Combine with
      manual search of found profiles for the security
      answer.
