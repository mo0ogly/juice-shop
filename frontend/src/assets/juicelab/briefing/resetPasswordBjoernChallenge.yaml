challenge_key: "resetPasswordBjoernChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Reset le password du compte INTERNE de Bjoern (different du
  compte OWASP) via Forgot Password en repondant CORRECTEMENT a
  sa security question avec sa reponse ORIGINALE. Description
  OWASP. Hints officiels : (1) "Nothing a little bit of Facebook
  stalking couldn't reveal. Might involve a historical twist".
  (2) "Other than with his OWASP account, Bjoern was a bit less
  careless with his choice of security and answer to his
  internal account". (3) "Bjoern chose to answer his chosen
  question truthfully but tried to make it harder for attackers
  by applying sort of a historical twist". (4) "Again, hints to
  the answer to Bjoern's question can be found by looking him up
  on the Internet". (5) "Brute forcing the answer should be next
  to impossible". [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : (1) Va sur /#/forgot-password et entre
  bjoern@juice-sh.op (compte INTERNE, different du
  bjoern.kimminich@gmail.com OWASP). (2) La security question
  s'affiche : typiquement liee au lieu de residence/origine. (3)
  OSINT Facebook + LinkedIn + Wikipedia sur Bjoern Kimminich
  (auteur de Juice Shop, public). (4) Cle : "historical twist"
  signifie que Bjoern n'a pas donne la reponse litterale
  actuelle, mais une variante historique (ex. nom historique de
  la ville/du quartier, ancienne langue, division administrative
  passee). Brute force = "next to impossible" (hint #5).

mission_en: |
  Reset Bjoern's INTERNAL account password (different from
  OWASP account) via Forgot Password by CORRECTLY answering his
  security question with his ORIGINAL answer. OWASP description.
  Official hints: (1) "Nothing a little bit of Facebook stalking
  couldn't reveal. Might involve a historical twist". (2) "Other
  than with his OWASP account, Bjoern was a bit less careless
  with his choice of security and answer to his internal
  account". (3) "Bjoern chose to answer his chosen question
  truthfully but tried to make it harder for attackers by
  applying sort of a historical twist". (4) "Again, hints to the
  answer to Bjoern's question can be found by looking him up on
  the Internet". (5) "Brute forcing the answer should be next to
  impossible". [KILL_CHAIN_DOCUMENTED]

  Recommended method: (1) Go to /#/forgot-password and enter
  bjoern@juice-sh.op (INTERNAL account, different from
  bjoern.kimminich@gmail.com OWASP). (2) Security question
  appears: typically tied to residence/origin. (3) OSINT
  Facebook + LinkedIn + Wikipedia on Bjoern Kimminich (Juice
  Shop author, public figure). (4) Key: "historical twist"
  means Bjoern gave not literal current answer, but historical
  variant (e.g., historical name of city/neighborhood, old
  language, past administrative division). Brute force = "next
  to impossible" (hint #5).

concepts:
  - title_fr: "Historical twist : la (mauvaise) defense par obfuscation"
    title_en: "Historical twist: the (bad) defense via obfuscation"
    body_fr: |
      Hint OWASP #3 est explicite : "Bjoern chose to answer his
      chosen question truthfully but tried to make it harder
      for attackers by applying sort of a historical twist".
      C'est une defense par obfuscation : la reponse reste
      semantiquement vraie mais utilise une variante (ex. nom
      historique de la ville plutot que nom moderne, ancien
      langage de la region, division administrative passee).
      Codefixes/resetPasswordBjoernChallenge.info.yml
      explanation #2 critique cette approche : "researching a
      past place of residence still is the only (low) hurdle
      for the attacker". L'obfuscation n'est PAS une defense.
    body_en: |
      OWASP hint #3 is explicit: "Bjoern chose to answer his
      chosen question truthfully but tried to make it harder
      for attackers by applying sort of a historical twist".
      It's defense via obfuscation: answer stays semantically
      true but uses variant (e.g., historical city name rather
      than modern name, old regional language, past
      administrative division). Codefixes/
      resetPasswordBjoernChallenge.info.yml explanation #2
      criticizes this: "researching a past place of residence
      still is the only (low) hurdle for the attacker".
      Obfuscation is NOT a defense.

  - title_fr: "Difference avec resetPasswordBjoernOwaspChallenge : meme cible, surface differente"
    title_en: "Difference with resetPasswordBjoernOwaspChallenge: same target, different surface"
    body_fr: |
      Hint OWASP #2 est crucial : "Other than with his OWASP
      account, Bjoern was a bit less careless with his choice
      of security and answer to his internal account". Bjoern
      a DEUX comptes Juice Shop : l'OWASP (bjoern.kimminich@
      gmail.com) avec une reponse VIDEO-leakee (Bjoern OWASP
      AppSec talk avec une camera dans la piece — voir
      resetPasswordBjoernOwaspChallenge), et l'INTERNAL
      (bjoern@juice-sh.op) avec un historical twist. Le
      challenge interne (celui-ci) est plus difficile (diff 5
      vs 3) car la reponse n'est pas dans une video mais
      requires deduction historique. Pattern reusable :
      meme attaquant cible deux comptes du meme user, surfaces
      OSINT distinctes.
    body_en: |
      OWASP hint #2 is crucial: "Other than with his OWASP
      account, Bjoern was a bit less careless with his choice
      of security and answer to his internal account". Bjoern
      has TWO Juice Shop accounts: OWASP (bjoern.kimminich@
      gmail.com) with VIDEO-leaked answer (Bjoern OWASP AppSec
      talk with camera in room — see
      resetPasswordBjoernOwaspChallenge), and INTERNAL
      (bjoern@juice-sh.op) with historical twist. Internal
      challenge (this one) is harder (diff 5 vs 3) because
      answer is not in video but requires historical deduction.
      Reusable pattern: same attacker targets two accounts of
      same user, distinct OSINT surfaces.

  - title_fr: "OSINT historique : sources academiques et archives publiques"
    title_en: "Historical OSINT: academic sources and public archives"
    body_fr: |
      Pour un historical twist sur le lieu de residence, les
      sources OSINT diffèrent du standard. Au lieu de
      LinkedIn/Facebook actuels, l'attaquant consulte :
      Wikipedia (sections "History" sur la ville), GeoNames
      (toponymie historique), archives municipales, OpenStreet
      Map historical layers, archive.org Wayback pour
      anciens posts Facebook archive. La defense canonique
      reste OWASP cheatsheet : retirer security questions ou
      les utiliser uniquement en facteur secondaire.
    body_en: |
      For a historical twist on residence place, OSINT sources
      differ from standard. Instead of current LinkedIn/
      Facebook, attacker consults: Wikipedia (History sections
      on city), GeoNames (historical toponymy), municipal
      archives, OpenStreetMap historical layers, archive.org
      Wayback for old archived Facebook posts. Canonical
      defense remains OWASP cheatsheet: remove security
      questions or use only as secondary factor.
