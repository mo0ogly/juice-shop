challenge_key: "weakPasswordChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Login avec les credentials de l'administrateur SANS les
  changer ni utiliser SQLi. Description OWASP. Hints officiels :
  (1) "This challenge can be solved with three different
  approaches". (2) "Guessing might work just fine". (3) "If you
  harvested the admin's password hash, you can try to attack
  that". (4) "In case you use some hacker tool, you can also go
  for a brute force attack using a generic password list".
  [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : (1) Le tutorial natif Juice Shop
  (passwordStrength.ts dans hacking-instructor) confirme la
  reponse : email = admin@juice-sh.op, password = admin123. (2)
  L'attack la plus simple = guessing (la sequence du tutoriel
  est admin -> admin1 -> admin12 -> admin123, prouvant la
  trivialite). (3) Alternative : crack le bcrypt hash si
  exposedCredentialsChallenge / exfilations SQL ont leak les
  hashes. Hash admin = $2a$08$IpvOPb... avec hashcat -m 3200 +
  rockyou.txt -> admin123 craque en secondes. (4) Alternative :
  Burp Intruder POST /rest/user/login avec wordlist (rockyou
  top-1000).

mission_en: |
  Login with administrator credentials WITHOUT changing them or
  using SQLi. OWASP description. Official hints: (1) "This
  challenge can be solved with three different approaches".
  (2) "Guessing might work just fine". (3) "If you harvested
  the admin's password hash, you can try to attack that". (4)
  "In case you use some hacker tool, you can also go for a
  brute force attack using a generic password list".
  [KILL_CHAIN_DOCUMENTED]

  Recommended method: (1) Juice Shop native tutorial
  (passwordStrength.ts in hacking-instructor) confirms answer:
  email = admin@juice-sh.op, password = admin123. (2) Simplest
  attack = guessing (tutorial sequence is admin -> admin1 ->
  admin12 -> admin123, proving triviality). (3) Alternative:
  crack bcrypt hash if exposedCredentialsChallenge / SQL
  exfiltrations leaked hashes. Admin hash =
  $2a$08$IpvOPb... with hashcat -m 3200 + rockyou.txt ->
  admin123 cracks in seconds. (4) Alternative: Burp Intruder
  POST /rest/user/login with wordlist (rockyou top-1000).

concepts:
  - title_fr: "NIST 800-63B : pourquoi \"admin123\" passe TOUS les filtres traditionnels"
    title_en: "NIST 800-63B: why \"admin123\" passes ALL traditional filters"
    body_fr: |
      Source canonique : NIST Special Publication 800-63B
      (mise a jour majeure 2017, refusee dans Juice Shop). Le
      password "admin123" satisfait : (a) 8+ characters
      (length filter), (b) contains digits (complexity
      filter), (c) potentially passes special-char filter
      avec variations admin123! Mais NIST 800-63B exige aussi
      : "passwords don't appear in common dictionaries"
      (verbatim codefixes/weakPasswordChallenge.info.yml fix
      #1). admin123 est dans rockyou.txt et top-1000 lists.
      Pattern fundamental : les complexity filters
      traditionnels sont LARGEMENT INSUFFISANTS sans
      dictionary check. Cest pourquoi NIST 2017 recommande de
      DEPRIORISER complexity et PRIORISER dictionary check.
    body_en: |
      Canonical source: NIST Special Publication 800-63B
      (major update 2017, refused in Juice Shop). Password
      "admin123" satisfies: (a) 8+ characters (length
      filter), (b) contains digits (complexity filter), (c)
      potentially passes special-char filter with admin123!
      variations. But NIST 800-63B also requires: "passwords
      don't appear in common dictionaries" (verbatim
      codefixes/weakPasswordChallenge.info.yml fix #1).
      admin123 is in rockyou.txt and top-1000 lists.
      Fundamental pattern: traditional complexity filters
      are LARGELY INSUFFICIENT without dictionary check.
      That's why NIST 2017 recommends DEPRIORITIZING
      complexity and PRIORITIZING dictionary check.

  - title_fr: "Hacking-instructor sequence : trivialite progressive demontree"
    title_en: "Hacking-instructor sequence: progressive triviality demonstrated"
    body_fr: |
      Le tutorial natif Juice Shop (frontend/src/hacking-
      instructor/challenges/passwordStrength.ts) execute une
      sequence pedagogique : admin -> admin1 -> admin12 ->
      admin123. C'est une preuve LIVE qu'un attaquant
      progressant par hypotheses raisonnables resout en
      moins de 4 essais. Cette demonstration cible les
      students sceptiques qui pensent "personne ne devine
      admin123". Source verbatim : "🤦‍♂️ Nah, that was wrong!
      Keep trying! I'll tell you when you're one the right
      track" -> "🔥 Yes, it's getting warmer! Try adding some
      more numbers maybe?". L'instructor MONTRE que
      l'attaque est triviale.
    body_en: |
      Juice Shop native tutorial (frontend/src/hacking-
      instructor/challenges/passwordStrength.ts) runs
      pedagogical sequence: admin -> admin1 -> admin12 ->
      admin123. LIVE proof that an attacker progressing
      through reasonable hypotheses solves in <4 tries.
      Targets skeptical students who think "no one guesses
      admin123". Verbatim source: "🤦‍♂️ Nah, that was wrong!
      Keep trying! I'll tell you when you're one the right
      track" -> "🔥 Yes, it's getting warmer! Try adding some
      more numbers maybe?". Instructor SHOWS attack is
      trivial.

  - title_fr: "3 vecteurs distincts : guess / hash crack / online brute force"
    title_en: "3 distinct vectors: guess / hash crack / online brute force"
    body_fr: |
      Hint OWASP #1 : "This challenge can be solved with
      three different approaches". (1) GUESS : essayer admin,
      admin1, admin123, password, P@ssw0rd, etc. Coute zero
      requete API au-dela de 5 essais. (2) HASH CRACK : si
      exposedCredentialsChallenge ou SQLi a exfiltre les
      hashes bcrypt, hashcat -m 3200 dictionnary attack -m
      ~5 secondes pour rockyou.txt. (3) ONLINE BRUTE :
      Burp/ZAP Intruder POST /rest/user/login. Defenses
      cibles : (1) NIST dictionary check, (2) bcrypt cost
      eleve (~12 = 1 sec/hash) + KDF avec memory hard
      (Argon2id), (3) rate limiting + account lockout +
      MFA. Pattern : la defense doit couvrir TOUS les
      vecteurs.
    body_en: |
      OWASP hint #1: "This challenge can be solved with
      three different approaches". (1) GUESS: try admin,
      admin1, admin123, password, P@ssw0rd, etc. Costs zero
      API requests beyond 5 tries. (2) HASH CRACK: if
      exposedCredentialsChallenge or SQLi exfiltrated bcrypt
      hashes, hashcat -m 3200 dictionary attack ~5 seconds
      for rockyou.txt. (3) ONLINE BRUTE: Burp/ZAP Intruder
      POST /rest/user/login. Targeted defenses: (1) NIST
      dictionary check, (2) high bcrypt cost (~12 = 1 sec/
      hash) + memory-hard KDF (Argon2id), (3) rate limiting
      + account lockout + MFA. Pattern: defense must cover
      ALL vectors.
