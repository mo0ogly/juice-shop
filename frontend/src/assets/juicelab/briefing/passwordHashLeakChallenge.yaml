challenge_key: "passwordHashLeakChallenge"
schema_version: "juicelab.briefing.v1"

mission_fr: |
  Recupere le hash du mot de passe d'un utilisateur via l'API REST
  exposee par Juice Shop. Le hash ne s'affiche jamais dans l'UI, mais
  l'endpoint qui sert ton profil accepte un parametre qui te permet de
  demander explicitement les champs voulus, y compris ceux qui auraient
  du rester serveur. C'est un challenge d'EXFILTRATION via API
  d'introspection mal calibree.

  Methode recommandee : connecte-toi avec un compte normal, ouvre
  l'onglet Network des DevTools, repere l'appel a l'endpoint
  /rest/user/whoami pendant la navigation. Inspecte la requete : peux-tu
  ajouter un parametre style fields=...? Teste fields=password (ou
  similaire) et regarde la reponse JSON. Cracker le hash ensuite n'est
  PAS necessaire pour valider le challenge — la fuite suffit.

  Note l'endpoint vulnerable, le parametre exploite et ce que tu en
  deduis sur l'absence de DTO/serializer cote serveur. Tu en parleras
  dans le journal "apres".

mission_en: |
  Retrieve a user's password hash via the REST API exposed by Juice
  Shop. The hash never appears in the UI, but the endpoint serving your
  profile accepts a parameter that lets you explicitly request the
  desired fields, including those that should have stayed server-side.
  This is an EXFILTRATION challenge via a poorly calibrated
  introspection API.

  Recommended method: log in with a normal account, open the Network
  tab in DevTools, spot the call to /rest/user/whoami during
  navigation. Inspect the request: can you add a parameter like
  fields=...? Try fields=password (or similar) and look at the JSON
  response. Cracking the hash later is NOT required to solve the
  challenge — the leak suffices.

  Note the vulnerable endpoint, the exploited parameter, and what you
  deduce about the lack of a server-side DTO/serializer. You will
  report it in the "after" logbook.

concepts:
  - title_fr: "Allowlist vs denylist en serialization API"
    title_en: "Allowlist vs denylist in API serialization"
    body_fr: |
      Une denylist retire des champs nommes connus comme sensibles
      (password, salt, ssn). Probleme : tout nouveau champ sensible
      ajoute au modele DB doit etre explicitement ajoute, et tot ou tard
      il est oublie. Une allowlist (default deny) liste explicitement
      les champs autorises a sortir, et resiste structurellement a
      l'evolution du modele.
    body_en: |
      A denylist strips known-sensitive fields (password, salt, ssn).
      Problem: any new sensitive DB field must be explicitly added to
      the list, and sooner or later one is forgotten. An allowlist
      (default deny) explicitly lists fields allowed out, and is
      structurally resilient to model evolution.

  - title_fr: "DTO / Serializer : separer modele DB et modele API"
    title_en: "DTO / Serializer: separate DB model and API model"
    body_fr: |
      Le bon pattern : un Data Transfer Object (DTO) qui declare
      EXPLICITEMENT les champs exposes par l'API, decouple du modele
      ORM. UserDTO contient { id, email, displayName }, le modele
      contient { id, email, password, salt, totp_secret, ... }. Le
      champ password n'existe pas dans le DTO : aucun parametre client
      ne peut le faire apparaitre. Frameworks : Marshmallow (Python),
      class-transformer (NestJS), Spring Data Projections (Java).
    body_en: |
      The right pattern: a Data Transfer Object (DTO) that EXPLICITLY
      declares fields exposed by the API, decoupled from the ORM
      model. UserDTO holds { id, email, displayName }, while the model
      holds { id, email, password, salt, totp_secret, ... }. The
      password field does not exist in the DTO: no client parameter
      can make it appear. Frameworks: Marshmallow (Python),
      class-transformer (NestJS), Spring Data Projections (Java).

  - title_fr: "Bcrypt qui leak : pas reversible mais brute-forcable"
    title_en: "Leaked bcrypt: not reversible but brute-forceable"
    body_fr: |
      bcrypt n'est PAS reversible (pas un chiffrement, une fonction de
      hachage avec sel et facteur de cout). Mais une fois le hash
      leake, l'attaquant lance hashcat ou john-the-ripper avec une
      wordlist sur son GPU : il n'y a plus de rate-limiting reseau. Un
      mot de passe faible ("password123") tombe en quelques minutes.
      Defense : politique de mot de passe forte, mais surtout : ne PAS
      laisser fuiter le hash en premier lieu.
    body_en: |
      bcrypt is NOT reversible (not encryption, a hash with salt and
      cost factor). But once the hash leaks, the attacker runs hashcat
      or john-the-ripper with a wordlist on their GPU: no more network
      rate limit. A weak password ("password123") falls in minutes.
      Defense: strong password policy, but mostly: do NOT let the
      hash leak in the first place.

  - title_fr: "OWASP API3:2023 — Broken Object Property Level Authorization"
    title_en: "OWASP API3:2023 — Broken Object Property Level Authorization"
    body_fr: |
      Cette categorie OWASP API Security cible exactement ce challenge :
      l'autorisation au niveau de la PROPRIETE d'un objet (pas de
      l'objet entier). Un user a le droit de voir SON profil, mais pas
      le champ password de SON profil. Le bon controle est : pour chaque
      champ retourne, le user demandeur a-t-il le droit de voir CE
      champ ? Toujours plus stricte qu'une simple verification
      d'ownership.
    body_en: |
      This OWASP API Security category targets exactly this challenge:
      authorization at the PROPERTY level of an object (not the whole
      object). A user has the right to see THEIR profile, but not the
      password field of THEIR profile. The right check is: for each
      returned field, does the requester have the right to see THAT
      field? Always stricter than a plain ownership check.
