challenge_key: "changePasswordBenderChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Change le password de Bender en "slurmCl4ssic" SANS utiliser
  SQL Injection ni Forgot Password. Description OWASP. Hints
  officiels : (1) "In previous releases this challenge was
  wrongly accused of being based on CSRF". (2) "It might also
  have been put into the Improper Input Validation category".
  (3) "Bender's current password is so strong that brute force,
  rainbow table or guessing attacks will probably not work".
  [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : Le bug racine est dans
  routes/changePassword.ts ligne 39 (verifie source). Code
  exact : `if (currentPassword && security.hash(currentPassword)
  !== loggedInUser.data.password)`. Le AND court-circuit fait
  que la verification du current password est SAUTEE quand le
  parametre `current` est OMIS. Donc en envoyant un GET
  /rest/user/change-password?new=slurmCl4ssic&repeat=slurmCl
  4ssic SANS le parametre `current`, on bypass la verification
  d'authenticite. Solve condition (ligne 54) : user.id === 3
  (Bender) && password === hash('slurmCl4ssic'). Pre-requis :
  posseder un Authorization Bearer token de Bender (par ex.
  via leakedApiKey, XSS, ou autre vecteur autorise — pas
  SQLi/Forgot per description).

mission_en: |
  Change Bender's password to "slurmCl4ssic" WITHOUT using SQL
  Injection or Forgot Password. OWASP description. Official
  hints: (1) "In previous releases this challenge was wrongly
  accused of being based on CSRF". (2) "It might also have
  been put into the Improper Input Validation category". (3)
  "Bender's current password is so strong that brute force,
  rainbow table or guessing attacks will probably not work".
  [KILL_CHAIN_DOCUMENTED]

  Recommended method: Root bug is in routes/changePassword.ts
  line 39 (verified source). Exact code: `if (currentPassword
  && security.hash(currentPassword) !== loggedInUser.data.
  password)`. AND short-circuit makes current password
  verification SKIPPED when `current` parameter is OMITTED.
  So sending GET /rest/user/change-password?new=slurmCl4ssic
  &repeat=slurmCl4ssic WITHOUT `current` parameter bypasses
  authenticity verification. Solve condition (line 54): user.
  id === 3 (Bender) && password === hash('slurmCl4ssic').
  Prerequisite: possess Authorization Bearer token of Bender
  (e.g., via leakedApiKey, XSS, or other allowed vector — not
  SQLi/Forgot per description).

concepts:
  - title_fr: "AND short-circuit + null check missing : la mauvaise verification"
    title_en: "AND short-circuit + missing null check: bad verification"
    body_fr: |
      Source verbatim (routes/changePassword.ts:39) : `if
      (currentPassword && security.hash(currentPassword) !==
      loggedInUser.data.password) { res.status(401).send('
      Current password is not correct.') }`. Probleme
      structurel : le `if` ne s'execute QUE si
      currentPassword est truthy. Si l'attaquant omet le
      parametre, currentPassword === undefined === falsy,
      AND short-circuit, verification SAUTEE. Le code DEVRAIT
      etre : `if (security.hash(currentPassword || '') !==
      loggedInUser.data.password)`. Pattern : verification
      conditionnelle qui devrait etre obligatoire = bug
      classique d'authentication. Hint OWASP #2 confirme :
      "Improper Input Validation category".
    body_en: |
      Verbatim source (routes/changePassword.ts:39): `if
      (currentPassword && security.hash(currentPassword) !==
      loggedInUser.data.password) { res.status(401).send('
      Current password is not correct.') }`. Structural
      problem: `if` executes ONLY if currentPassword is
      truthy. If attacker omits parameter, currentPassword
      === undefined === falsy, AND short-circuit,
      verification SKIPPED. Code SHOULD be: `if
      (security.hash(currentPassword || '') !==
      loggedInUser.data.password)`. Pattern: conditional
      verification that should be mandatory = classic
      authentication bug. OWASP hint #2 confirms: "Improper
      Input Validation category".

  - title_fr: "Pourquoi pas CSRF : hint #1 \"wrongly accused\""
    title_en: "Why not CSRF: hint #1 \"wrongly accused\""
    body_fr: |
      Hint OWASP #1 : "In previous releases this challenge
      was wrongly accused of being based on CSRF". Important
      pour la pedagogie : avant les Juice Shop versions
      modernes, ce challenge etait classifie CSRF (forge a
      victim's request). Avec l'introduction des CORS
      restrictions et SameSite cookies par defaut, CSRF
      est de moins en moins viable comme classe d'attaque.
      OWASP a re-categorise le challenge sur sa VRAIE racine
      (manque de verification du current password). Lecon :
      les categorisations evoluent avec le contexte (browser
      security defaults, framework choices). Ne pas figer une
      vuln dans une seule classe.
    body_en: |
      OWASP hint #1: "In previous releases this challenge
      was wrongly accused of being based on CSRF". Important
      pedagogically: before modern Juice Shop versions,
      challenge was classified CSRF (forge a victim's
      request). With CORS restrictions and default SameSite
      cookies, CSRF is increasingly non-viable as attack
      class. OWASP re-categorized challenge on TRUE root
      (missing current password verification). Lesson:
      categorizations evolve with context (browser security
      defaults, framework choices). Don't pin a vuln to a
      single class.

  - title_fr: "Defense canonique : OWASP Authentication Cheat Sheet"
    title_en: "Canonical defense: OWASP Authentication Cheat Sheet"
    body_fr: |
      mitigationUrl du challenge :
      cheatsheetseries.owasp.org/cheatsheets/Authentication_
      Cheat_Sheet.html. Recommandations applicables : (1)
      "Re-authenticate before performing critical operations"
      (changement de password est critical), (2) "Validate
      input including its presence" (jamais de short-circuit
      sur null/undefined), (3) "Implement rate limiting on
      password change endpoint" (eviter automated abuse).
      Defense correcte : `if (!currentPassword || security.
      hash(currentPassword) !== loggedInUser.data.password)
      { return 401 }` — la verification est OBLIGATOIRE,
      pas conditionnelle.
    body_en: |
      Challenge mitigationUrl:
      cheatsheetseries.owasp.org/cheatsheets/Authentication_
      Cheat_Sheet.html. Applicable recommendations: (1)
      "Re-authenticate before performing critical
      operations" (password change is critical), (2)
      "Validate input including its presence" (never
      short-circuit on null/undefined), (3) "Implement rate
      limiting on password change endpoint" (avoid
      automated abuse). Correct defense: `if (!
      currentPassword || security.hash(currentPassword) !==
      loggedInUser.data.password) { return 401 }` —
      verification is MANDATORY, not conditional.
