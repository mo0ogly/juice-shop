challenge_key: "typosquattingNpmChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Informe le shop (via /#/contact) d'un trick de
  typosquatting dont il a ete victime au moins en
  v6.2.0-SNAPSHOT. Mentionne le nom EXACT du culprit dans
  le commentaire feedback. Description OWASP. Hints
  officiels : (1) "This challenge has nothing to do with
  mistyping web domains. Investigate the forgotten
  developer's backup file instead". (2) "Investigating the
  forgotten developer's backup file might bring some
  insight". (3) "'Malicious packages in npm' is a
  worthwhile read on Ivan Akulov's blog". [KILL_CHAIN_
  DOCUMENTED]

  Methode recommandee : Le solve check est dans routes/
  verify.ts:270-274 (verifie source). Code exact :
  `checkPatternInFeedbackAndComplaints(challenges.
  typosquattingNpmChallenge, { [Op.like]: '%epilogue-js%' })
  `. Donc le culprit cherche est `epilogue-js`. Pre-requis
  (hint #1) : forgottenDevBackupChallenge resolu pour
  acceder a /ftp/package.json.bak (le backup file
  developpeur). Workflow : (1) Resoudre forgottenDevBackup
  pour avoir package.json.bak. (2) Inspecter les
  dependencies pour trouver `epilogue-js` (un typosquat de
  `epilogue` ou similar). (3) Submit feedback /#/contact
  avec le commentaire mentionnant "epilogue-js". (4) Solve
  auto via le pattern matching cote serveur.

