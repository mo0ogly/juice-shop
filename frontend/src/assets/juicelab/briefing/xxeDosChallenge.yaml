challenge_key: "xxeDosChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Give le serveur something to chew sur for
  >2sec. Tag : Danger Zone. Description OWASP.
  Hints : (1) "not as easy as sending large
  amount of data directly". (2) "leverage
  point is the same as XXE Data Access". (3)
  "keep server busy >2sec". (4) "effectiveness
  depends on operating system". [KILL_CHAIN_
  DOCUMENTED]

  Methode : Solve dans routes/fileUpload.ts:
  91-92. Code : `if (utils.contains(error
  Message, 'Script execution timed out')) {
  challengeUtils.solve(challenges.xxeDos
  Challenge) }`. Le solveIf trigger quand le
  XML parsing TIMEOUT (>2sec, configure ligne
  83 `timeout: 2000`). Pre-requis :
  deprecatedInterface.

  IMPORTANT (PDF Bjoern Kimminich p.408) : le
  billion laughs CLASSIQUE est BLOQUE par le
  parser hardened (renvoie HTTP 410 "Detected
  an entity reference loop"). 2 vraies methodes
  documentees : (a) Linux only, external
  entity reference vers `file:///dev/random`
  qui produit un flux infini de bytes
  alimentant le parser jusqu'au timeout. (b)
  Quadratic blowup attack (variante Billion
  Laughs sans recursion d'entites mais avec
  une seule entite reutilisee massivement),
  qui contourne la detection de "reference
  loop".

mission_en: |
  Give server something to chew on for >2sec.
  Tag: Danger Zone. OWASP description. Hints:
  (1) "not as easy as sending large amount of
  data directly". (2) "leverage point is same
  as XXE Data Access". (3) "keep server busy
  >2sec". (4) "effectiveness depends on
  operating system". [KILL_CHAIN_DOCUMENTED]

  Method: Solve in routes/fileUpload.ts:91-92.
  Code: `if (utils.contains(errorMessage,
  'Script execution timed out')) {
  challengeUtils.solve(challenges.xxeDos
  Challenge) }`. solveIf triggers when XML
  parsing TIMEOUTS (>2sec, configured line
  83 `timeout: 2000`). Prerequisite:
  deprecatedInterface.

  IMPORTANT (PDF Bjoern Kimminich p.408): the
  CLASSIC billion laughs is BLOCKED by the
  hardened parser (returns HTTP 410 "Detected
  an entity reference loop"). 2 actually
  documented methods: (a) Linux only, external
  entity reference to `file:///dev/random`
  which produces an infinite byte stream
  feeding the parser until timeout. (b)
  Quadratic blowup attack (Billion Laughs
  variant without entity recursion but with a
  single entity massively reused), which
  bypasses "reference loop" detection.

concepts:
  - title_fr: "Billion Laughs et ses variantes : pourquoi le classique est bloque"
    title_en: "Billion Laughs and variants: why the classic is blocked"
    body_fr: |
      Source canonique : CVE-2003-1564 (Billion
      Laughs original) + PDF Bjoern Kimminich
      p.408. Mecanique classique : entites XML
      qui referent d'AUTRES entites. Chain
      `&lol1;` -> `&lol2;` x10 -> `&lol3;` x10
      -> ... 9 levels = 10^9 expansions =
      memory exponentielle. MAIS libxml2 v2.7+
      detecte les entity loops et retourne
      HTTP 410 "Detected an entity reference
      loop" - le classique billion laughs ne
      passe plus. Variantes qui marchent : (a)
      `file:///dev/random` external entity
      (Linux only, /dev/random infinite stream
      feed le parser jusqu'au timeout 2sec)
      (b) Quadratic blowup (UNE entite repetee
      massivement dans le doc XML, pas de
      recursion donc pas detectee comme loop).
    body_en: |
      Canonical source: CVE-2003-1564
      (original Billion Laughs) + PDF Bjoern
      Kimminich p.408. Classic mechanic: XML
      entities referencing OTHER entities.
      Chain `&lol1;` -> `&lol2;` x10 ->
      `&lol3;` x10 -> ... 9 levels = 10^9
      expansions = exponential memory. BUT
      libxml2 v2.7+ detects entity loops and
      returns HTTP 410 "Detected an entity
      reference loop" - classic billion laughs
      no longer works. Working variants: (a)
      `file:///dev/random` external entity
      (Linux only, /dev/random infinite stream
      feeds parser until 2sec timeout) (b)
      Quadratic blowup (ONE entity massively
      repeated in XML doc, no recursion, not
      detected as loop).

  - title_fr: "vm.runInContext timeout : the trap"
    title_en: "vm.runInContext timeout: the trap"
    body_fr: |
      Source verifiee (routes/fileUpload.ts:
      83) : `vm.runInContext('libxml.
      parseXml(...)', sandbox, { timeout:
      2000 })`. Le timeout 2sec signale que
      les devs Juice Shop SAVENT que le
      parsing peut etre slow. Mais le
      timeout n'est pas une defense - il
      cause juste un error 503 ET solve le
      challenge ! Pattern reusable : un
      timeout TOUT SEUL n'est pas une
      defense ; il faut entity expansion
      LIMIT (libxml options : `huge: false`,
      `recover: false`).
    body_en: |
      Verified source (routes/fileUpload.ts:
      83): `vm.runInContext('libxml.
      parseXml(...)', sandbox, { timeout:
      2000 })`. 2sec timeout signals Juice
      Shop devs KNOW parsing can be slow.
      But timeout is NOT a defense - it
      just causes 503 error AND solves
      challenge! Reusable pattern: timeout
      ALONE not a defense; need entity
      expansion LIMIT (libxml options:
      `huge: false`, `recover: false`).

  - title_fr: "Defense canonique : entity expansion limits"
    title_en: "Canonical defense: entity expansion limits"
    body_fr: |
      Defense en profondeur : (1) Disable
      DOCTYPE entirely (`doctype: false`) -
      no entities possible. (2) Limit entity
      expansion : `entityResolver: false` ou
      configure max entity depth. (3) libxml
      `huge: false` (default safe in v2.7+).
      (4) Process timeout (already in Juice
      Shop). (5) Resource limits (cgroups,
      ulimit). (6) Sandbox container avec
      memory limit (Docker `--memory=512m`).
    body_en: |
      Defense in depth: (1) Disable DOCTYPE
      entirely (`doctype: false`) - no
      entities possible. (2) Limit entity
      expansion: `entityResolver: false` or
      configure max entity depth. (3) libxml
      `huge: false` (safe default in v2.7+).
      (4) Process timeout (already in Juice
      Shop). (5) Resource limits (cgroups,
      ulimit). (6) Sandbox container with
      memory limit (Docker `--memory=512m`).
