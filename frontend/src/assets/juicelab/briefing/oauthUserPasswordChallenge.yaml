challenge_key: "oauthUserPasswordChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Login avec le compte Gmail de Bjoern (bjoern.kimminich@
  gmail.com) SANS changer son password, sans SQLi, sans hacker
  son compte Google. Description OWASP. Hints officiels : (1)
  "The security flaw behind this challenge is 100% OWASP Juice
  Shop's fault and 0% Google's". (2) "One way to light up this
  challenge in green on the score board, is to be Bjoern
  Kimminich. In that case, just log in with your Google
  account". (3) "Most likely you are not Bjoern Kimminich, so
  instead you might want to take detailed look into how the
  OAuth login with Google is implemented". (4) "It could
  bring you some insight to register with your own Google
  account and analyze closely what happens behind the scenes".
  Tag : Code Analysis. [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : Le bug racine est dans
  routes/login.ts ligne 65 (verifie source). Code exact :
  `req.body.email === 'bjoern.kimminich@gmail.com' &&
  req.body.password === 'bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI='`.
  Le password `bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI=` decode
  en base64 = `moc.liamg@hcinimmik.nreojb` qui est
  `bjoern.kimminich@gmail.com` REVERSE. Donc l'algorithme
  Juice Shop pour generer un password OAuth = base64(
  reverse(email)). Ce pattern est dans le frontend Angular
  (oauth login handler). Login : email = bjoern.kimminich@
  gmail.com, password = bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI=.

mission_en: |
  Login with Bjoern's Gmail account (bjoern.kimminich@
  gmail.com) WITHOUT changing his password, no SQLi, no
  hacking his Google account. OWASP description. Official
  hints: (1) "The security flaw behind this challenge is
  100% OWASP Juice Shop's fault and 0% Google's". (2) "One
  way to light up this challenge in green on the score
  board, is to be Bjoern Kimminich. In that case, just log
  in with your Google account". (3) "Most likely you are
  not Bjoern Kimminich, so instead you might want to take
  detailed look into how the OAuth login with Google is
  implemented". (4) "It could bring you some insight to
  register with your own Google account and analyze closely
  what happens behind the scenes". Tag: Code Analysis.
  [KILL_CHAIN_DOCUMENTED]

  Recommended method: Root bug is in routes/login.ts line
  65 (verified source). Exact code: `req.body.email ===
  'bjoern.kimminich@gmail.com' && req.body.password ===
  'bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI='`. Password
  `bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI=` base64 decodes to
  `moc.liamg@hcinimmik.nreojb` which is `bjoern.
  kimminich@gmail.com` REVERSED. So Juice Shop algorithm
  for OAuth password generation = base64(reverse(email)).
  This pattern is in Angular frontend (oauth login
  handler). Login: email = bjoern.kimminich@gmail.com,
  password = bW9jLmxpYW1nQGhjaW5pbW1pay5ucmVvamI=.

concepts:
  - title_fr: "Deterministic password generation : la trap fondamentale"
    title_en: "Deterministic password generation: the fundamental trap"
    body_fr: |
      Pattern racine : Juice Shop genere un password
      automatiquement pour les comptes OAuth via une
      fonction DETERMINISTE (`base64(reverse(email))`)
      sans entropie aleatoire. Tout attaquant connaissant
      l'email peut RECONSTITUER le password. C'est un
      anti-pattern critique : un password genere doit
      avoir 128+ bits d'entropie (crypto.randomBytes(32)
      base64-encoded) puis etre stocke EN HASH cote
      serveur, jamais regenere a la volee. La logique
      Juice Shop "le user n'a pas de password OAuth donc
      on en fabrique un deterministically" est un
      raccourci de developpement qui devient vector. Pour
      OAuth (Google sign-in), le BON pattern est : ne PAS
      stocker de password local, identifier le user
      uniquement via le provider OAuth (sub claim JWT
      Google) et un mapping table.
    body_en: |
      Root pattern: Juice Shop automatically generates
      password for OAuth accounts via DETERMINISTIC
      function (`base64(reverse(email))`) without random
      entropy. Any attacker knowing email can RECONSTITUTE
      password. Critical anti-pattern: generated password
      must have 128+ bits entropy (crypto.randomBytes(32)
      base64-encoded) then stored AS HASH server-side,
      never regenerated on-the-fly. Juice Shop logic
      "user has no OAuth password so we fabricate one
      deterministically" is dev shortcut becoming vector.
      For OAuth (Google sign-in), CORRECT pattern: do NOT
      store local password, identify user only via OAuth
      provider (Google JWT sub claim) and mapping table.

  - title_fr: "Code Analysis tag : ou chercher le pattern dans Angular"
    title_en: "Code Analysis tag: where to find pattern in Angular"
    body_fr: |
      Tag du challenge : "Code Analysis". Le bug est dans
      le frontend Angular (oauth login handler) qui genere
      le password client-side avant de le POST au backend.
      Pour le trouver : DevTools Sources, search 'btoa'
      ou 'reverse' dans le bundle main.js (Webpack
      sourcemaps actives en dev). Cherche specifiquement
      la classe LoginComponent ou OAuthService. Le code
      visible est typiquement : `this.password = btoa(this
      .email.split('').reverse().join(''))`. Apres
      identification, l'attaquant reproduit le calcul pour
      n'importe quel email cible. Pattern reusable : code
      analysis du frontend bundle = surface souvent
      negligee mais riche.
    body_en: |
      Challenge tag: "Code Analysis". Bug is in Angular
      frontend (oauth login handler) generating password
      client-side before POST-ing to backend. To find:
      DevTools Sources, search 'btoa' or 'reverse' in
      main.js bundle (Webpack sourcemaps enabled in dev).
      Specifically look for LoginComponent or OAuthService
      class. Visible code typically: `this.password =
      btoa(this.email.split('').reverse().join(''))`.
      After identification, attacker reproduces
      computation for any target email. Reusable pattern:
      frontend bundle code analysis = often-neglected but
      rich surface.

  - title_fr: "Defense canonique : OAuth sans password local"
    title_en: "Canonical defense: OAuth without local password"
    body_fr: |
      mitigationUrl du challenge :
      cheatsheetseries.owasp.org/cheatsheets/Authentication_
      Cheat_Sheet.html. Recommandation OAuth/OIDC
      moderne : (1) Verifier la signature du JWT issued
      par Google (kid + JWKS endpoint), (2) Identifier
      l'user via sub claim (stable, immutable) + iss
      claim (google.com), (3) Mapping table : (oauth_
      provider, oauth_sub) -> internal_user_id, sans
      password local. Pour les flows mixed (oauth + local
      login), garder password local mais require
      explicit setup (force user to set during OAuth
      consent flow). JAMAIS de generation deterministique.
      Pattern reusable : OAuth elimine la necessite de
      password local ; en avoir un = re-introduire
      surface d'attaque.
    body_en: |
      Challenge mitigationUrl:
      cheatsheetseries.owasp.org/cheatsheets/Authentication_
      Cheat_Sheet.html. Modern OAuth/OIDC recommendation:
      (1) Verify Google-issued JWT signature (kid + JWKS
      endpoint), (2) Identify user via sub claim (stable,
      immutable) + iss claim (google.com), (3) Mapping
      table: (oauth_provider, oauth_sub) -> internal_
      user_id, no local password. For mixed flows (oauth
      + local login), keep local password but require
      explicit setup (force user to set during OAuth
      consent flow). NEVER deterministic generation.
      Reusable pattern: OAuth eliminates local password
      need; having one = re-introducing attack surface.
