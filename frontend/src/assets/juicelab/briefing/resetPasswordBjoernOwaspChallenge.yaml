challenge_key: "resetPasswordBjoernOwaspChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Reset le password du compte OWASP de Bjoern (different du
  compte interne) via Forgot Password en repondant CORRECTEMENT
  a sa security question avec la reponse ORIGINALE. Description
  OWASP. Hints officiels : (1) "Hints to the answer to Bjoern's
  question can be found by looking him up on the Internet". (2)
  "More precisely, Bjoern might have accidentally (?) doxxed
  himself by mentioning his security answer on at least one
  occasion where a camera was running". (3) "Brute forcing the
  answer might be very well possible with a sufficiently
  extensive list of common pet names". [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : (1) Va sur /#/forgot-password, entre
  bjoern.kimminich@gmail.com (compte OWASP, different du
  bjoern@juice-sh.op interne). (2) La security question
  s'affiche : "Name of your favorite pet?" ou similar. (3)
  Cherche les VIDEOS de talks publics de Bjoern Kimminich (OWASP
  AppSec EU/USA, AppSec Day, conferences locales) sur YouTube.
  Hint #2 confirme : "occasion where a camera was running".
  Bjoern aurait mentionne le nom de son chat/chien sur scene.
  (4) Alternative : brute force avec wordlist pet names
  populaires (hint #3 valide cette approche).

mission_en: |
  Reset Bjoern's OWASP account password (different from
  internal account) via Forgot Password by CORRECTLY answering
  his security question with ORIGINAL answer. OWASP description.
  Official hints: (1) "Hints to the answer to Bjoern's question
  can be found by looking him up on the Internet". (2) "More
  precisely, Bjoern might have accidentally (?) doxxed himself
  by mentioning his security answer on at least one occasion
  where a camera was running". (3) "Brute forcing the answer
  might be very well possible with a sufficiently extensive
  list of common pet names". [KILL_CHAIN_DOCUMENTED]

  Recommended method: (1) Go to /#/forgot-password, enter
  bjoern.kimminich@gmail.com (OWASP account, different from
  bjoern@juice-sh.op internal). (2) Security question appears:
  "Name of your favorite pet?" or similar. (3) Search PUBLIC
  TALKS videos by Bjoern Kimminich (OWASP AppSec EU/USA,
  AppSec Day, local conferences) on YouTube. Hint #2 confirms:
  "occasion where a camera was running". Bjoern allegedly
  mentioned his cat/dog name on stage. (4) Alternative: brute
  force with popular pet names wordlist (hint #3 validates
  this).

concepts:
  - title_fr: "Self-doxx via conference video : pattern unique a ce challenge"
    title_en: "Self-doxx via conference video: pattern unique to this challenge"
    body_fr: |
      Hint OWASP #2 cite verbatim : "Bjoern might have
      accidentally (?) doxxed himself by mentioning his
      security answer on at least one occasion where a camera
      was running". C'est une vector OSINT specifique : video
      OSINT. Les conf-talks recordes (OWASP, BlackHat, DefCon,
      meetups) deviennent une mine d'OSINT. Un orateur peut
      mentionner son chien, sa ville natale, son ecole sans se
      rendre compte que la video sera publique pour des annees.
      Defense personnelle : audit talks AVANT publication
      (review video pour info sensible). Defense systeme :
      retirer security questions (codefixes #1).
    body_en: |
      OWASP hint #2 verbatim: "Bjoern might have accidentally
      (?) doxxed himself by mentioning his security answer on
      at least one occasion where a camera was running". This
      is a specific OSINT vector: video OSINT. Recorded
      conf-talks (OWASP, BlackHat, DefCon, meetups) become an
      OSINT goldmine. A speaker may mention their dog, home
      town, school without realizing video stays public for
      years. Personal defense: audit talks BEFORE publication
      (review video for sensitive info). System defense:
      remove security questions (codefixes #1).

  - title_fr: "Pet name : solution space limite, brute force feasible"
    title_en: "Pet name: limited solution space, brute force feasible"
    body_fr: |
      Hint OWASP #3 : "Brute forcing the answer might be very
      well possible with a sufficiently extensive list of
      common pet names". C'est une difference critique avec
      resetPasswordBjoernChallenge (interne) ou hint #5 dit
      "Brute forcing should be next to impossible". Pourquoi ?
      Le solution space pour pet names est borne (~5000-10000
      noms communs sur Top Pet Names lists), enumerable en
      quelques minutes. Codefixes/
      resetPasswordBjoernOwaspChallenge.info.yml explanation
      #3 : "There are even less car brands in the world than
      potential pet names. Therefore, changing the security
      questions has even a negative effect on overall security
      as it makes guessing and brute forcing much easier".
      Pattern : choisir une question avec answer space large
      est mieux que une question avec answer space etroit.
    body_en: |
      OWASP hint #3: "Brute forcing the answer might be very
      well possible with a sufficiently extensive list of
      common pet names". This is critical difference with
      resetPasswordBjoernChallenge (internal) where hint #5
      says "Brute forcing should be next to impossible". Why?
      Solution space for pet names is bounded (~5000-10000
      common names on Top Pet Names lists), enumerable in
      minutes. Codefixes/
      resetPasswordBjoernOwaspChallenge.info.yml explanation
      #3: "There are even less car brands in the world than
      potential pet names. Therefore, changing the security
      questions has even a negative effect on overall security
      as it makes guessing and brute forcing much easier".
      Pattern: choosing question with large answer space is
      better than question with narrow answer space.

  - title_fr: "Codefixes #1 : la \"narrowing scope\" anti-pattern"
    title_en: "Codefixes #1: \"narrowing scope\" anti-pattern"
    body_fr: |
      Codefixes/resetPasswordBjoernOwaspChallenge.info.yml
      explanation #1 (verbatim) : "This fix option is
      obviously (?) a joke. But it should still illustrate
      that narrowing the scope of a question reduces the
      solution space accordingly, thus making 'social
      stalking' and brute force much easier". C'est un
      anti-pattern important : "ameliorer" la security en
      narrowing the question (ex. "favorite pet" -> "favorite
      dog"). En reduisant le scope, on reduit le brute force
      space, donc on FACILITE l'attaque. La defense reelle =
      retirer security questions (cf. cheatsheet OWASP).
    body_en: |
      Codefixes/resetPasswordBjoernOwaspChallenge.info.yml
      explanation #1 (verbatim): "This fix option is
      obviously (?) a joke. But it should still illustrate
      that narrowing the scope of a question reduces the
      solution space accordingly, thus making 'social
      stalking' and brute force much easier". This is an
      important anti-pattern: "improving" security by
      narrowing question (e.g., "favorite pet" -> "favorite
      dog"). Narrowing reduces brute-force space, thus EASING
      attack. Real defense = remove security questions (per
      OWASP cheatsheet).
