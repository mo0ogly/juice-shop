challenge_key: "resetPasswordBenderChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Reset le password du compte interne de Bender via le mecanisme
  Forgot Password en repondant CORRECTEMENT a sa security question
  avec sa REPONSE ORIGINALE (pas une nouvelle reponse). Description
  OWASP. Hints officiels : (1) "If you have no idea who Bender is,
  please put down this book right now and watch the first episodes
  of Futurama". (2) "Bender chose to answer his chosen question
  truthfully". (3) "Hints to the answer to Bender's question can be
  found in publicly available information on the Internet". (4) "If
  a seemingly correct answer is not accepted, you might just need
  to try some alternative spelling". [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : (1) Va sur /#/forgot-password et entre
  l'email de Bender (bender@juice-sh.op). (2) La security question
  s'affiche : typiquement liee a une appartenance/affiliation
  Futurama. (3) OSINT culturel sur le perso Bender (Wikipedia
  Futurama, Fandom wiki) pour trouver la reponse canonique. (4) Si
  la reponse semble correcte mais est rejetee, essaie spelling
  alternatif (ex. avec/sans accent, abbreviation, langue
  originale). Hint #4 OWASP est explicite la-dessus.

mission_en: |
  Reset Bender's internal account password via Forgot Password
  by CORRECTLY answering his security question with his ORIGINAL
  answer (not a new one). OWASP description. Official hints: (1)
  "If you have no idea who Bender is, please put down this book
  right now and watch the first episodes of Futurama". (2) "Bender
  chose to answer his chosen question truthfully". (3) "Hints to
  the answer to Bender's question can be found in publicly
  available information on the Internet". (4) "If a seemingly
  correct answer is not accepted, you might just need to try some
  alternative spelling". [KILL_CHAIN_DOCUMENTED]

  Recommended method: (1) Go to /#/forgot-password and enter
  Bender's email (bender@juice-sh.op). (2) Security question
  appears: typically tied to a Futurama affiliation/membership.
  (3) Cultural OSINT on Bender (Wikipedia Futurama, Fandom wiki)
  to find canonical answer. (4) If answer seems correct but is
  rejected, try alternative spelling (with/without accent,
  abbreviation, original language). OWASP hint #4 makes this
  explicit.

concepts:
  - title_fr: "Pop-culture security questions et la trap du \"alternative spelling\""
    title_en: "Pop-culture security questions and the alternative spelling trap"
    body_fr: |
      Hint #4 OWASP est unique a ce challenge parmi les 4 reset
      password : "If a seemingly correct answer is not accepted,
      you might just need to try some alternative spelling".
      Source : codefixes/resetPasswordBenderChallenge.info.yml
      explanation #1. Probleme structurel des security questions
      sur entites pop-culture : multiples spellings legitimes
      (ex. nom d'organisation Futurama). L'attaquant doit tester
      plusieurs orthographes. La defense (au-dela du retrait des
      security questions) est de canonicaliser la reponse via
      lower(trim(remove_accents(...))) cote serveur — ce que
      Juice Shop ne fait pas (encore une raison de retirer les
      security questions).
    body_en: |
      OWASP hint #4 is unique to this challenge among the 4
      reset password: "If a seemingly correct answer is not
      accepted, you might just need to try some alternative
      spelling". Source: codefixes/
      resetPasswordBenderChallenge.info.yml explanation #1.
      Structural problem of security questions on pop-culture
      entities: multiple legitimate spellings (e.g., Futurama
      organization name). Attacker must test multiple
      orthographies. Defense (beyond removing security
      questions) is to canonicalize answer via
      lower(trim(remove_accents(...))) server-side — which Juice
      Shop does not do (yet another reason to remove security
      questions).

  - title_fr: "Defense canonique : OWASP cheatsheet \"Choosing and Using Security Questions\""
    title_en: "Canonical defense: OWASP \"Choosing and Using Security Questions\" Cheat Sheet"
    body_fr: |
      Source officielle : OWASP Choosing and Using Security
      Questions Cheat Sheet (mitigationUrl du challenge).
      Recommandation principale (verbatim codefixes
      explanation #2) : "When answered truthfully, all security
      questions are susceptible to online research (on Facebook,
      LinkedIn etc.) and often even brute force. If at all, they
      should not be used as the only factor for a security-
      relevant function". Le bon design : retirer le mecanisme
      ou utiliser secret tokens emailes + 2FA + rate limiting.
    body_en: |
      Official source: OWASP Choosing and Using Security
      Questions Cheat Sheet (challenge mitigationUrl). Main
      recommendation (verbatim codefixes explanation #2): "When
      answered truthfully, all security questions are
      susceptible to online research (on Facebook, LinkedIn
      etc.) and often even brute force. If at all, they should
      not be used as the only factor for a security-relevant
      function". Good design: remove mechanism or use emailed
      secret tokens + 2FA + rate limiting.

  - title_fr: "OSINT culturel sur les fictional characters"
    title_en: "Cultural OSINT on fictional characters"
    body_fr: |
      Specificite des comptes Juice Shop bases sur des
      personnages fictifs : la reponse OSINT est sourcee sur
      les fan wikis (Fandom, MyAnimeList, Wikipedia) plutot que
      sur des reseaux sociaux personnels. Pour Bender (Futurama)
      : Wikipedia "Bender (Futurama)" + Futurama Fandom Wiki.
      L'attaquant n'a meme pas besoin d'acces ou outil OSINT
      sophistique : un browser et 2 minutes suffisent. Cela
      illustre que les security questions sur entites publiques
      n'ont AUCUN niveau de protection effective.
    body_en: |
      Juice Shop accounts based on fictional characters
      specificity: OSINT answer sourced from fan wikis (Fandom,
      MyAnimeList, Wikipedia) rather than personal social
      networks. For Bender (Futurama): Wikipedia "Bender
      (Futurama)" + Futurama Fandom Wiki. Attacker doesn't even
      need access or sophisticated OSINT tooling: a browser and
      2 minutes suffice. This illustrates that security
      questions on public entities have ZERO effective
      protection.
