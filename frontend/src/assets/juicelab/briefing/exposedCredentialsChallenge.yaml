challenge_key: "exposedCredentialsChallenge"
schema_version: "juicelab.briefing.v1"

mission_fr: |
  Trouve un credential (token, cle d'API, mot de passe technique) qui a
  ete oublie en clair dans le code livre au navigateur. C'est un challenge
  de RECONNAISSANCE STATIQUE sur le bundle JS, pas un challenge de
  formulaire ou d'injection.

  Methode recommandee : ouvre les DevTools (F12), onglet Sources, deroule
  les fichiers main-XXX.js et runtime-XXX.js. Cherche les patterns
  evocateurs : "password", "token", "api_key", "secret", des chaines
  contenant "@" (emails), des UUID, des longues chaines hex/base64. La
  minification rend la lecture penible mais ne CACHE rien : un coup de
  just-beautify ou le bouton "{}" de DevTools remet le code en forme.

  Note la nature du credential trouve, OU il etait, et ce qu'il
  permettrait a un attaquant. Tu en parleras dans le journal "apres".

mission_en: |
  Find a credential (token, API key, technical password) that was left
  in clear text in the code shipped to the browser. This is a STATIC
  RECONNAISSANCE challenge on the JS bundle, not a form or injection
  challenge.

  Recommended method: open DevTools (F12), Sources tab, expand
  main-XXX.js and runtime-XXX.js. Look for evocative patterns:
  "password", "token", "api_key", "secret", strings containing "@"
  (emails), UUIDs, long hex/base64 strings. Minification makes reading
  painful but HIDES nothing: a just-beautify pass or the DevTools "{}"
  button reformats the code.

  Note the credential nature, where it lived, and what an attacker
  could do with it. You will report it in the "after" logbook.

concepts:
  - title_fr: "Le bundle client est public par definition"
    title_en: "The client bundle is public by definition"
    body_fr: |
      Tout JavaScript livre au navigateur est telecharge, cache, et
      lisible par tout visiteur. La minification est un brouillage
      cosmetique : just-beautify, prettier, ou simplement le bouton
      "{}" de DevTools restituent le code en forme lisible. Conclusion :
      mettre un secret dans le code client revient a l'afficher en home
      page.
    body_en: |
      Any JavaScript shipped to the browser is downloaded, cached, and
      readable by any visitor. Minification is cosmetic obfuscation:
      just-beautify, prettier, or simply the DevTools "{}" button bring
      back readable formatted code. Conclusion: putting a secret in
      client code amounts to displaying it on the home page.

  - title_fr: "OWASP A02:2021 — Cryptographic Failures"
    title_en: "OWASP A02:2021 — Cryptographic Failures"
    body_fr: |
      Cette categorie OWASP regroupe non seulement les algos casses (DES,
      MD5) mais aussi la mauvaise gestion des secrets : credentials
      hardcodes, secrets en clair en transit, cles oubliees dans les
      logs. Un secret dans le bundle est un cas typique. La sanction
      reglementaire (RGPD article 32 : mesures techniques et
      organisationnelles appropriees) suit en cas de fuite.
    body_en: |
      This OWASP category covers not only broken algos (DES, MD5) but
      also bad secret management: hardcoded credentials, secrets in
      cleartext in transit, keys forgotten in logs. A secret in the
      bundle is a textbook case. Regulatory sanction (GDPR article 32:
      appropriate technical and organisational measures) follows on
      disclosure.

  - title_fr: "Outils de detection : Trufflehog, Gitleaks, semgrep"
    title_en: "Detection tools: Trufflehog, Gitleaks, semgrep"
    body_fr: |
      Trois outils a connaitre par coeur en blue team : Trufflehog et
      Gitleaks scannent l'historique git pour des regex de secrets
      (cles AWS, tokens GitHub, JWT, etc.) avec un score d'entropie ;
      semgrep applique des regles AST sur le code. Integres en CI
      pre-commit, ils transforment l'incident en non-evenement.
      OWASP ZAP et SonarQube font autre chose et ne remplacent pas un
      vrai scanner de secrets.
    body_en: |
      Three tools to know by heart on the blue team: Trufflehog and
      Gitleaks scan git history for secret regexes (AWS keys, GitHub
      tokens, JWTs, etc.) with an entropy score; semgrep applies AST
      rules to code. Wired in CI pre-commit, they turn an incident
      into a non-event. OWASP ZAP and SonarQube do other things and
      do not replace a real secret scanner.

  - title_fr: "Stockage canonique des secrets en production"
    title_en: "Canonical secret storage in production"
    body_fr: |
      Standard 12-factor : variables d'environnement par environnement
      (dev/staging/prod), gerees via un secret manager dedie (HashiCorp
      Vault, AWS Secrets Manager, GCP Secret Manager, KMS). Un .env
      commit dans un repo "prive" finit par fuiter (forks, anciens
      contributeurs, mirroirs). Chiffrer un secret avec une cle elle-meme
      hardcodee deplace simplement le probleme.
    body_en: |
      12-factor standard: per-environment env variables (dev/staging/
      prod) managed via a dedicated secret manager (HashiCorp Vault,
      AWS Secrets Manager, GCP Secret Manager, KMS). A .env file
      committed in a "private" repo eventually leaks (forks, former
      contributors, mirrors). Encrypting a secret with a hardcoded key
      simply moves the problem.
