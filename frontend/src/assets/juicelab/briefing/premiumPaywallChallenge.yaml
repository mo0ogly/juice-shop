challenge_key: "premiumPaywallChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Acceder le Premium Challenge (paywall) sans payer.
  Tag : Shenanigans. Description OWASP. Hints
  officiels : (1) "You do not have to pay anything
  to unlock this challenge! Nonetheless, donations
  are very much appreciated". (2) "There is no
  inappropriate, self-written or misconfigured
  cryptographic library to be exploited here". (3)
  "How much protection does a sturdy top-quality
  door lock add to your house if you put the key
  under the door mat? Or hide the key in the
  nearby plant pot? Or tape the key to the
  underside of the mailbox?". (4) "Once more: You
  do not have to pay anything to unlock this
  challenge!". [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : Le solve check est dans
  routes/premiumReward.ts:13 (verifie source).
  Code exact : `challengeUtils.solveIf(challenges.
  premiumPaywallChallenge, () => { return true })`
  apres GET du URL secret. La description du
  challenge contient un commentaire HTML AES-
  encrypted : `<!--IvLuRfBJYlmStf9XfL6ckJFngyd9LfV1J
  aaN/KRTPQPidTuJ7FR+D/nkWJUF+0xUF07CeCeqYfxq+OJ
  VVa0gNbqgYkUNvn//UbE7e95C+6e+7GtdpqJ8mqm4WcPvUGI
  UxmGLTTAC2+G9UuFCD1DUjg==-->`. Hint OWASP #3
  "key under the door mat" = la clef AES est
  hardcoded DANS le bundle Angular (visible).
  Workflow : (1) Lire la description du Premium
  Paywall challenge dans le score-board source HTML
  (View Source ou DevTools). (2) Extraire le
  ciphertext base64-encoded. (3) Trouver la clef
  AES dans le bundle Angular (DevTools Sources,
  search "encryptionKey" ou "decrypt"). (4)
  Decrypter le ciphertext avec la clef. (5) Le
  plaintext contient l'URL secret du premium
  reward. (6) GET cette URL -> solve auto.

