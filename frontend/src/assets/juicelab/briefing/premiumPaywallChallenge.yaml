  house if you put the key under the door mat?
  Or hide the key in the nearby plant pot? Or
  tape the key to the underside of the mailbox?".
  (4) "Once more: You do not have to pay
  anything to unlock this challenge!".
  [KILL_CHAIN_DOCUMENTED]

  Recommended method: Solve check in routes/
  premiumReward.ts:13 (verified source). Exact
  code: `challengeUtils.solveIf(challenges.
  premiumPaywallChallenge, () => { return true
  })` after GET of secret URL. Challenge
  description contains AES-encrypted HTML
  comment: `<!--IvLuRfBJYlmStf9XfL6ckJFngyd9LfV
  1JaaN/KRTPQPidTuJ7FR+D/nkWJUF+0xUF07CeCeqYfxq
  +OJVVa0gNbqgYkUNvn//UbE7e95C+6e+7GtdpqJ8mqm4Wc
  PvUGIUxmGLTTAC2+G9UuFCD1DUjg==-->`. OWASP hint
  #3 "key under the door mat" = AES key
  hardcoded IN Angular bundle (visible). Workflow:
  (1) Read Premium Paywall challenge description
  in score-board source HTML (View Source or
  DevTools). (2) Extract base64-encoded
  ciphertext. (3) Find AES key in Angular bundle
