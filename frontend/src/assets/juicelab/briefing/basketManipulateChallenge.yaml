challenge_key: "basketManipulateChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Ajoute un produit dans le panier d'un AUTRE utilisateur. Description
  OWASP officielle : "Put an additional product into another user's
  shopping basket". Difference cle avec basketAccess (lecture du
  basket d'un autre, deja resolu en parcours TD) : ici il faut
  ECRIRE dans le basket d'un autre, donc IDOR sur une operation
  write. Hint #2 : "Adding more instances of the same product to
  someone else's basket does not qualify as a solution. The same
  goes for stealing from someone else's basket". Donc pas un
  simple update quantity, il faut ajouter un PRODUIT NOUVEAU.

  Methode recommandee : observe le HTTP traffic (Network tab) en
  ajoutant un produit a TON panier. Tu verras un POST
  /api/BasketItems/ avec body
  { "ProductId": <X>, "BasketId": <ton_bid>, "quantity": 1 }.
  Le serveur ne verifie pas que le BasketId du body correspond au
  bid du JWT — IDOR classique. Modifie le BasketId vers le bid
  d'un autre user (genere par enumeration : 1, 2, 3...) et fais
  le POST. Le produit apparait dans le panier de l'autre user.

  Note la difference fondamentale entre IDOR sur read
  (basketAccess, lecture seule) et IDOR sur write (manipulate,
  modification persistante). Tu en parleras dans le journal
  "apres".

  [KILL_CHAIN_DOCUMENTED]

mission_en: |
  Add a product into ANOTHER user's basket. Official OWASP
  description: "Put an additional product into another user's
  shopping basket". Key difference from basketAccess (reading
  another's basket, already solved in the TD parcours): here you
  need to WRITE into another's basket, so IDOR on a write
  operation. Hint #2: "Adding more instances of the same product
  to someone else's basket does not qualify as a solution. The
  same goes for stealing from someone else's basket". So not a
  simple quantity update, you must add a NEW product.

  Recommended method: observe HTTP traffic (Network tab) while
  adding a product to YOUR basket. You'll see a POST
  /api/BasketItems/ with body
  { "ProductId": <X>, "BasketId": <your_bid>, "quantity": 1 }.
  The server doesn't verify that the body BasketId matches the
  JWT bid — classic IDOR. Modify BasketId to another user's bid
  (generated by enumeration: 1, 2, 3...) and POST. The product
  shows in the other user's basket.

  Note the fundamental difference between IDOR on read
  (basketAccess, read-only) and IDOR on write (manipulate,
  persistent modification). You will report it in the "after"
  logbook.

  [KILL_CHAIN_DOCUMENTED]

concepts:
  - title_fr: "IDOR write : impact mass-affecting non reversible"
    title_en: "IDOR write: mass-affecting non-reversible impact"
    body_fr: |
      Distinction structurelle entre lecture et ecriture en IDOR.
      IDOR sur GET = leak (un user voit les donnees d'un autre).
      Mauvais mais reversible : changer les donnees, rotation des
      secrets. IDOR sur POST/PUT/PATCH/DELETE = modification
      persistante. Mauvais ET non reversible sans backup +
      rollback. Sur basketManipulate, l'attaquant peut harasser
      un user (lui ajouter un produit cher), pratiquer un denial-
      of-checkout (basket non valide), ou lancer une attaque
      coordonnee sur N users en enumerant les bids.
    body_en: |
      Structural distinction between read and write in IDOR.
      IDOR on GET = leak (one user sees another's data). Bad but
      reversible: rotate data, rotate secrets. IDOR on POST/PUT/
      PATCH/DELETE = persistent modification. Bad AND
      irreversible without backup + rollback. On
      basketManipulate, the attacker can harass a user (adding an
      expensive product), denial-of-checkout (invalid basket), or
      run a coordinated attack on N users by enumerating bids.

  - title_fr: "L'attaque etape par etape : observation puis enumeration"
    title_en: "The attack step by step: observe then enumerate"
    body_fr: |
      Hint OWASP officiel #1 : "Have an eye on the HTTP traffic
      while placing products in the shopping basket". Workflow :
      (1) ajoute UN produit a ton basket pour observer la requete
      legitime, (2) repere le format du body
      ({ProductId, BasketId, quantity}), (3) repete la requete
      avec un BasketId different (1, 2, 3 — bids sequentiels), (4)
      le serveur stocke un BasketItem pointant vers le bid d'un
      autre user. Hint #3 : "This challenge requires a bit more
      sophisticated tampering than others of the same ilk" — le
      "more sophisticated" est l'ENUMERATION des bids.
    body_en: |
      Official OWASP hint #1: "Have an eye on the HTTP traffic
      while placing products in the shopping basket". Workflow:
      (1) add ONE product to your basket to observe the
      legitimate request, (2) spot the body format
      ({ProductId, BasketId, quantity}), (3) repeat the request
      with a different BasketId (1, 2, 3 — sequential bids), (4)
      the server stores a BasketItem pointing to another user's
      bid. Hint #3: "This challenge requires a bit more
      sophisticated tampering than others of the same ilk" —
      the "more sophisticated" is bid ENUMERATION.

  - title_fr: "Defense canonique : ownership check sur write operations"
    title_en: "Canonical defense: ownership check on write operations"
    body_fr: |
      Pattern correct : avant d'inserer un BasketItem, le serveur
      verifie que req.body.BasketId.userId === req.user.id. Si
      mismatch, 403. Code Express type :
      router.post('/BasketItems', auth, async (req, res) => {
        const basket = await Basket.findByPk(req.body.BasketId)
        if (!basket || basket.UserId !== req.user.id) {
          return res.status(403).send('Not your basket')
        }
        BasketItem.create(req.body)
      })
      Alternative encore plus stricte : ne pas accepter de
      BasketId du body, le deduire du JWT en chargeant le basket
      du user (Basket.findOne({ where: { UserId: req.user.id }})).
    body_en: |
      Correct pattern: before inserting a BasketItem, the server
      checks req.body.BasketId.userId === req.user.id. If
      mismatch, 403. Sample Express:
      router.post('/BasketItems', auth, async (req, res) => {
        const basket = await Basket.findByPk(req.body.BasketId)
        if (!basket || basket.UserId !== req.user.id) {
          return res.status(403).send('Not your basket')
        }
        BasketItem.create(req.body)
      })
      Even stricter alternative: don't accept BasketId from body,
      derive it from JWT by loading the user's basket
      (Basket.findOne({ where: { UserId: req.user.id }})).
