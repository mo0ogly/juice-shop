challenge_key: "twoFactorAuthUnsafeSecretStorageChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Resous le challenge 2FA pour l'utilisateur "wurstbrot"
  (disabling, bypassing, ou overwriting de ses 2FA settings ne
  compte PAS comme solution). Description OWASP. Hints
  officiels : (1) "The 2FA implementation requires to store a
  secret for every user. You will need to find a way to access
  this secret in order to solve this challenge". (2) "As
  always, first learn how the feature under attack is used and
  behaves under normal conditions". (3) "Make sure you
  understand how 2FA with TOTP (time-based one-time password)
  works and which part of it is the critically sensitive one".
  (4) "Solving the challenge Retrieve a list of all user
  credentials via SQL Injection before tackling this one will
  definitely help. But it will not carry you all the way".
  [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : Le bug racine est dans routes/2fa.ts
  ligne 135 (verifie source) : `userModel.totpSecret = secret`
  (stockage en CLAIR sans chiffrement). Verification ligne 37 :
  `otplib.authenticator.check(totpToken, user.totpSecret)`
  utilise le secret directement, donc il est en plain text.
  Solve condition (ligne 44) : email === wurstbrot@juice-sh.op.
  Workflow : (1) SQLi sur Users (UNION SELECT email,
  totpSecret FROM Users) pour exfiltrer le totpSecret de
  wurstbrot. (2) Importer ce secret dans Google Authenticator
  ou utiliser otplib.authenticator.generate(secret) pour
  generer le token TOTP courant. (3) Login wurstbrot avec son
  password (aussi exfiltre via SQLi + crackage hashcat). (4)
  Quand 2FA prompt apparait, soumettre le TOTP code -> solve.

mission_en: |
  Solve 2FA challenge for user "wurstbrot" (disabling,
  bypassing, or overwriting his 2FA settings does NOT count
  as solution). OWASP description. Official hints: (1) "The
  2FA implementation requires to store a secret for every
  user. You will need to find a way to access this secret in
  order to solve this challenge". (2) "As always, first
  learn how the feature under attack is used and behaves
  under normal conditions". (3) "Make sure you understand
  how 2FA with TOTP (time-based one-time password) works and
  which part of it is the critically sensitive one". (4)
  "Solving the challenge Retrieve a list of all user
  credentials via SQL Injection before tackling this one
  will definitely help. But it will not carry you all the
  way". [KILL_CHAIN_DOCUMENTED]

  Recommended method: Root bug in routes/2fa.ts line 135
  (verified source): `userModel.totpSecret = secret`
  (PLAINTEXT storage without encryption). Verification line
  37: `otplib.authenticator.check(totpToken, user.
  totpSecret)` uses secret directly, so it's plain text.
  Solve condition (line 44): email === wurstbrot@juice-sh.op.
  Workflow: (1) SQLi on Users (UNION SELECT email,
  totpSecret FROM Users) to exfiltrate wurstbrot's
  totpSecret. (2) Import this secret in Google Authenticator
  or use otplib.authenticator.generate(secret) to generate
  current TOTP token. (3) Login wurstbrot with his password
  (also exfiltrated via SQLi + hashcat cracking). (4) When
  2FA prompt appears, submit TOTP code -> solve.

concepts:
  - title_fr: "TOTP shared secret : la composante CRITICALLY SENSITIVE"
    title_en: "TOTP shared secret: the CRITICALLY SENSITIVE component"
    body_fr: |
      Hint OWASP #3 invite a comprendre TOTP : "Make sure
      you understand how 2FA with TOTP works and which
      part of it is the critically sensitive one". TOTP
      RFC 6238 fonctionne via un SHARED SECRET (32-byte
      random base32) entre le serveur et l'app
      authenticator du user. Le code TOTP courant est
      derive de HMAC-SHA1(shared_secret, time_window) avec
      time_window = floor(unix_time / 30). La COMPOSANTE
      CRITICALLY SENSITIVE = le shared secret. Si exfiltre,
      l'attaquant peut generer des codes TOTP valides a
      perpetuite (jusqu'a rotation du secret). Le TOTP
      code lui-meme n'a aucune valeur (valable 30
      secondes). Pattern reusable : pour any 2FA, le
      secret partage doit etre stocke chiffre + key
      management approprie (HSM, KMS, AES-GCM avec key
      stockage separe).
    body_en: |
      OWASP hint #3 invites to understand TOTP: "Make
      sure you understand how 2FA with TOTP works and
      which part of it is the critically sensitive one".
      TOTP RFC 6238 works via SHARED SECRET (32-byte
      random base32) between server and user's
      authenticator app. Current TOTP code derived from
      HMAC-SHA1(shared_secret, time_window) with
      time_window = floor(unix_time / 30). CRITICALLY
      SENSITIVE COMPONENT = shared secret. If
      exfiltrated, attacker can generate valid TOTP
      codes in perpetuity (until secret rotation). TOTP
      code itself has no value (valid 30 seconds).
      Reusable pattern: for any 2FA, shared secret must
      be stored encrypted + appropriate key management
      (HSM, KMS, AES-GCM with separate key storage).

  - title_fr: "Plaintext storage : le bug exact dans 2fa.ts"
    title_en: "Plaintext storage: the exact bug in 2fa.ts"
    body_fr: |
      Source verifiee (routes/2fa.ts) : ligne 135 fait
      `userModel.totpSecret = secret` (assignation directe,
      pas de chiffrement). Ligne 37 verifie via
      `otplib.authenticator.check(totpToken, user.
      totpSecret)` (utilise le secret directement, donc
      plaintext). Pattern d'erreur : un developpeur croit
      que stocker le secret en DB est suffisant car la DB
      est "behind authentication". Mais (a) une SQLi
      exfiltre la table entiere (cf. unionSqlInjection
      Challenge), (b) un backup vole revele les secrets
      tous, (c) un sysadmin malveillant a un read access
      complet. La defense : chiffrer chaque totpSecret avec
      une cle MASTER stockee separement (HSM ou KMS), de
      sorte que SQLi seul ne suffit pas. Pattern :
      defense en profondeur entre stockage chiffre et key
      management.
    body_en: |
      Verified source (routes/2fa.ts): line 135 does
      `userModel.totpSecret = secret` (direct assignment,
      no encryption). Line 37 verifies via
      `otplib.authenticator.check(totpToken, user.
      totpSecret)` (uses secret directly, so plaintext).
      Error pattern: developer thinks storing secret in
      DB is enough because DB is "behind authentication".
      But (a) SQLi exfiltrates entire table (cf.
      unionSqlInjectionChallenge), (b) stolen backup
      reveals all secrets, (c) malicious sysadmin has
      full read access. Defense: encrypt each totpSecret
      with MASTER key stored separately (HSM or KMS), so
      SQLi alone insufficient. Pattern: defense in depth
      between encrypted storage and key management.

  - title_fr: "Composition multi-challenge : SQLi + hash crack + TOTP gen"
    title_en: "Multi-challenge composition: SQLi + hash crack + TOTP gen"
    body_fr: |
      Hint OWASP #4 indique la composition : "Solving the
      challenge Retrieve a list of all user credentials
      via SQL Injection before tackling this one will
      definitely help. But it will not carry you all the
      way". Pre-requis : (a) unionSqlInjectionChallenge
      pour exfil totpSecret + password hash de wurstbrot.
      (b) hashcat -m 3200 + rockyou.txt pour cracker le
      hash et obtenir password en clair. (c) otplib OU
      Google Authenticator avec import secret pour
      generer TOTP code. Pattern : un challenge qui
      semble "isole" (2FA bypass) requiert en fait une
      kill chain multi-step (SQLi -> hash crack -> TOTP
      gen). Cela illustre l'importance du graphe de
      dependances entre challenges et la composition
      d'attaques.
    body_en: |
      OWASP hint #4 indicates composition: "Solving the
      challenge Retrieve a list of all user credentials
      via SQL Injection before tackling this one will
      definitely help. But it will not carry you all the
      way". Prerequisites: (a)
      unionSqlInjectionChallenge for wurstbrot
      totpSecret + password hash exfiltration. (b)
      hashcat -m 3200 + rockyou.txt to crack hash and
      get cleartext password. (c) otplib OR Google
      Authenticator with secret import to generate TOTP
      code. Pattern: challenge appearing "isolated" (2FA
      bypass) actually requires multi-step kill chain
      (SQLi -> hash crack -> TOTP gen). Illustrates
      importance of challenge dependency graph and
      attack composition.
