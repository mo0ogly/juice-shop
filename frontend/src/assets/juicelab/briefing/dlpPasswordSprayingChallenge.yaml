challenge_key: "dlpPasswordSprayingChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Dumpster dive Internet pour un leaked password
  + login original user account. Tag : OSINT.
  Description OWASP. Hints officiels : (1) "your
  task is to find some leaked access logs which
  happen to have a fairly common format". (2) "A
  very popular help platform for developers might
  contain breadcrumbs". (3) "log file was copied
  & paste onto a platform often used to share
  data quickly". (4) "Once you found the
  important piece of information, you could
  employ a technique called Password Spraying".
  [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : Solve check dans
  routes/login.ts:64. Code exact : `solveIf(() =>
  req.body.email === 'J12934@juice-sh.op' &&
  req.body.password === '0Y8rMnww$*9VFYE§59-!Fg
  1L6t&6lB')`. L'attaquant doit trouver le
  password J12934 leak quelque part en cloud
  OSINT. Workflow : (1) Recherche externe
  Pastebin / GitHub gist / Stack Overflow ;
  hint #2 indique "popular help platform" =
  Stack Overflow probablement, hint #3 "platform
  to share data quickly" = Pastebin. (2) Le log
  leak access logs Juice Shop avec passwords en
  URL parameter. (3) Extract password from log.
  (4) Login J12934 + password. Solve auto.

mission_en: |
  Dumpster dive Internet for leaked password +
  log into original user account. Tag: OSINT.
  OWASP description. Official hints: (1) "your
  task is to find some leaked access logs which
  happen to have a fairly common format". (2)
  "A very popular help platform for developers
  might contain breadcrumbs". (3) "log file was
  copied & paste onto a platform often used to
  share data quickly". (4) "Once you found the
  important piece of information, you could
  employ a technique called Password
  Spraying". [KILL_CHAIN_DOCUMENTED]

  Recommended method: Solve check in routes/
  login.ts:64. Exact code: `solveIf(() =>
  req.body.email === 'J12934@juice-sh.op' &&
  req.body.password === '0Y8rMnww$*9VFYE§59-
  !Fg1L6t&6lB')`. Attacker must find J12934
  password leak somewhere in cloud OSINT.
  Workflow: (1) External search Pastebin /
  GitHub gist / Stack Overflow; hint #2
  indicates "popular help platform" = likely
  Stack Overflow, hint #3 "platform to share
  data quickly" = Pastebin. (2) Log leaks
  Juice Shop access logs with passwords in
  URL parameter. (3) Extract password from
  log. (4) Login J12934 + password. Auto
  solves.

concepts:
  - title_fr: "Password in URL : anti-pattern critique"
    title_en: "Password in URL: critical anti-pattern"
    body_fr: |
      Source canonique : OWASP Authentication
      Cheat Sheet. Anti-pattern : passwords
      transmits dans URL query parameters
      (`?password=xxx`). Cela rend le password
      logged dans : (a) server access logs
      (cf. accessLogDisclosure), (b) browser
      history, (c) reverse proxy logs (nginx,
      cloudflare), (d) shared link snapshots.
      Defense : passwords TOUJOURS en POST body,
      sur HTTPS, jamais en GET URL. Cf. RFC 3986
      sur la non-confidentiality des URLs.
    body_en: |
      Canonical source: OWASP Authentication
      Cheat Sheet. Anti-pattern: passwords
      transmitted in URL query parameters
      (`?password=xxx`). Makes password logged
      in: (a) server access logs (cf.
      accessLogDisclosure), (b) browser
      history, (c) reverse proxy logs (nginx,
      cloudflare), (d) shared link snapshots.
      Defense: passwords ALWAYS in POST body,
      over HTTPS, never in GET URL. Cf. RFC
      3986 on URL non-confidentiality.

  - title_fr: "Password Spraying technique"
    title_en: "Password Spraying technique"
    body_fr: |
      Hint OWASP #4 : "technique called Password
      Spraying". Distinct du Brute Force :
      brute force = many passwords sur 1
      account. Spraying = 1 password sur many
      accounts. Spraying evite account lockout
      car chaque account ne voit que 1 attempt.
      Cas reels : OPM 2015 breach (4M federal
      employees), countless O365 spraying
      attacks 2018+. Defense : (a) MFA
      mandatory, (b) anomaly detection sur
      login patterns (multiple accounts same
      IP), (c) breached password check
      (HaveIBeenPwned API).
    body_en: |
      OWASP hint #4: "technique called Password
      Spraying". Distinct from Brute Force:
      brute force = many passwords on 1
      account. Spraying = 1 password on many
      accounts. Spraying avoids account
      lockout as each account sees only 1
      attempt. Real cases: OPM 2015 breach
      (4M federal employees), countless O365
      spraying attacks 2018+. Defense: (a)
      MFA mandatory, (b) anomaly detection on
      login patterns (multiple accounts same
      IP), (c) breached password check
      (HaveIBeenPwned API).

  - title_fr: "OSINT external : Pastebin + gist"
    title_en: "External OSINT: Pastebin + gist"
    body_fr: |
      Hints OWASP #2 + #3 indiquent les
      surfaces OSINT cibles : (a) Stack
      Overflow ("popular help platform for
      developers") - les developers postent
      des log excerpts en demandant de l'aide,
      sans realiser que les logs contiennent
      passwords. (b) Pastebin ("platform to
      share data quickly") - les logs partages
      pour debugging. Pour Juice Shop, le
      password leak est typiquement dans un
      Pastebin paste public titled "juice
      shop logs" ou similar. Pattern reusable :
      les developers leak constamment des
      secrets sur ces platforms ; les
      attaquants les harvestent via outils
      comme `truffleHog`, `gitleaks`, Pastebin
      scrapers.
    body_en: |
      OWASP hints #2 + #3 indicate target
      OSINT surfaces: (a) Stack Overflow
      ("popular help platform for
      developers") - developers post log
      excerpts asking for help, without
      realizing logs contain passwords. (b)
      Pastebin ("platform to share data
      quickly") - logs shared for debugging.
      For Juice Shop, password leak typically
      in public Pastebin paste titled
      "juice shop logs" or similar. Reusable
      pattern: developers constantly leak
      secrets on these platforms; attackers
      harvest via tools like `truffleHog`,
      `gitleaks`, Pastebin scrapers.
