challenge_key: "resetPasswordJimChallenge"
schema_version: "juicelab.briefing.v2"

mission_fr: |
  Reset le password de Jim via Forgot Password en repondant
  CORRECTEMENT a sa security question avec sa reponse
  ORIGINALE. Description OWASP. Hints officiels : (1) "The
  hardest part of this challenge is actually to find out who
  Jim actually is". (2) "Jim picked one of the worst security
  questions and chose to answer it truthfully". (3) "As Jim is
  a celebrity, the answer to his question is quite easy to
  find in publicly available information on the internet". (4)
  "Even brute forcing the answer should be possible with the
  right kind of word list". [KILL_CHAIN_DOCUMENTED]

  Methode recommandee : (1) Cherche d'abord QUI est Jim. La
  feedback section ou les product reviews de Juice Shop
  contiennent des reviews signees "Jim S." ou similar. Le
  pattern Juice Shop : Jim = "James Tiberius Kirk" (Star Trek,
  immediatement identifie comme celebrity sci-fi). Email Juice
  Shop : jim@juice-sh.op (deja decouvrable via SQLi sur Users
  table ou via reviews). (2) Sur /#/forgot-password, entre
  jim@juice-sh.op. La security question s'affiche : typiquement
  "Eldest siblings's middle name?" — codefixes/
  resetPasswordJimChallenge.info.yml fix #2 confirme : "an
  eldest sibling". (3) OSINT Star Trek wiki : Jim Kirk a un
  frere aine, George Samuel Kirk. Reponse = "Samuel". (4)
  Brute force feasible (hint #4) : wordlist de male first
  names (~3000 candidats).

mission_en: |
  Reset Jim's password via Forgot Password by CORRECTLY
  answering his security question with ORIGINAL answer. OWASP
  description. Official hints: (1) "The hardest part of this
  challenge is actually to find out who Jim actually is". (2)
  "Jim picked one of the worst security questions and chose
  to answer it truthfully". (3) "As Jim is a celebrity, the
  answer to his question is quite easy to find in publicly
  available information on the internet". (4) "Even brute
  forcing the answer should be possible with the right kind of
  word list". [KILL_CHAIN_DOCUMENTED]

  Recommended method: (1) Find first WHO Jim is. Juice Shop
  feedback section or product reviews contain reviews signed
  "Jim S." or similar. Juice Shop pattern: Jim = "James
  Tiberius Kirk" (Star Trek, immediately identifiable as sci-fi
  celebrity). Juice Shop email: jim@juice-sh.op (already
  discoverable via SQLi on Users table or reviews). (2) On
  /#/forgot-password, enter jim@juice-sh.op. Security question
  appears: typically "Eldest sibling's middle name?" —
  codefixes/resetPasswordJimChallenge.info.yml fix #2
  confirms: "an eldest sibling". (3) Star Trek wiki OSINT:
  Jim Kirk has elder brother George Samuel Kirk. Answer =
  "Samuel". (4) Brute force feasible (hint #4): male first
  names wordlist (~3000 candidates).

concepts:
  - title_fr: "Recon de l'identite : la phase OSINT N0 souvent oubliee"
    title_en: "Identity recon: the often-forgotten OSINT N0 phase"
    body_fr: |
      Hint OWASP #1 est PEDAGOGIQUEMENT critique : "The
      hardest part of this challenge is actually to find out
      who Jim actually is". C'est la phase N0 OSINT : avant
      d'attaquer la security question, identifier la cible.
      Pattern reusable : un username sans contexte = inutile.
      Il faut d'abord enrichir le profil (linked accounts,
      reviews ecrites, basket/order history accessible via
      privilege escalation, etc.). Pour Jim, sources :
      product reviews + feedback (UI surface visible) ou
      SQLi sur Users (escalade), ou About Us page.
    body_en: |
      OWASP hint #1 is PEDAGOGICALLY critical: "The hardest
      part of this challenge is actually to find out who Jim
      actually is". This is OSINT phase N0: before attacking
      security question, identify target. Reusable pattern:
      username without context = useless. Must first enrich
      profile (linked accounts, written reviews, basket/order
      history accessible via privilege escalation, etc.). For
      Jim, sources: product reviews + feedback (visible UI
      surface) or SQLi on Users (escalation), or About Us
      page.

  - title_fr: "\"Eldest sibling\" : la security question type \"worst\""
    title_en: "\"Eldest sibling\": the \"worst\" security question type"
    body_fr: |
      Hint OWASP #2 caracterise cette question : "Jim picked
      one of the worst security questions". Pourquoi
      "worst" ? Parce que (a) "eldest sibling's name" est PII
      facilement OSINTable (Wikipedia, Facebook family tags,
      academic genealogy), (b) le solution space est etroit
      (first names communs, pour male siblings ~3000
      candidats) facile a brute forcer (cf. hint #4). Codefixes/
      resetPasswordJimChallenge.info.yml fix #2 montre que
      reduire le scope a "eldest brother" reduit l'espace a
      male first names uniquement. C'est un classic anti-
      pattern OWASP cheatsheet : narrowing the scope reduces
      security.
    body_en: |
      OWASP hint #2 characterizes this question: "Jim picked
      one of the worst security questions". Why "worst"?
      Because (a) "eldest sibling's name" is PII easily
      OSINTable (Wikipedia, Facebook family tags, academic
      genealogy), (b) solution space is narrow (common first
      names, for male siblings ~3000 candidates) easy to
      brute force (cf. hint #4). Codefixes/
      resetPasswordJimChallenge.info.yml fix #2 shows
      narrowing scope to "eldest brother" reduces space to
      male first names only. Classic anti-pattern OWASP
      cheatsheet: narrowing scope reduces security.

  - title_fr: "Star Trek genealogy : OSINT canonical sur celebrity fictionnel"
    title_en: "Star Trek genealogy: canonical OSINT on fictional celebrity"
    body_fr: |
      Hint OWASP #3 : "As Jim is a celebrity, the answer to
      his question is quite easy to find". Specificite : Jim
      Kirk (Star Trek) est un personnage fictif avec genealogy
      canonical sur Memory Alpha (Star Trek wiki). Frere aine
      = George Samuel Kirk (canonical depuis l'episode S1E22
      "Operation: Annihilate!" 1967). Cette canonicality est
      typique des fictional characters : leur backstory est
      DOCUMENTEE de maniere centralisee, immutable, indexable.
      Pattern reusable : si la cible est un fictional
      character, OSINT = Memory Alpha / Wookieepedia /
      Wikipedia / Fandom.
    body_en: |
      OWASP hint #3: "As Jim is a celebrity, the answer to
      his question is quite easy to find". Specificity: Jim
      Kirk (Star Trek) is fictional character with canonical
      genealogy on Memory Alpha (Star Trek wiki). Elder
      brother = George Samuel Kirk (canonical since episode
      S1E22 "Operation: Annihilate!" 1967). This canonicality
      is typical of fictional characters: backstory is
      DOCUMENTED centrally, immutable, indexable. Reusable
      pattern: if target is fictional character, OSINT =
      Memory Alpha / Wookieepedia / Wikipedia / Fandom.
